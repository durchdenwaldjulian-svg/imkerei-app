<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="Logo.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📦 Packliste – Imkerei Tagesplaner</title>
    <meta name="theme-color" content="#F5A623">
    <link rel="manifest" href="manifest.json">
    <script src="theme.js?v=2"></script>
<link rel="stylesheet" href="/fonts/fonts.css">
    <script src="vendor/supabase.min.js"></script>
    <link rel="stylesheet" href="shared-styles.css?v=2">
    <style>
        body{padding-left:220px;padding-bottom:2rem}
        /* === NAV === */
        .nav{position:fixed;left:0;top:0;bottom:0;width:220px;background:#FFFBF0;border-right:2px solid rgba(245,166,35,0.12);display:flex;flex-direction:column;padding:0;z-index:50;overflow-y:auto}
        .nav-brand{padding:1.25rem 1rem;border-bottom:2px solid rgba(245,166,35,0.12)}
        .nav-section{font-size:.65rem;font-weight:700;color:#A69580;text-transform:uppercase;letter-spacing:.08em;padding:.75rem 1rem .25rem}
        .nav-item{display:block;padding:.625rem 1rem;text-align:left;cursor:pointer;border:none;background:none;color:#7A6652;font-size:.85rem;border-left:4px solid transparent;transition:all .15s;width:100%;text-decoration:none;font-family:inherit}
        .nav-item:hover{background:rgba(245,166,35,0.06)}
        .nav-item.active{color:#92400E;font-weight:600;border-left-color:#F5A623;background:#FFF8EE}
        .container{max-width:800px;margin:0 auto;padding:1rem}

        /* PACKLISTE */
        .pack-kategorie{background:#fff;border:2px solid #E8DFD4;border-radius:.75rem;padding:1rem;margin-bottom:1rem}
        .pack-item-row{display:flex;justify-content:space-between;align-items:center;padding:.625rem;border-bottom:1px solid #FFFBF0;gap:.75rem}
        .pack-item-row:hover{background:#FFF8EE}
        .pack-item-row:last-child{border-bottom:none}
        .pack-item-main{display:flex;align-items:center;flex:1;min-width:0}
        .pack-item-controls{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
        .pack-checkbox{width:1.25rem;height:1.25rem;margin-right:.875rem;cursor:pointer;accent-color:#F5A623;flex-shrink:0}
        .pack-label{flex:1;font-size:.95rem;color:#1C1410;user-select:none;cursor:pointer;min-width:0;word-break:break-word}
        .pack-label.checked{text-decoration:line-through;color:#A69580}
        .pack-label strong{color:#F5A623;font-weight:700}
        .menge-counter{display:flex;align-items:center;gap:.25rem;background:#FFF8EE;border-radius:.5rem;padding:.25rem}
        .menge-btn{width:1.75rem;height:1.75rem;border:1px solid #d1d5db;border-radius:.375rem;background:#fff;cursor:pointer;font-size:1rem;font-weight:bold;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#7A6652}
        .menge-btn:hover{background:#F5A623;border-color:#F5A623;color:#1C1410;transform:scale(1.1)}
        .menge-btn:active{transform:scale(.95)}
        .menge-value{min-width:1.5rem;text-align:center;font-weight:600;font-size:.9rem;color:#1C1410}
        .btn-del{background:none;border:none;cursor:pointer;font-size:1.25rem;padding:.25rem .5rem;opacity:.4;transition:all .2s}
        .btn-del:hover{opacity:1;transform:scale(1.2)}
        .stats{display:flex;gap:1rem;margin-bottom:1.5rem}
        .stat-card{flex:1;background:#FFF8EE;padding:1rem;border-radius:.5rem;text-align:center}
        .stat-number{font-size:1.75rem;font-weight:bold;color:#F5A623}
        .stat-label{font-size:.75rem;color:#7A6652;margin-top:.25rem;text-transform:uppercase;letter-spacing:.05em}
        .schnell-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-bottom:1.5rem}
        .schnell-btn{background:linear-gradient(135deg,#F5A623,#FFBE45);border:none;border-radius:.75rem;padding:1rem;cursor:pointer;transition:all .2s;box-shadow:0 2px 4px rgba(28,20,16,0.08)}
        .schnell-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 6px 12px rgba(245,166,35,.3)}
        .schnell-btn:active{transform:translateY(-1px)}
        .schnell-btn.schnell-equipment{background:linear-gradient(135deg,#3b82f6,#60a5fa)}
        .schnell-btn.schnell-equipment:hover{box-shadow:0 6px 12px rgba(59,130,246,.3)}
        .schnell-icon{font-size:2.5rem;margin-bottom:.5rem}
        .schnell-label{font-weight:600;font-size:.9rem;color:#1C1410}
        .schnell-btn.schnell-equipment .schnell-label{color:#fff}
        .info-box{font-size:.85rem;color:#7A6652;padding:.75rem;background:#FFF8EE;border:2px solid #F0D9A0;border-radius:.5rem;margin-bottom:1rem}

        /* CUSTOM ITEM */
        .custom-badge{display:inline-block;background:#EEF2FF;color:#6366f1;font-size:.6rem;font-weight:700;padding:.1rem .35rem;border-radius:999px;margin-left:.35rem;vertical-align:middle}
        .btn-add-custom{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.25rem;background:#fff;border:2px dashed #d1d5db;border-radius:.75rem;cursor:pointer;font-size:.9rem;font-weight:600;color:#7A6652;transition:all .2s;margin-bottom:1.5rem}
        .btn-add-custom:hover{border-color:#F5A623;color:#F5A623;background:#FFF8EE}
        .custom-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;align-items:center;justify-content:center;padding:1rem}
        .custom-modal.active{display:flex}
        .custom-modal-content{background:#fff;border-radius:1rem;padding:1.5rem;max-width:400px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.2)}
        .custom-modal h3{margin:0 0 1rem;font-size:1.1rem}
        .custom-input{width:100%;padding:.625rem .75rem;border:2px solid #E8DFD4;border-radius:.5rem;font-size:.9rem;font-family:inherit;margin-bottom:.75rem;box-sizing:border-box}
        .custom-input:focus{outline:none;border-color:#F5A623}
        .custom-kat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.35rem;margin-bottom:.75rem}
        .custom-kat-btn{padding:.4rem;border:2px solid #E8DFD4;border-radius:.5rem;background:#fff;cursor:pointer;font-size:.75rem;text-align:center;transition:all .15s;font-family:inherit}
        .custom-kat-btn:hover{border-color:#F5A623;background:#FFF8EE}
        .custom-kat-btn.selected{border-color:#F5A623;background:#FFF8EE;font-weight:600;color:#92400E}

        /* Toast kommt aus shared-styles.css */

        .loading-screen{position:fixed;inset:0;background:#FFFBF0;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1rem}
        .spinner{width:40px;height:40px;border:4px solid #E8DFD4;border-top-color:#F5A623;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        @media(max-width:768px){
            body{padding-left:0;padding-bottom:90px}
            .nav{display:none}
            .mobile-nav{display:flex}
            .schnell-grid{grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.5rem}
            .schnell-btn{padding:.75rem}
            .schnell-icon{font-size:1.75rem}
            .schnell-label{font-size:.8rem}
        }
    </style>
</head>
<body>

<nav class="nav" id="mainNav"></nav>
<div class="mobile-nav" id="mobileNavBar"></div>
<div class="mobile-menu-overlay" id="mobileMenuOverlay" onclick="if(event.target===this)mobileMenuClose()"></div>
<script src="nav.js?v=2"></script>

<div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div style="color:#7A6652;font-size:.85rem">Packliste laden...</div>
</div>

<div class="toast" id="toast"></div>
<div id="app"></div>

<!-- CUSTOM ITEM MODAL -->
<div class="custom-modal" id="customModal">
    <div class="custom-modal-content">
        <h3>✏️ Eigenes Item hinzufügen</h3>
        <label style="font-size:.8rem;font-weight:600;color:#7A6652;display:block;margin-bottom:.25rem">Name *</label>
        <input type="text" class="custom-input" id="customName" placeholder="z.B. Sprühflasche, Klebeband...">
        <label style="font-size:.8rem;font-weight:600;color:#7A6652;display:block;margin-bottom:.25rem">Kategorie</label>
        <div class="custom-kat-grid" id="customKatGrid"></div>
        <label style="font-size:.8rem;font-weight:600;color:#7A6652;display:block;margin-bottom:.25rem">Oder neue Kategorie</label>
        <input type="text" class="custom-input" id="customKat" placeholder="z.B. Wanderung, Transport...">
        <div style="display:flex;gap:.5rem;margin-top:.5rem">
            <button style="flex:1;padding:.6rem;background:#F5A623;color:#fff;border:none;border-radius:.5rem;font-weight:600;cursor:pointer;font-size:.9rem" onclick="saveCustomItem()">Hinzufügen</button>
            <button style="padding:.6rem 1rem;background:#f3f4f6;color:#7A6652;border:none;border-radius:.5rem;font-weight:600;cursor:pointer;font-size:.9rem" onclick="closeCustomModal()">Abbrechen</button>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="plan.js"></script>
<script src="presence.js" defer></script>
<script>
// ============================================
// PACKLISTE - EIGENSTÄNDIGE SEITE
// ============================================

const PACKLISTE_ITEMS = {
    'Schutzkleidung': ['Imkeranzug / Imkerjacke','Imkerhandschuhe','Imkerhut mit Schleier','Feste Schuhe / Stiefel'],
    'Werkzeuge': ['Stockmeißel','Smoker (Raucher)','Abkehrbesen','Wabenzange','Entdeckelungsgabel','Stockkarte & Stift','Messer / Entdeckelungsmesser'],
    'Rauchmaterial': ['Holzspäne / Holzpellets','Heu / Stroh','Karton / Eierkarton','Anzünder','Feuerzeug / Streichhölzer'],
    'Futter': ['Futterteig (Apifonda)','Zuckerwasser','Futtertaschen','Futterzarge'],
    'Behandlung': ['Ameisensäure','Oxalsäure','Puderzucker (für Diagnose)','Diagnosebrett / Windel','Schutzhandschuhe für Säure','Dosierer / Verdampfer'],
    'Material': ['Rähmchen','Mittelwände','Absperrgitter','Fluglochkeil','Mäusegitter','Draht zum Einlöten'],
    'Ernte': ['Honigschleuder','Entdeckelungsgeschirr','Sieb (doppelt)','Honigeimer / Hobbock','Honigrefraktometer','Gläser & Deckel','Etiketten'],
    'Beuten & Zargen': ['Boden / Bodenbrett','Brutraum(zarge)','Honigraum(zarge)','Absperrgitter','Innendeckel','Außendeckel / Blechdeckel'],
    'Sonstiges': ['Erste-Hilfe-Set','Wasser / Getränk','Transportbox / Kiste','Müllsack','Desinfektionsmittel','Handy / Kamera']
};

var items = [];
var schnellCounter = {};

// ============================================
// INIT
// ============================================
async function init() {
    var { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'app.html'; return; }
    currentUser = session.user;
    await planManager.load();

    var res = await sb.from('packliste').select('*').eq('user_id', currentUser.id);
    items = (res.data || []).map(function(r) {
        return { id: r.id, kategorie: r.kategorie, name: r.name, checked: r.checked, menge: r.menge, istSchnell: r.ist_schnell, schnellTyp: r.schnell_typ, isCustom: r.is_custom || false };
    });

    if (items.length === 0) {
        await erstelleNeueItems();
    }

    document.getElementById('loadingScreen').style.display = 'none';
    render();
}

// ============================================
// HELPERS
// ============================================
function toast(msg, type) {
    type = type || 'success';
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + type + ' show';
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// ============================================
// DATEN-FUNKTIONEN
// ============================================
async function erstelleNeueItems() {
    items = [];
    schnellCounter = {};
    Object.entries(PACKLISTE_ITEMS).forEach(function(entry) {
        var kategorie = entry[0]; var names = entry[1];
        names.forEach(function(name) {
            items.push({
                id: 'pack_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                kategorie: kategorie, name: name, checked: false, istSchnell: false
            });
        });
    });
    speichern();
}

function speichern() {
    if (!currentUser) return;
    var rows = items.map(function(item){
        return {
            id: item.id, user_id: currentUser.id,
            kategorie: item.kategorie, name: item.name,
            checked: item.checked || false, menge: item.menge || 1,
            ist_schnell: item.istSchnell || false, schnell_typ: item.schnellTyp || null
        };
    });
    if (rows.length > 0) {
        sb.from('packliste').upsert(rows).then(function(res){
            if (res.error) console.error('Packliste Speichern Fehler:', res.error);
        });
    }
}

function toggle(id) {
    var item = items.find(function(i){return i.id === id;});
    if (item) {
        item.checked = !item.checked;
        var row = {
            id: item.id, user_id: currentUser.id,
            kategorie: item.kategorie, name: item.name,
            checked: item.checked, menge: item.menge || 1,
            ist_schnell: item.istSchnell || false, schnell_typ: item.schnellTyp || null
        };
        sb.from('packliste').upsert(row);
        render();
    }
}

function changeMenge(id, delta) {
    var item = items.find(function(i){return i.id === id;});
    if (item) {
        if (!item.menge) item.menge = 1;
        item.menge = Math.max(1, item.menge + delta);
        db.update('packliste', {menge: item.menge}, id);
        render();
    }
}

function loescheItem(id) {
    items = items.filter(function(i){return i.id !== id;});
    sb.from('packliste').delete().eq('id', id);
    render();
    toast('🗑️ Gelöscht','info');
}

function alleAbhaken() { items.forEach(function(item){item.checked = true; db.update('packliste', {checked: true}, item.id);}); render(); }
function alleZuruecksetzen() { items.forEach(function(item){item.checked = false; db.update('packliste', {checked: false}, item.id);}); render(); }

function allesLoeschen() {
    if (!confirm('Wirklich die KOMPLETTE Packliste löschen?')) return;
    items.forEach(function(item){ db.del('packliste', item.id); });
    items = [];
    schnellCounter = {};
    render();
    toast('🗑️ Packliste gelöscht','info');
}

function schnellHinzufuegen(typ) {
    var existierend = items.filter(function(i){return i.schnellTyp === typ;});
    if (existierend.length > 0) {
        items = items.filter(function(i){return i.schnellTyp !== typ;});
        speichern(); render(); toast('❌ Entfernt','info'); return;
    }
    var sets = {
        // === BEUTEN KOMPLETT ===
        'zander': [['Beuten & Zargen','🏠 Zander Beute komplett'],['Beuten & Zargen','  → Boden (Zander)'],['Beuten & Zargen','  → Brutraum (Zander)'],['Beuten & Zargen','  → Honigraum (Zander)'],['Beuten & Zargen','  → Absperrgitter'],['Beuten & Zargen','  → Innendeckel'],['Beuten & Zargen','  → Außendeckel']],
        'dadant': [['Beuten & Zargen','🏠 Dadant Beute komplett'],['Beuten & Zargen','  → Boden (Dadant)'],['Beuten & Zargen','  → Brutraum (Dadant)'],['Beuten & Zargen','  → Honigraum (Dadant)'],['Beuten & Zargen','  → Absperrgitter'],['Beuten & Zargen','  → Innendeckel'],['Beuten & Zargen','  → Außendeckel']],
        'dnm': [['Beuten & Zargen','🏠 DNM Beute komplett'],['Beuten & Zargen','  → Boden (DNM)'],['Beuten & Zargen','  → Brutraum (DNM)'],['Beuten & Zargen','  → Honigraum (DNM)'],['Beuten & Zargen','  → Absperrgitter'],['Beuten & Zargen','  → Innendeckel'],['Beuten & Zargen','  → Außendeckel']],
        'segeberger': [['Beuten & Zargen','🏠 Segeberger Beute komplett'],['Beuten & Zargen','  → Boden (Segeberger)'],['Beuten & Zargen','  → Brutraum (Segeberger)'],['Beuten & Zargen','  → Honigraum (Segeberger)'],['Beuten & Zargen','  → Absperrgitter'],['Beuten & Zargen','  → Innendeckel'],['Beuten & Zargen','  → Außendeckel']],
        // === EINZELTEILE (Menge über +/- steuerbar) ===
        'ableger': [['Beuten & Zargen','📦 Ablegerkasten'],['Beuten & Zargen','  → Boden'],['Beuten & Zargen','  → Brutzarge'],['Beuten & Zargen','  → Deckel']],
        'raehmchen': [['Material','🪵 Rähmchen']],
        'mittelwaende': [['Material','▭ Mittelwände']],
        'boden': [['Beuten & Zargen','⬜ Boden']],
        'zarge': [['Beuten & Zargen','📦 Zarge']],
        'deckel': [['Beuten & Zargen','🔲 Deckel']],
        // === EQUIPMENT SETS ===
        'schutz': [['Schutzkleidung','🧥 Schutzausrüstung komplett'],['Schutzkleidung','  → Imkeranzug/Jacke'],['Schutzkleidung','  → Imkerhandschuhe'],['Schutzkleidung','  → Imkerhut mit Schleier']],
        'werkzeug': [['Werkzeuge','🔧 Werkzeug-Set komplett'],['Werkzeuge','  → Stockmeißel'],['Werkzeuge','  → Abkehrbesen'],['Werkzeuge','  → Wabenzange']],
        'smoker': [['Rauchmaterial','💨 Smoker-Paket komplett'],['Werkzeuge','  → Smoker (Raucher)'],['Rauchmaterial','  → Holzspäne/Pellets'],['Rauchmaterial','  → Anzünder']],
        'ernte': [['Ernte','🍯 Ernte-Set komplett'],['Ernte','  → Honigschleuder'],['Ernte','  → Entdeckelungsgeschirr'],['Ernte','  → Sieb (doppelt)'],['Ernte','  → Honigeimer'],['Ernte','  → Gläser & Deckel']],
        'behandlung_set': [['Behandlung','💉 Behandlungs-Set komplett'],['Behandlung','  → Ameisensäure'],['Behandlung','  → Oxalsäure'],['Behandlung','  → Puderzucker'],['Behandlung','  → Schutzhandschuhe']],
        'futter': [['Futter','🍯 Futter-Set komplett'],['Futter','  → Futterteig'],['Futter','  → Zuckerwasser'],['Futter','  → Futterzarge']]
    };
    var setItems = sets[typ] || [];
    setItems.forEach(function(x) {
        items.push({id:'schnell_'+Date.now()+'_'+Math.random().toString(36).substr(2,9), kategorie:x[0], name:x[1], checked:false, istSchnell:true, schnellTyp:typ});
    });
    speichern(); render(); toast('✓ Hinzugefügt','success');
}

function getStatistik() {
    var abgehakt = items.filter(function(i){return i.checked;}).length;
    return { abgehakt: abgehakt, offen: items.length - abgehakt, gesamt: items.length };
}

// ============================================
// EIGENE ITEMS
// ============================================
var _selectedKat = '';
var ALLE_KATEGORIEN = ['Schutzkleidung','Werkzeuge','Rauchmaterial','Futter','Behandlung','Material','Ernte','Beuten & Zargen','Sonstiges'];

function openCustomModal() {
    document.getElementById('customName').value = '';
    document.getElementById('customKat').value = '';
    _selectedKat = '';
    var grid = document.getElementById('customKatGrid');
    grid.innerHTML = '';
    // Alle 9 Kategorien + eventuelle eigene aus Items
    var kats = {};
    ALLE_KATEGORIEN.forEach(function(k){ kats[k] = true; });
    items.forEach(function(i){ kats[i.kategorie] = true; });
    Object.keys(kats).forEach(function(k){
        grid.innerHTML += '<button class="custom-kat-btn" onclick="selectKat(this,\''+k.replace(/'/g,"\\'")+'\')">'+k+'</button>';
    });
    document.getElementById('customModal').classList.add('active');
    setTimeout(function(){ document.getElementById('customName').focus(); }, 100);
}

function closeCustomModal() {
    document.getElementById('customModal').classList.remove('active');
}

function selectKat(btn, kat) {
    _selectedKat = kat;
    document.getElementById('customKat').value = '';
    document.querySelectorAll('.custom-kat-btn').forEach(function(b){ b.classList.remove('selected'); });
    btn.classList.add('selected');
}

function saveCustomItem() {
    var name = document.getElementById('customName').value.trim();
    var neueKat = document.getElementById('customKat').value.trim();
    var kategorie = neueKat || _selectedKat;
    if (!name) { alert('Bitte einen Namen eingeben!'); return; }
    if (!kategorie) { alert('Bitte eine Kategorie wählen oder eingeben!'); return; }
    var item = {
        id: 'custom_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
        kategorie: kategorie, name: '✏️ ' + name, checked: false, menge: 1,
        istSchnell: false, schnellTyp: null, isCustom: true
    };
    items.push(item);
    sb.from('packliste').upsert({
        id: item.id, user_id: currentUser.id,
        kategorie: item.kategorie, name: item.name,
        checked: false, menge: 1,
        ist_schnell: false, schnell_typ: null, is_custom: true
    });
    closeCustomModal();
    render();
    toast('✅ "'+name+'" hinzugefügt!','success');
}

// ============================================
// DRUCKEN
// ============================================
function drucken() {
    var grouped = {};
    items.forEach(function(item) {
        if (!grouped[item.kategorie]) grouped[item.kategorie] = [];
        grouped[item.kategorie].push(item);
    });
    var datum = new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'});
    var stats = getStatistik();
    var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Packliste - Imkerei</title>';
    html += '<style>';
    html += 'body{font-family:Arial,sans-serif;max-width:700px;margin:0 auto;padding:1.5rem;color:#333}';
    html += 'h1{font-size:1.5rem;border-bottom:2px solid #F5A623;padding-bottom:.5rem;margin-bottom:.25rem}';
    html += '.datum{font-size:.85rem;color:#666;margin-bottom:1.5rem}';
    html += '.stats{font-size:.9rem;color:#666;margin-bottom:1rem}';
    html += 'h2{font-size:1.1rem;margin:1.25rem 0 .5rem;color:#1C1410;border-bottom:1px solid #eee;padding-bottom:.25rem}';
    html += '.item{display:flex;align-items:center;gap:.5rem;padding:.3rem 0;border-bottom:1px dotted #ddd}';
    html += '.checkbox{width:14px;height:14px;border:2px solid #999;border-radius:2px;flex-shrink:0}';
    html += '.checkbox.checked{background:#10b981;border-color:#10b981}';
    html += '.name{flex:1;font-size:.9rem}';
    html += '.checked-text{text-decoration:line-through;color:#999}';
    html += '@media print{body{padding:.5rem}}';
    html += '</style></head><body>';
    html += '<h1>🐝 Imkerei Packliste</h1>';
    html += '<div class="datum">'+datum+'</div>';
    html += '<div class="stats">'+stats.abgehakt+' von '+stats.gesamt+' abgehakt · '+stats.offen+' offen</div>';
    Object.entries(grouped).forEach(function(entry){
        var kat = entry[0]; var katItems = entry[1];
        var abgehakt = katItems.filter(function(i){return i.checked;}).length;
        html += '<h2>'+kat+' ('+abgehakt+'/'+katItems.length+')</h2>';
        katItems.forEach(function(item){
            var menge = item.menge || 1;
            html += '<div class="item"><div class="checkbox'+(item.checked?' checked':'')+'"></div>';
            html += '<div class="name'+(item.checked?' checked-text':'')+'">'+(menge>1?menge+'x ':'')+item.name+'</div></div>';
        });
    });
    html += '</body></html>';
    var win = window.open('','_blank');
    win.document.write(html);
    win.document.close();
    setTimeout(function(){ win.print(); }, 300);
}

// ============================================
// RENDER
// ============================================
function render() {
    var stats = getStatistik();
    var grouped = {};
    items.forEach(function(item) {
        if (!grouped[item.kategorie]) grouped[item.kategorie] = [];
        grouped[item.kategorie].push(item);
    });

    var kategorieHtml = '';
    Object.entries(grouped).forEach(function(entry) {
        var kategorie = entry[0]; var katItems = entry[1];
        var abgehakt = katItems.filter(function(i){return i.checked;}).length;
        kategorieHtml += '<div class="pack-kategorie"><h3>'+kategorie+' <small style="color:#7A6652;font-weight:normal">('+abgehakt+'/'+katItems.length+')</small></h3>';
        katItems.forEach(function(item) {
            var menge = item.menge || 1;
            kategorieHtml += '<div class="pack-item-row"><div class="pack-item-main">'+
                '<input type="checkbox" class="pack-checkbox" '+(item.checked?'checked':'')+' onchange="toggle(\''+item.id+'\')">'+
                '<span class="pack-label '+(item.checked?'checked':'')+'" onclick="toggle(\''+item.id+'\')">'+(menge>1?'<strong>'+menge+'x</strong> ':'')+item.name+'</span>'+
                '</div><div class="pack-item-controls">'+
                '<div class="menge-counter"><button class="menge-btn" onclick="changeMenge(\''+item.id+'\',-1)">−</button><span class="menge-value">'+menge+'</span><button class="menge-btn" onclick="changeMenge(\''+item.id+'\',1)">+</button></div>'+
                '<button class="btn-del" onclick="loescheItem(\''+item.id+'\')">🗑️</button>'+
                '</div></div>';
        });

    });

    '<h2 style="margin-top:0">⚡ Schnell hinzufügen</h2>'+
    '<h3 style="font-size:.9rem;color:#7A6652;margin-bottom:.75rem">🏠 Beuten (komplett)</h3>'+
    '<div class="schnell-grid">'+
    '<button class="schnell-btn" onclick="schnellHinzufuegen(\'zander\')"><div class="schnell-icon">🏠</div><div class="schnell-label">Zander</div></button>'+
    '<button class="schnell-btn" onclick="schnellHinzufuegen(\'dadant\')"><div class="schnell-icon">🏠</div><div class="schnell-label">Dadant</div></button>'+
    '<button class="schnell-btn" onclick="schnellHinzufuegen(\'dnm\')"><div class="schnell-icon">🏠</div><div class="schnell-label">DNM</div></button>'+
    '<button class="schnell-btn" onclick="schnellHinzufuegen(\'segeberger\')"><div class="schnell-icon">🏠</div><div class="schnell-label">Segeberger</div></button>'+
    '</div>'+
    '<h3 style="font-size:.9rem;color:#7A6652;margin:.75rem 0">📦 Einzelteile</h3>'+
    '<div class="schnell-grid">'+
    '<button class="schnell-btn" onclick="schnellHinzufuegen(\'ableger\')"><div class="schnell-icon">📦</div><div class="schnell-label">Ablegerkasten</div></button>'+
    '<button class="schnell-btn" onclick="schnellHinzufuegen(\'raehmchen\')"><div class="schnell-icon">🪵</div><div class="schnell-label">Rähmchen</div></button>'+
    '<button class="schnell-btn" onclick="schnellHinzufuegen(\'mittelwaende\')"><div class="schnell-icon">▭</div><div class="schnell-label">Mittelwände</div></button>'+
    '<button class="schnell-btn" onclick="schnellHinzufuegen(\'boden\')"><div class="schnell-icon">⬜</div><div class="schnell-label">Boden</div></button>'+
    '<button class="schnell-btn" onclick="schnellHinzufuegen(\'zarge\')"><div class="schnell-icon">📦</div><div class="schnell-label">Zarge</div></button>'+
    '<button class="schnell-btn" onclick="schnellHinzufuegen(\'deckel\')"><div class="schnell-icon">🔲</div><div class="schnell-label">Deckel</div></button>'+
    '</div>'+
    '<h3 style="font-size:.9rem;color:#7A6652;margin:.75rem 0">🔧 Equipment-Sets</h3>'+
    '<div class="schnell-grid">'+
    '<button class="schnell-btn schnell-equipment" onclick="schnellHinzufuegen(\'schutz\')"><div class="schnell-icon">🧥</div><div class="schnell-label">Schutzausrüstung</div></button>'+
    '<button class="schnell-btn schnell-equipment" onclick="schnellHinzufuegen(\'werkzeug\')"><div class="schnell-icon">🔧</div><div class="schnell-label">Werkzeug-Set</div></button>'+
    '<button class="schnell-btn schnell-equipment" onclick="schnellHinzufuegen(\'smoker\')"><div class="schnell-icon">💨</div><div class="schnell-label">Smoker-Paket</div></button>'+
    '<button class="schnell-btn schnell-equipment" onclick="schnellHinzufuegen(\'ernte\')"><div class="schnell-icon">🍯</div><div class="schnell-label">Ernte-Set</div></button>'+
    '<button class="schnell-btn schnell-equipment" onclick="schnellHinzufuegen(\'behandlung_set\')"><div class="schnell-icon">💉</div><div class="schnell-label">Behandlungs-Set</div></button>'+
    '<button class="schnell-btn schnell-equipment" onclick="schnellHinzufuegen(\'futter\')"><div class="schnell-icon">🍯</div><div class="schnell-label">Futter-Set</div></button>'+
    '</div>'+
    '<button class="btn-add-custom" onclick="openCustomModal()">✏️ Eigenes Item hinzufügen</button>'+
    '<div style="display:flex;gap:.75rem;margin-bottom:1.5rem">'+
    '<button style="flex:1;padding:.6rem;background:#10b981;color:#fff;border:none;border-radius:.5rem;font-weight:600;cursor:pointer" onclick="alleAbhaken()">✓ Alle abhaken</button>'+
    '<button style="flex:1;padding:.6rem;background:#3b82f6;color:#fff;border:none;border-radius:.5rem;font-weight:600;cursor:pointer" onclick="alleZuruecksetzen()">↺ Zurücksetzen</button>'+
    '<button style="flex:1;padding:.6rem;background:#ef4444;color:#fff;border:none;border-radius:.5rem;font-weight:600;cursor:pointer" onclick="allesLoeschen()">🗑️ Alles löschen</button>'+
    '</div>'+
    '<div style="margin-bottom:1.5rem">'+
    '<button style="width:100%;padding:.75rem;background:#F5A623;color:#fff;border:none;border-radius:.5rem;font-weight:600;cursor:pointer;font-size:1rem" onclick="drucken()">🖨️ Packliste drucken</button>'+
    '</div>'+
    '<div class="stats">'+
    '<div class="stat-card"><div class="stat-number">'+stats.abgehakt+'</div><div class="stat-label">Abgehakt</div></div>'+
    '<div class="stat-card"><div class="stat-number">'+stats.offen+'</div><div class="stat-label">Offen</div></div>'+
    '<div class="stat-card"><div class="stat-number">'+stats.gesamt+'</div><div class="stat-label">Gesamt</div></div>'+
    '</div>'+
    kategorieHtml+
    '</div>';

    document.getElementById('app').innerHTML = html;
}

// ============================================
// START
// ============================================
init();
</script>
</body>
</html>
