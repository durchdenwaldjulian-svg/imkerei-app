<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📍 Standorte – Imkerei Tagesplaner</title>
    <meta name="theme-color" content="#F5A623">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="/fonts/fonts.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        body{padding-left:220px;padding-bottom:2rem}
        /* === NAV === */
        .nav{position:fixed;left:0;top:0;bottom:0;width:220px;background:#FFFBF0;border-right:2px solid rgba(245,166,35,0.12);display:flex;flex-direction:column;padding:0;z-index:50;overflow-y:auto}
        .nav-brand{padding:1.25rem 1rem;border-bottom:2px solid rgba(245,166,35,0.12)}
        .nav-section{font-size:.65rem;font-weight:700;color:#A69580;text-transform:uppercase;letter-spacing:.08em;padding:.75rem 1rem .25rem}
        .nav-item{display:block;padding:.625rem 1rem;text-align:left;cursor:pointer;border:none;background:none;color:#7A6652;font-size:.85rem;border-left:4px solid transparent;transition:all .15s;width:100%;text-decoration:none;font-family:inherit}
        .nav-item:hover{background:rgba(245,166,35,0.06)}
        .nav-item.active{color:#92400E;font-weight:600;border-left-color:#F5A623;background:#FFF8EE}
        .container{max-width:900px;margin:0 auto;padding:1rem}

        .volk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem}
        .volk-card{background:#fff;border:2px solid #E8DFD4;border-radius:.75rem;padding:.875rem;cursor:pointer;transition:all .2s}
        .volk-card:hover{border-color:#F5A623;transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,166,35,.2)}

        .modal{position:fixed;inset:0;background:rgba(28,20,16,.5);display:none;z-index:10000;overflow-y:auto;padding:1rem}
        .modal.active{display:flex;align-items:center;justify-content:center}
        .modal-content{background:#FFFBF0;border-radius:1rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;margin:auto;position:relative;z-index:10001}
        .modal-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:2px solid #E8DFD4}
        .modal-header h2{margin:0;font-size:1.1rem}
        .modal-body{padding:1.25rem}
        .close-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#7A6652;padding:.25rem}
        .form-group{margin-bottom:1rem}
        .form-label{display:block;font-weight:500;font-size:.85rem;color:#7A6652;margin-bottom:.375rem}
        .info-box{font-size:.8rem;color:#7A6652;padding:.5rem;background:#FFF8EE;border-radius:.35rem;margin:.5rem 0}

        .counter{display:flex;align-items:center;gap:.75rem;margin:.5rem 0}
        .counter-btn{width:2.5rem;height:2.5rem;border:2px solid #E8DFD4;border-radius:.5rem;background:#fff;cursor:pointer;font-size:1.25rem;font-weight:bold;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#7A6652}
        .counter-btn:hover{border-color:#F5A623;background:#FFF8EE}
        .counter-value{font-size:1.5rem;font-weight:bold;min-width:2rem;text-align:center}

        .option-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;margin-bottom:1rem}
        .option-btn{background:#fff;border:2px solid #E8DFD4;border-radius:.5rem;padding:.5rem;cursor:pointer;font-size:.85rem;transition:all .15s;text-align:center}
        .option-btn:hover{border-color:#F5A623;background:#FFF8EC}
        .option-btn.selected{border-color:#F5A623;background:#FFF8EC;font-weight:600}

        .badge{display:inline-block;padding:.15rem .5rem;border-radius:999px;font-size:.72rem;font-weight:600}
        .badge-green{background:#E8F5EC;color:#2D8A4E}
        .badge-blue{background:#EEF2FF;color:#3B82F6}

        .volk-card.ableger{border-color:#A7F3D0;background:#F0FFF4}
        .volk-card.ableger:hover{border-color:#34D399;box-shadow:0 4px 12px rgba(16,185,129,.2)}

        /* Toast kommt aus shared-styles.css */

        .loading-screen{position:fixed;inset:0;background:#FFFBF0;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1rem}
        .spinner{width:40px;height:40px;border:4px solid #E8DFD4;border-top-color:#F5A623;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* GTS Styles */
        .standort-gts-row{display:flex;align-items:center;gap:.75rem;margin-top:.75rem;padding:.75rem;background:#FFFBF0;border-radius:.5rem;border:1.5px solid #E8DFD4}
        .standort-gts-value{font-weight:700;font-size:1.1rem;min-width:75px}
        .standort-gts-bar-bg{background:#E8DFD4;border-radius:999px;height:.5rem;overflow:hidden}
        .standort-gts-bar-fill{height:100%;border-radius:999px;transition:width .8s ease}
        .standort-gts-next{font-size:.75rem;color:#7A6652;margin-top:.35rem}
        .standort-gts-status{font-size:.7rem;color:#A69580}

        @media(max-width:768px){
            body{padding-left:0;padding-bottom:90px}
            .nav{display:none}
            .mobile-nav{display:flex}
            .volk-grid{grid-template-columns:1fr}
            .modal-content{max-width:100%;border-radius:1rem 1rem 0 0}
            .option-grid{grid-template-columns:repeat(2,1fr)}
        }
    </style>
</head>
<body>

<nav class="nav" id="mainNav"></nav>
<div class="mobile-nav" id="mobileNavBar"></div>
<div class="mobile-menu-overlay" id="mobileMenuOverlay" onclick="if(event.target===this)mobileMenuClose()"></div>
<script src="nav.js"></script>

<div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div style="color:#7A6652;font-size:.85rem">Standorte laden...</div>
</div>

<div class="toast" id="toast"></div>
<div id="app"></div>

<!-- Standort Modal -->
<div id="standortModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="standortModalTitle">📍 Neuer Standort</h2>
            <button class="close-btn" onclick="closeModal('standortModal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Name des Standorts *</label>
                <input type="text" id="standortName" class="input" placeholder="z.B. Heimstand Garten">
            </div>
            <div class="form-group">
                <label class="form-label">Anzahl Völker</label>
                <div class="counter">
                    <button class="counter-btn" onclick="changeVoelkerCount(-1)">−</button>
                    <div class="counter-value" id="standortVoelkerCount">2</div>
                    <button class="counter-btn" onclick="changeVoelkerCount(1)">+</button>
                </div>
                <div class="info-box">Die Völker werden automatisch erstellt</div>
            </div>
            <div class="form-group">
                <label class="form-label">Notizen (optional)</label>
                <textarea id="standortNotizen" class="input" placeholder="z.B. Südseite, geschützter Bereich"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">📍 Position auf Karte wählen</label>
                <div id="standortMapPicker" style="height:250px;border-radius:.75rem;border:2px solid #E8DFD4;margin-bottom:.5rem;position:relative;z-index:1001"></div>
                <input type="hidden" id="standortLat" value="">
                <input type="hidden" id="standortLng" value="">
                <div id="standortKoordStatus" style="font-size:.8rem;color:#7A6652"></div>
                <div class="info-box">💡 Klicke auf die Karte um den Standort zu setzen.</div>
            </div>
            <button style="width:100%;padding:.75rem;background:#F5A623;color:#fff;border:none;border-radius:.5rem;font-weight:600;cursor:pointer;font-size:.95rem" onclick="saveStandort()">Standort speichern</button>
        </div>
    </div>
</div>

<!-- Volk Modal -->
<div id="volkModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="volkModalTitle">🐝 Volk Details</h2>
            <button class="close-btn" onclick="closeModal('volkModal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Name des Volkes *</label>
                <input type="text" id="volkName" class="input" placeholder="z.B. Volk 1">
            </div>
            <div class="form-group">
                <label class="form-label">Beutensystem</label>
                <select id="volkBeute" class="input">
                    <option value="Dadant">Dadant</option>
                    <option value="Zander">Zander</option>
                    <option value="Deutsch Normal">Deutsch Normal</option>
                    <option value="Langstroth">Langstroth</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Typ</label>
                <div class="option-grid" id="volkTypGrid">
                    <button class="option-btn selected" onclick="setVolkTyp('volk',this)">🐝 Volk</button>
                    <button class="option-btn" onclick="setVolkTyp('ableger',this)">🌱 Ableger</button>
                </div>
                <div id="volkHochstufenWrap" style="display:none;margin-top:.5rem">
                    <button onclick="hochstufenZuVolk()" style="width:100%;padding:.5rem;background:#E8F5EC;border:1.5px solid #A7F3D0;border-radius:.5rem;cursor:pointer;font-weight:600;font-size:.85rem">⬆️ Zu Volk hochstufen</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <div class="option-grid" id="volkStatusGrid">
                    <button class="option-btn selected" onclick="setVolkStatus('ok',this)">✅ Gut</button>
                    <button class="option-btn" onclick="setVolkStatus('schwach',this)">⚠️ Schwach</button>
                    <button class="option-btn" onclick="setVolkStatus('weisellos',this)">👑 Weisellos</button>
                    <button class="option-btn" onclick="setVolkStatus('problem',this)">❌ Problem</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Notizen</label>
                <textarea id="volkNotizen" class="input" placeholder="Besonderheiten..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">🍯 Honigernte</label>
                <div id="volkHonigInfo" style="padding:.5rem .75rem;background:#FFF8EE;border-radius:.5rem;font-size:.9rem;color:#7A6652">Lade...</div>
                <div style="font-size:.75rem;color:#94a3b8;margin-top:.25rem">Erträge werden über <a href="ernte.html" style="color:#F5A623">🍯 Honigernte</a> erfasst</div>
            </div>
            <button style="width:100%;padding:.75rem;background:#F5A623;color:#fff;border:none;border-radius:.5rem;font-weight:600;cursor:pointer;font-size:.95rem" onclick="saveVolk()">Volk speichern</button>
            <button style="width:100%;padding:.75rem;background:#ef4444;color:#fff;border:none;border-radius:.5rem;font-weight:600;cursor:pointer;font-size:.95rem;margin-top:.5rem" onclick="deleteVolk()">🗑️ Volk löschen</button>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="plan.js"></script>
<script src="presence.js" defer></script>
<script>
// ============================================
// STANDORTE & VÖLKER - EIGENSTÄNDIGE SEITE
// ============================================

var standorte = [];
var voelker = [];
var selectedStandortId = null;
var editStandortId = null;
var editVolkId = null;
var selectedVolkStatus = 'ok';
var selectedVolkTyp = 'volk';
var voelkerCount = 2;

// ============================================
// INIT
// ============================================
async function init() {
    var { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'app.html'; return; }
    currentUser = session.user;
    await planManager.load();

    var results = await Promise.all([
        sb.from('standorte').select('*').eq('user_id', currentUser.id),
        sb.from('voelker').select('*').eq('user_id', currentUser.id)
    ]);

    standorte = (results[0].data || []).map(function(r) {
        return { id: r.id, name: r.name, notizen: r.notizen, mapsLink: r.maps_link, lat: r.lat, lng: r.lng, created: r.created_at };
    });
    voelker = (results[1].data || []).map(function(r) {
        return { id: r.id, standortId: r.standort_id, name: r.name, beutensystem: r.beutensystem, status: r.status, typ: r.typ||'volk', notizen: r.notizen, honigertrag: parseFloat(r.honigertrag)||0, created: r.created_at };
    });

    document.getElementById('loadingScreen').style.display = 'none';

    // Deeplink: ?standort=ID&volk=ID
    var params = new URLSearchParams(window.location.search);
    if (params.get('standort')) {
        selectedStandortId = params.get('standort');
        if (params.get('volk')) {
            setTimeout(function() { openVolkModal(params.get('volk')); }, 300);
        }
    }

    render();
}

// ============================================
// HELPERS
// ============================================
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
function fd(ts) { if (!ts) return '-'; return new Date(ts).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function toast(msg, type) {
    type = type || 'success';
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + type + ' show';
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// ============================================
// GTS MODULE
// ============================================
var GTS_SCHWELLEN = {
    'Schneeglöckchen':50,'Haselnuss':80,'Erle':90,'Huflattich':100,'Krokus':100,
    'Weide':130,'Kornelkirsche':130,'Schlehe':150,'Pflaume':190,
    'Kirsche':200,'Löwenzahn':200,'Obstblüte':200,'Birne':210,'Apfel':220,
    'Raps':250,'Flieder':280,'Rosskastanie':280,'Weißdorn':300,
    'Himbeere':320,'Akazie (Robinie)':350,'Klee (Weiß)':350,
    'Brombeere':400,'Klee (Rot)':400,'Fichte (Honigtau)':400,'Kornblume':400,
    'Eiche (Honigtau)':420,'Phacelia':450,'Edelkastanie':450,
    'Linde (Sommer)':500,'Lavendel':500,'Goldrute':500,
    'Springkraut (Indisches)':550,'Linde (Winter)':550,'Sonnenblume':550,
    'Heide':700,'Herbstastern':700,'Efeu':900
};

var gtsCache = {};

function berechneGTS(temperaturen) {
    // temperaturen = Array von {date:'YYYY-MM-DD', temp: number}
    var summe = 0;
    temperaturen.forEach(function(t) {
        if (t.temp <= 0) return;
        var monat = parseInt(t.date.split('-')[1]);
        var faktor = monat === 1 ? 0.5 : (monat === 2 ? 0.75 : 1.0);
        summe += t.temp * faktor;
    });
    return Math.round(summe * 10) / 10;
}

async function ladeGTS(lat, lng) {
    var key = lat.toFixed(2) + '_' + lng.toFixed(2);
    var heute = new Date().toISOString().split('T')[0];
    var cacheKey = 'gts_' + key + '_' + heute;

    // localStorage Cache prüfen (1x pro Tag)
    try {
        var cached = localStorage.getItem(cacheKey);
        if (cached) return JSON.parse(cached);
    } catch(e) {}

    var jahr = new Date().getFullYear();
    var startDate = jahr + '-01-01';
    // Gestern als Enddatum (heutige Daten evtl. noch nicht komplett)
    var gestern = new Date(Date.now() - 86400000);
    var endDate = gestern.toISOString().split('T')[0];

    try {
        var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng +
            '&daily=temperature_2m_mean&start_date=' + startDate + '&end_date=' + endDate + '&timezone=Europe/Berlin';
        var resp = await fetch(url);
        if (!resp.ok) throw new Error('API Fehler');
        var data = await resp.json();
        if (!data.daily || !data.daily.time) throw new Error('Keine Daten');

        var temperaturen = data.daily.time.map(function(d, i) {
            return { date: d, temp: data.daily.temperature_2m_mean[i] };
        });

        var gts = berechneGTS(temperaturen);
        var result = { gts: gts, datum: heute, lat: lat, lng: lng };

        try { localStorage.setItem(cacheKey, JSON.stringify(result)); } catch(e) {}
        gtsCache[key] = result;
        return result;
    } catch(e) {
        console.warn('GTS Laden fehlgeschlagen:', e);
        return null;
    }
}

function getGtsColor(gts) {
    if (gts < 100) return '#EF4444';
    if (gts < 200) return '#F59E0B';
    return '#10B981';
}

function getGtsStatus(gts) {
    if (gts < 100) return { text: 'Winter / Vorfrühling', emoji: '❄️' };
    if (gts < 200) return { text: 'Frühling beginnt', emoji: '🌱' };
    if (gts < 350) return { text: 'Vegetation aktiv', emoji: '🌿' };
    if (gts < 500) return { text: 'Vollfrühling/Sommer', emoji: '☀️' };
    return { text: 'Hochsommer', emoji: '🌻' };
}

function getNextTracht(gts) {
    var sorted = Object.entries(GTS_SCHWELLEN).sort(function(a,b){ return a[1]-b[1]; });
    for (var i = 0; i < sorted.length; i++) {
        if (sorted[i][1] > gts) {
            return { name: sorted[i][0], gts: sorted[i][1], diff: Math.round(sorted[i][1] - gts) };
        }
    }
    return null;
}

function renderGtsZeile(gts) {
    var color = getGtsColor(gts);
    var status = getGtsStatus(gts);
    var next = getNextTracht(gts);
    var pct = Math.min(100, (gts / 600) * 100);

    var html = '<div class="standort-gts-row">' +
        '<div>' +
        '<div class="standort-gts-value" style="color:' + color + '">🌡️ ' + Math.round(gts) + '°C</div>' +
        '<div class="standort-gts-status">' + status.emoji + ' ' + status.text + '</div>' +
        '</div>' +
        '<div style="flex:1">' +
        '<div class="standort-gts-bar-bg"><div class="standort-gts-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';

    if (next) {
        html += '<div class="standort-gts-next">Nächste Tracht: ' + next.name + ' (ab ~' + next.gts + '°C – noch ' + next.diff + '°C)</div>';
    } else {
        html += '<div class="standort-gts-next" style="color:#059669">✅ Alle Haupttrachten erreichbar</div>';
    }
    html += '</div></div>';
    return html;
}

async function ladeAlleGTS() {
    var promises = standorte.filter(function(s){ return s.lat && s.lng; }).map(function(s) {
        return ladeGTS(s.lat, s.lng).then(function(result) {
            if (result) {
                var el = document.getElementById('gts_' + s.id);
                if (el) el.innerHTML = renderGtsZeile(result.gts);
            }
        });
    });
    await Promise.all(promises);
}
function openModal(id) {
    // Leaflet-Container erzeugen hohe z-index Werte - diese beim Modal unterdrücken
    document.querySelectorAll('.leaflet-container').forEach(function(el){ el.style.zIndex = '0'; });
    document.getElementById(id).classList.add('active');
}
function closeModal(id) {
    document.getElementById(id).classList.remove('active');
    // Leaflet z-index wiederherstellen
    document.querySelectorAll('.leaflet-container').forEach(function(el){ el.style.zIndex = ''; });
    if (id === 'standortModal') { editStandortId = null; }
    if (id === 'volkModal') { editVolkId = null; }
}

// ============================================
// MAP PICKER
// ============================================
function initMapPicker() {
    var container = document.getElementById('standortMapPicker');
    if (!container) return;
    if (container._mapInstance) { container._mapInstance.remove(); container._mapInstance = null; }
    container.innerHTML = '';
    var startLat = parseFloat(document.getElementById('standortLat').value) || 49.0;
    var startLng = parseFloat(document.getElementById('standortLng').value) || 10.0;
    var startZoom = document.getElementById('standortLat').value ? 14 : 6;
    var map = L.map(container, {zoomControl:true}).setView([startLat, startLng], startZoom);
    container._mapInstance = map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OSM', maxZoom:19}).addTo(map);
    var marker = null;
    if (document.getElementById('standortLat').value) {
        marker = L.marker([startLat, startLng]).addTo(map);
        document.getElementById('standortKoordStatus').innerHTML = '<span style="color:#10b981">✅ Position: '+startLat.toFixed(4)+', '+startLng.toFixed(4)+'</span>';
    }
    map.on('click', function(e){
        document.getElementById('standortLat').value = e.latlng.lat;
        document.getElementById('standortLng').value = e.latlng.lng;
        document.getElementById('standortKoordStatus').innerHTML = '<span style="color:#10b981">✅ Position: '+e.latlng.lat.toFixed(4)+', '+e.latlng.lng.toFixed(4)+'</span>';
        if (marker) map.removeLayer(marker);
        marker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
    });
    setTimeout(function(){ map.invalidateSize(); }, 100);
    setTimeout(function(){ map.invalidateSize(); }, 500);
}

// ============================================
// STANDORT CRUD
// ============================================
function changeVoelkerCount(delta) {
    voelkerCount = Math.max(0, voelkerCount + delta);
    document.getElementById('standortVoelkerCount').textContent = voelkerCount;
}

function openStandortModal(id) {
    if (id) {
        var s = standorte.find(function(x){return x.id === id;});
        if (s) {
            editStandortId = id;
            document.getElementById('standortModalTitle').textContent = '📍 Standort bearbeiten';
            document.getElementById('standortName').value = s.name;
            var vAnzahl = voelker.filter(function(v){return v.standortId === id;}).length;
            voelkerCount = vAnzahl;
            document.getElementById('standortVoelkerCount').textContent = vAnzahl;
            document.getElementById('standortNotizen').value = s.notizen || '';
            document.getElementById('standortLat').value = s.lat || '';
            document.getElementById('standortLng').value = s.lng || '';
        }
    } else {
        editStandortId = null;
        voelkerCount = 2;
        document.getElementById('standortModalTitle').textContent = '📍 Neuer Standort';
        document.getElementById('standortName').value = '';
        document.getElementById('standortVoelkerCount').textContent = '2';
        document.getElementById('standortNotizen').value = '';
        document.getElementById('standortLat').value = '';
        document.getElementById('standortLng').value = '';
        document.getElementById('standortKoordStatus').innerHTML = '';

}

function saveStandort() {
    var name = document.getElementById('standortName').value.trim();
    var notizen = document.getElementById('standortNotizen').value.trim();
    var lat = parseFloat(document.getElementById('standortLat').value) || null;
    var lng = parseFloat(document.getElementById('standortLng').value) || null;

    if (!name) { alert('Bitte Namen eingeben!'); return; }

    // Plan-Limits prüfen bei neuem Standort
    if (!editStandortId) {
        if (!planManager.checkLimit('standorte', standorte.length)) {
            planManager.showLimitReached('standorte');
            return;
        }
        if (!planManager.checkLimit('voelker', voelker.length + voelkerCount)) {
            planManager.showLimitReached('voelker');
            return;
        }
    }

    if (editStandortId) {
        var s = standorte.find(function(x){return x.id === editStandortId;});
        if (s) {
            s.name = name; s.notizen = notizen; s.lat = lat; s.lng = lng;

            var aktuelleVoelker = voelker.filter(function(v){return v.standortId === editStandortId;});
            var diff = voelkerCount - aktuelleVoelker.length;

            if (diff > 0) {
                for (var i = 0; i < diff; i++) {
                    var nv = { id: 'v' + uid(), standortId: editStandortId, name: 'Volk ' + (aktuelleVoelker.length + i + 1), beutensystem: 'Dadant', status: 'ok', typ: 'volk', notizen: '', honigertrag: 0, created: Date.now() };
                    voelker.push(nv);
                    db.upsert('voelker', {id:nv.id, user_id:currentUser.id, standort_id:nv.standortId, name:nv.name, beutensystem:nv.beutensystem, status:nv.status, typ:nv.typ, notizen:'', honigertrag:0, created_at:nv.created});
                }
            } else if (diff < 0) {
                var zuLoeschen = aktuelleVoelker.slice(diff);
                zuLoeschen.forEach(function(v){
                    voelker = voelker.filter(function(x){return x.id !== v.id;});
                    db.del('voelker', v.id);
                });
            }

            db.update('standorte', {name:s.name, notizen:s.notizen, lat:s.lat, lng:s.lng}, s.id);
        }
    } else {
        var standortId = 's' + uid();
        standorte.push({ id: standortId, name: name, notizen: notizen, mapsLink: '', lat: lat, lng: lng, created: Date.now() });
        db.upsert('standorte', {id:standortId, user_id:currentUser.id, name:name, notizen:notizen, maps_link:'', lat:lat, lng:lng, created_at:Date.now()});

        for (var i = 1; i <= voelkerCount; i++) {
            var nv = { id: 'v' + uid(), standortId: standortId, name: 'Volk ' + i, beutensystem: 'Dadant', status: 'ok', typ: 'volk', notizen: '', honigertrag: 0, created: Date.now() };
            voelker.push(nv);
            db.upsert('voelker', {id:nv.id, user_id:currentUser.id, standort_id:nv.standortId, name:nv.name, beutensystem:nv.beutensystem, status:nv.status, typ:nv.typ, notizen:'', honigertrag:0, created_at:nv.created});
        }
    }

    closeModal('standortModal');
    render();
    toast(editStandortId ? '✓ Standort aktualisiert!' : '✓ Standort erstellt!', 'success');
}

function delStandort(id) {
    if (!confirm('Standort und alle Völker wirklich löschen?')) return;
    standorte = standorte.filter(function(s){return s.id !== id;});
    voelker = voelker.filter(function(v){return v.standortId !== id;});
    db.del('standorte', id);

}

// ============================================
// SCHWARMTRIEB-PROGNOSE
// ============================================
function renderSchwarmPrognose(standort, sVoelker) {
    var monat = new Date().getMonth() + 1;
    var tag = new Date().getDate();
    // Basis-Risiko nach Monat (Mitteleuropa)
    var monatsRisiko = {1:0,2:0,3:5,4:25,5:70,6:60,7:30,8:10,9:5,10:0,11:0,12:0};
    var basis = monatsRisiko[monat] || 0;
    if (monat === 4 && tag > 15) basis += 15;
    if (monat === 5 && tag < 15) basis += 10;
    if (monat === 5 && tag >= 15) basis -= 5;
    // Starke Völker = höheres Risiko
    var starke = sVoelker.filter(function(v){return v.status==='ok'&&(v.typ||'volk')==='volk';}).length;
    var total = sVoelker.filter(function(v){return (v.typ||'volk')==='volk';}).length || 1;
    var risiko = Math.round(basis * (0.6 + (starke/total) * 0.6));
    risiko = Math.max(0, Math.min(100, risiko));
    // Texte
    var info, intervall;
    if (monat < 4) { info = 'Schwarmzeit beginnt voraussichtlich im April. Jetzt Vorbeuge planen.'; }
    else if (monat >= 4 && monat <= 6) { info = 'Mitten in der Schwarmzeit! Regelmäßige Kontrolle empfohlen.'; }
    else if (monat === 7) { info = 'Schwarmzeit klingt ab. Einzelne Nachschwärme möglich.'; }
    else { info = 'Schwarmzeit ist vorbei. Nächste Saison ab April.'; }
    if (risiko >= 60) intervall = 'Alle 7 Tage kontrollieren!';
    else if (risiko >= 30) intervall = 'Alle 9 Tage kontrollieren';
    else if (risiko >= 10) intervall = 'Alle 14 Tage kontrollieren';
    else intervall = 'Keine Schwarmkontrolle nötig';
    // Farben
    var farbe, bg, border, emoji, stufe;
    if (risiko >= 60) { farbe='#DC2626';bg='#FEF2F2';border='#FECACA';emoji='🔴';stufe='Hoch'; }
    else if (risiko >= 30) { farbe='#D97706';bg='#FFFBEB';border='#FDE68A';emoji='🟡';stufe='Mittel'; }
    else if (risiko >= 10) { farbe='#2563EB';bg='#EFF6FF';border='#BFDBFE';emoji='🔵';stufe='Niedrig'; }
    else { farbe='#10b981';bg='#F0FDF4';border='#BBF7D0';emoji='🟢';stufe='Minimal'; }

    var h = '<div style="background:'+bg+';border:2px solid '+border+';border-radius:.75rem;padding:1rem 1.25rem;margin:1rem 0">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">';
    h += '<div style="font-weight:700;font-size:.95rem">🌪️ Schwarmtrieb-Prognose</div>';
    h += '<div style="display:flex;align-items:center;gap:.375rem">'+emoji+'<span style="font-weight:700;color:'+farbe+'">'+stufe+' ('+risiko+'%)</span></div></div>';
    h += '<div style="background:rgba(0,0,0,.08);height:8px;border-radius:4px;margin-bottom:.75rem;overflow:hidden">';
    h += '<div style="height:100%;width:'+Math.max(5,risiko)+'%;background:'+farbe+';border-radius:4px;transition:width .5s"></div></div>';
    h += '<div style="font-size:.82rem;color:#7A6652;margin-bottom:.5rem">'+info+'</div>';
    h += '<div style="display:flex;gap:.75rem;flex-wrap:wrap">';
    h += '<div style="background:#fff;padding:.4rem .75rem;border-radius:.5rem;font-size:.78rem;font-weight:600">⏱️ '+intervall+'</div>';
    h += '<div style="background:#fff;padding:.4rem .75rem;border-radius:.5rem;font-size:.78rem">💪 '+starke+'/'+total+' Völker stark</div>';
    h += '</div></div>';
    return h;
}

// ============================================
function initMiniMaps() {
    setTimeout(function(){
        standorte.forEach(function(s){
            if (s.lat && s.lng) {
                var el = document.getElementById('minimap_'+s.id);
                if (!el || el._mapDone) return;
                el._mapDone = true;
                try {
                    var map = L.map(el, {
                        zoomControl:false, dragging:false, scrollWheelZoom:false,
                        doubleClickZoom:false, touchZoom:false, attributionControl:false
                    }).setView([s.lat, s.lng], 14);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:17}).addTo(map);
                    L.marker([s.lat, s.lng]).addTo(map);
                    setTimeout(function(){ map.invalidateSize(); }, 300);
                } catch(e) { console.warn('Minimap Error:', e); }
            }
        });
    }, 150);
}

    if (e.persisted) {
        // Seite kam aus dem Cache zurück - Karten wieder zeigen
        document.querySelectorAll('.leaflet-container').forEach(function(el){ 
            el.style.visibility = 'visible'; 
        });
    }
});
</script>
</body>
</html>
