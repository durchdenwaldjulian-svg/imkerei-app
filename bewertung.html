<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>β≠ê VΟΕlker-Bewertung βÄ™ Imkerei Tagesplaner</title>
    <meta name="theme-color" content="#F5A623">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="fonts/fonts.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        /* === BEWERTUNG-SPECIFIC STYLES === */
        body{padding-left:220px;padding-bottom:2rem}
        
        .container{max-width:800px;margin:0 auto;padding:1rem}
        
        /* === NAV (gleiche Sidebar wie app.html) === */
        .nav{position:fixed;left:0;top:0;bottom:0;width:220px;background:#FFFBF0;border-right:2px solid rgba(245,166,35,0.12);display:flex;flex-direction:column;padding:0;z-index:50;overflow-y:auto}
        .nav-brand{padding:1.25rem 1rem;border-bottom:2px solid rgba(245,166,35,0.12)}
        .nav-section{font-size:.65rem;font-weight:700;color:#A69580;text-transform:uppercase;letter-spacing:.08em;padding:.75rem 1rem .25rem}
        .nav-item{display:block;padding:.625rem 1rem;text-align:left;cursor:pointer;border:none;background:none;color:#7A6652;font-size:.85rem;border-left:4px solid transparent;transition:all .15s;width:100%;text-decoration:none}
        .nav-item:hover{background:rgba(245,166,35,0.06)}
        .nav-item.active{color:#92400E;font-weight:600;border-left-color:#F5A623;background:#FFF8EE}
        
        .stars{display:flex;gap:2px;cursor:pointer}
        .stars .star{font-size:1.5rem;color:#E8DFD4;transition:color .15s;user-select:none}
        .stars .star.active{color:#F5A623}
        .stars .star:hover{color:#f7bc5e}
        .radar-wrap{position:relative;width:100%;max-width:320px;margin:0 auto}
        .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1C1410;color:#fff;padding:.75rem 1.5rem;border-radius:999px;font-size:.85rem;z-index:9999;display:none;animation:fadeIn .3s}
        
        @media(max-width:768px){
            body{padding-left:0;padding-bottom:90px}
            .nav{left:0;right:0;top:auto;bottom:0;width:100%;height:auto;flex-direction:row;border-right:none;border-top:2px solid rgba(245,166,35,0.12);overflow-x:auto;overflow-y:hidden}
            .nav-brand,.nav-section{display:none}
            .nav-item{flex:0 0 auto;padding:.5rem .6rem;font-size:.6rem;text-align:center;border-left:none;border-bottom:3px solid transparent;white-space:nowrap}
            .nav-item.active{border-left:none;border-bottom-color:#F5A623}
        }

        /* === SPRACHEINGABE === */
        #speechFab{position:fixed;bottom:2rem;right:2rem;width:60px;height:60px;border-radius:50%;border:none;background:linear-gradient(135deg,#F5A623,#E8960C);color:#fff;font-size:1.6rem;cursor:pointer;box-shadow:0 4px 16px rgba(245,166,35,0.4);z-index:100;transition:all .2s;display:flex;align-items:center;justify-content:center}
        #speechFab:hover{transform:scale(1.08)}
        #speechFab.active{background:linear-gradient(135deg,#ef4444,#dc2626);animation:fabPulse 1.5s infinite}
        @keyframes fabPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 14px rgba(239,68,68,0)}}

        #speechPanel{position:fixed;top:0;right:0;bottom:0;width:420px;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,0.15);z-index:200;display:none;flex-direction:column;animation:spSlideIn .3s ease}
        #speechPanel.active{display:flex}
        @keyframes spSlideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
        .sp-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:2px solid rgba(245,166,35,0.12);background:#FFFBF0}
        .sp-dot{width:10px;height:10px;background:#ef4444;border-radius:50%;display:inline-block;animation:spBlink 1s infinite}
        @keyframes spBlink{0%,100%{opacity:1}50%{opacity:.3}}
        .sp-body{flex:1;overflow-y:auto;padding:1rem 1.25rem}
        .sp-volk-box{padding:.75rem 1rem;background:linear-gradient(135deg,#FFFBF0,#fff);border:2px solid rgba(245,166,35,0.15);border-radius:.75rem;margin-bottom:1rem}
        .sp-volk-name{font-size:1.1rem;font-weight:700;color:#1C1410}
        .sp-volk-standort{font-size:.8rem;color:#7A6652}
        .sp-volk-placeholder{color:#94a3b8;font-size:.9rem}
        .sp-krit-row{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid #f5f0eb;font-size:.85rem}
        .sp-krit-row.changed{background:#fefce8;margin:0 -.25rem;padding:.4rem .25rem;border-radius:.25rem}
        .sp-krit-stars{color:#F5A623;letter-spacing:1px}
        .sp-krit-stars .off{color:#E8DFD4}
        .sp-transcript{background:#f8f6f3;border-radius:.75rem;padding:.75rem 1rem;margin:1rem 0;min-height:60px;max-height:100px;overflow-y:auto;font-size:.85rem;color:#7A6652;line-height:1.5}
        .sp-transcript .interim{color:#94a3b8;font-style:italic}
        .sp-log{font-size:.78rem;max-height:140px;overflow-y:auto;margin-top:.75rem}
        .sp-log-entry{padding:.3rem 0;border-bottom:1px solid #f5f0eb;color:#7A6652}
        .sp-footer{display:flex;gap:.5rem;padding:1rem 1.25rem;border-top:2px solid rgba(245,166,35,0.12);background:#FFFBF0}
        .sp-footer .btn{flex:1}
        .sp-hint{font-size:.75rem;color:#94a3b8;text-align:center;margin-top:.5rem;line-height:1.4}

        @media(max-width:768px){
            #speechPanel{width:100%;top:0}
            #speechFab{bottom:5.5rem;right:1rem}
        }
    </style>
</head>
<body>

<nav class="nav" id="mainNav"></nav>
<div class="mobile-nav" id="mobileNavBar"></div>
<div class="mobile-menu-overlay" id="mobileMenuOverlay" onclick="if(event.target===this)mobileMenuClose()"></div>
<script src="nav.js"></script>

<div id="loadingOverlay" style="display:flex;justify-content:center;align-items:center;min-height:50vh">
    <div style="text-align:center;color:#7A6652">
        <div style="font-size:3rem;margin-bottom:1rem">β≠ê</div>
        <div>Lade Bewertungen...</div>
    </div>
</div>

<div id="app" style="display:none"></div>
<div id="toast" class="toast"></div>

<!-- Spracheingabe FAB + Panel -->
<button id="speechFab" onclick="toggleSpeech()" title="Sprachmodus starten">πüéΛ</button>

<div id="speechPanel">
    <div class="sp-header">
        <div style="display:flex;align-items:center;gap:.5rem">
            <span class="sp-dot"></span>
            <strong>Sprachmodus</strong>
        </div>
        <button class="close-btn" onclick="toggleSpeech()">β€ï</button>
    </div>
    <div class="sp-body">
        <div id="spVolkBox" class="sp-volk-box">
            <div class="sp-volk-placeholder">πüéΛ Sage ein Volk: <em>"Volk 1"</em></div>
        </div>
        <div id="spKriterien"></div>
        <div id="spTranscript" class="sp-transcript">
            <span style="color:#94a3b8">Warte auf Sprache...</span>
        </div>
        <div class="sp-hint">
            πü£Γ "Volk 1, Sanftmut 4, Wabensitz gut, kein Schwarmtrieb..."<br>
            "Ableger von Volk 1" ¬Ζ "Notiz: sehr ruhig heute" ¬Ζ "Speichern" ¬Ζ "Fertig"
        </div>
        <div id="spLog" class="sp-log"></div>
    </div>
    <div class="sp-footer">
        <button class="btn btn-primary" onclick="saveCurrentSprachBewertung()">πü£Ψ Speichern</button>
        <button class="btn" style="background:#ef4444;color:#fff" onclick="toggleSpeech()">βèΙ Stopp</button>
    </div>
</div>

<!-- Bewertung Modal -->
<div id="bewertungModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="bewertungModalTitle">β≠ê Volk bewerten</h2>
            <button class="close-btn" onclick="closeModal()">β€ï</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Volk</label>
                <select id="bewVolk" class="input">
                    <option value="">-- Volk wΟΛhlen --</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Datum</label>
                <input type="date" id="bewDatum" class="input">
            </div>
            
            <div id="kriterienContainer"></div>
            
            <div class="form-group">
                <label class="form-label">Notizen</label>
                <textarea id="bewNotizen" class="input" rows="2" placeholder="Besonderheiten, Zuchtempfehlung..."></textarea>
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="saveBewertung()">πü£Ψ Bewertung speichern</button>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="plan.js"></script>
<script src="presence.js" defer></script>
<script>
// ============================================
// BEWERTUNG MODULE
// ============================================

const KRITERIEN = [
    {key:'sanftmut', label:'πüΛ≤ Sanftmut', desc:'Stechverhalten, AggressivitΟΛt'},
    {key:'wabensitz', label:'πüΣΒ Wabensitz', desc:'Bleiben die Bienen auf der Wabe?'},
    {key:'schwarmtrieb', label:'πüêù Schwarmtrieb', desc:'5 = kein Schwarmtrieb'},
    {key:'volksstaerke', label:'πü£Σ VolksstΟΛrke', desc:'Bienenmasse, Brutnest'},
    {key:'winterfestigkeit', label:'βù³οΗè Winterfestigkeit', desc:'Ο€berwinterungserfolg, Futterverbrauch'},
    {key:'hygiene', label:'πüßΙ Hygieneverhalten', desc:'Kalkbrut, Varroatoleranz'},
    {key:'wabenbau', label:'πüè½οΗè Wabenbau', desc:'Sauberer, gleichmΟΛΟüiger Bau'},
    {key:'honigfleiss', label:'πüç· HonigfleiΟü', desc:'Sammeleifer, Ertrag'}
];

var standorte = [];
var voelker = [];
var bewertungen = [];
var editId = null;
var activeTab = 'bewerten';
var bewertungWerte = {};
var collapsedStandorte = [];

// ============================================
// INIT
// ============================================
async function init() {
    var { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'app.html'; return; }
    currentUser = session.user;
    await planManager.load();
    if (!planManager.can('bewertung')) {
        planManager.showUpgradeHint('bewertung');
        return;
    }
    
    var results = await Promise.all([
        sb.from('standorte').select('*').eq('user_id', currentUser.id),
        sb.from('voelker').select('*').eq('user_id', currentUser.id),
        sb.from('bewertungen').select('*').eq('user_id', currentUser.id).order('datum', {ascending: false}),
        sb.from('profiles').select('bewertung_collapsed').eq('id', currentUser.id).single()
    ]);
    
    standorte = (results[0].data || []).map(function(r){
        return {id:r.id, name:r.name};
    });
    voelker = (results[1].data || []).map(function(r){
        return {id:r.id, standortId:r.standort_id, name:r.name, status:r.status};
    });
    bewertungen = (results[2].data || []).map(function(r){
        return {
            id:r.id, volkId:r.volk_id, volkName:r.volk_name, standortName:r.standort_name, datum:r.datum,
            sanftmut:r.sanftmut||3, wabensitz:r.wabensitz||3, schwarmtrieb:r.schwarmtrieb||3,
            volksstaerke:r.volksstaerke||3, winterfestigkeit:r.winterfestigkeit||3, hygiene:r.hygiene||3,
            wabenbau:r.wabenbau||3, honigfleiss:r.honigfleiss||3, notizen:r.notizen||'', created:r.created_at
        };
    });
    
    // Einklapp-Zustand laden
    if (results[3].data && results[3].data.bewertung_collapsed) {
        collapsedStandorte = results[3].data.bewertung_collapsed;
    }
    
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
}

// ============================================
// RENDER
// ============================================
function render() {
    var html = '<div class="container">';
    
    html += '<div class="tab-bar">';
    html += '<button class="tab-btn '+(activeTab==='bewerten'?'active':'')+'" onclick="activeTab=\'bewerten\';render()">β≠ê Bewerten</button>';
    html += '<button class="tab-btn '+(activeTab==='ranking'?'active':'')+'" onclick="activeTab=\'ranking\';render()">πüèÜ Ranking</button>';
    html += '<button class="tab-btn '+(activeTab==='verlauf'?'active':'')+'" onclick="activeTab=\'verlauf\';render()">πü™à Verlauf</button>';
    html += '</div>';
    
    if (activeTab === 'bewerten') html += renderBewerten();
    else if (activeTab === 'ranking') html += renderRanking();
    else html += renderVerlauf();
    
    html += '</div>';
    document.getElementById('app').innerHTML = html;
}

// ============================================
// TAB: BEWERTEN
// ============================================
function renderBewerten() {
    var html = '';
    
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">';
    html += '<h2 style="font-size:1.1rem">VΟΕlker bewerten</h2>';
    html += '<button class="btn btn-primary btn-sm" onclick="openModal()">+ Neue Bewertung</button>';
    html += '</div>';
    
    // Nach Standort gruppiert
    standorte.forEach(function(s){
        var sVoelker = voelker.filter(function(v){return v.standortId===s.id;});
        if (sVoelker.length === 0) return;
        
        var isCollapsed = collapsedStandorte.indexOf(s.id) > -1;
        var pfeil = isCollapsed ? 'β•Ε' : 'β•Φ';
        
        html += '<div class="card">';
        html += '<h3 style="margin-bottom:.75rem;cursor:pointer;user-select:none;display:flex;align-items:center;gap:.5rem" onclick="toggleStandort(\''+s.id+'\')">';
        html += '<span style="font-size:.8rem;color:#7A6652;width:1rem;text-align:center">'+pfeil+'</span>';
        html += 'πü™ç '+s.name+' <span style="font-size:.75rem;color:#7A6652;font-weight:400">('+sVoelker.length+' VΟΕlker)</span>';
        html += '</h3>';
        
        if (!isCollapsed) {
        sVoelker.forEach(function(v){
            // Letzte Bewertung fΟΦr dieses Volk
            var letzte = bewertungen.find(function(b){return b.volkId===v.id;});
            var schnitt = letzte ? durchschnitt(letzte) : null;
            var schnittBadge = schnitt ? getBadge(schnitt) : '';
            
            html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:.625rem 0;border-bottom:1px solid #FFFBF0">';
            html += '<div>';
            html += '<div style="font-weight:600">πüêù '+v.name+'</div>';
            if (letzte) {
                var datum = new Date(letzte.datum).toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'});
                html += '<div style="font-size:.75rem;color:#7A6652">Letzte: '+datum+' ¬Ζ '+renderMiniStars(schnitt)+'</div>';
            } else {
                html += '<div style="font-size:.75rem;color:#94a3b8">Noch nicht bewertet</div>';
            }
            html += '</div>';
            html += '<div style="display:flex;gap:.25rem">';
            html += '<button class="btn btn-primary btn-xs" onclick="openModal(null,\''+v.id+'\')">β≠ê</button>';
            if (letzte) html += '<button class="btn btn-blue btn-xs" onclick="openModal(\''+letzte.id+'\')">β€èοΗè</button>';
            html += '</div>';
            html += '</div>';
        });
        }
        
        html += '</div>';
    });
    
    // Letzte Bewertungen
    if (bewertungen.length > 0) {
        html += '<div class="card">';
        html += '<h3 style="margin-bottom:.75rem">πü™΄ Letzte Bewertungen</h3>';
        bewertungen.slice(0,10).forEach(function(b){
            var datum = new Date(b.datum).toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'});
            var schnitt = durchschnitt(b);
            html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid #FFFBF0">';
            html += '<div>';
            html += '<div style="font-weight:500;font-size:.9rem">πüêù '+b.volkName+' '+renderMiniStars(schnitt)+'</div>';
            html += '<div style="font-size:.75rem;color:#7A6652">'+datum+(b.standortName?' ¬Ζ πü™ç '+b.standortName:'')+'</div>';
            if (b.notizen) html += '<div style="font-size:.75rem;color:#94a3b8">'+b.notizen+'</div>';
            html += '</div>';
            html += '<div style="display:flex;gap:.25rem">';
            html += '<button class="btn btn-blue btn-xs" onclick="openModal(\''+b.id+'\')">β€èοΗè</button>';
            html += '<button class="btn btn-danger btn-xs" onclick="deleteBewertung(\''+b.id+'\')">πü½ëοΗè</button>';
            html += '</div></div>';
        });
        html += '</div>';
    }
    
    return html;
}

// ============================================
// TAB: RANKING
// ============================================
function renderRanking() {
    var html = '';
    
    // FΟΦr jedes Volk die letzte Bewertung nehmen und ranken
    var volkRanking = [];
    voelker.forEach(function(v){
        var bews = bewertungen.filter(function(b){return b.volkId===v.id;});
        if (bews.length === 0) return;
        var letzte = bews[0]; // bereits nach Datum sortiert
        var schnitt = durchschnitt(letzte);
        var sName = '';
        var s = standorte.find(function(x){return x.id===v.standortId;});
        if (s) sName = s.name;
        volkRanking.push({volk:v, bewertung:letzte, schnitt:schnitt, standortName:sName});
    });
    
    volkRanking.sort(function(a,b){return b.schnitt - a.schnitt;});
    
    if (volkRanking.length === 0) {
        html += '<div class="card" style="text-align:center;padding:2rem;color:#7A6652">';
        html += '<div style="font-size:3rem;margin-bottom:.5rem">πüèÜ</div>';
        html += '<p>Noch keine Bewertungen vorhanden.</p>';
        html += '<button class="btn btn-primary" style="margin-top:1rem" onclick="activeTab=\'bewerten\';render()">Erste Bewertung erstellen</button>';
        html += '</div>';
        return html;
    }
    
    // Top 3
    html += '<div class="card">';
    html += '<h3 style="margin-bottom:1rem;text-align:center">πüèÜ Zucht-Ranking</h3>';
    
    volkRanking.forEach(function(item, i){
        var medal = i === 0 ? 'πüΞ΅' : (i === 1 ? 'πüΞà' : (i === 2 ? 'πüΞâ' : (i+1)+'.'));
        var b = item.bewertung;
        var barWidth = (item.schnitt / 5 * 100);
        var barColor = item.schnitt >= 4 ? '#10b981' : (item.schnitt >= 3 ? '#F5A623' : (item.schnitt >= 2 ? '#f59e0b' : '#ef4444'));
        
        html += '<div style="padding:.75rem 0;border-bottom:1px solid #FFFBF0">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.375rem">';
        html += '<div style="display:flex;align-items:center;gap:.5rem">';
        html += '<span style="font-size:1.25rem;width:2rem;text-align:center">'+medal+'</span>';
        html += '<div><div style="font-weight:600">'+item.volk.name+'</div>';
        html += '<div style="font-size:.75rem;color:#7A6652">πü™ç '+item.standortName+'</div></div>';
        html += '</div>';
        html += '<div style="font-size:1.25rem;font-weight:bold;color:'+barColor+'">'+item.schnitt.toFixed(1)+'</div>';
        html += '</div>';
        
        // Mini-Balken pro Kriterium
        html += '<div style="display:flex;gap:3px;margin-left:2.5rem">';
        KRITERIEN.forEach(function(k){
            var val = b[k.key] || 3;
            var w = (val/5*100);
            var c = val >= 4 ? '#10b981' : (val >= 3 ? '#F5A623' : '#ef4444');
            html += '<div style="flex:1;height:6px;background:#E8DFD4;border-radius:3px" title="'+k.label+': '+val+'/5"><div style="height:100%;border-radius:3px;background:'+c+';width:'+w+'%"></div></div>';
        });
        html += '</div>';
        
        // StΟΛrken/SchwΟΛchen
        var staerken = KRITERIEN.filter(function(k){return (b[k.key]||3) >= 4;}).map(function(k){return k.label.split(' ')[0];});
        var schwaechen = KRITERIEN.filter(function(k){return (b[k.key]||3) <= 2;}).map(function(k){return k.label.split(' ')[0];});
        if (staerken.length || schwaechen.length) {
            html += '<div style="margin-left:2.5rem;margin-top:.25rem;font-size:.7rem">';
            if (staerken.length) html += '<span style="color:#10b981">β•≤ '+staerken.join(' ')+'</span> ';
            if (schwaechen.length) html += '<span style="color:#ef4444">β•Φ '+schwaechen.join(' ')+'</span>';
            html += '</div>';
        }
        
        html += '</div>';
    });
    
    html += '</div>';
    
    // Empfehlung
    if (volkRanking.length >= 2) {
        var beste = volkRanking[0];
        html += '<div class="card" style="background:linear-gradient(135deg,#f0fdf4,#fff);border-left:4px solid #10b981">';
        html += '<h3 style="margin-bottom:.5rem">πüëë Zuchtempfehlung</h3>';
        html += '<p style="font-size:.9rem;color:#7A6652"><strong>'+beste.volk.name+'</strong> (πü™ç '+beste.standortName+') hat mit <strong>'+beste.schnitt.toFixed(1)+'/5.0</strong> die beste Gesamtbewertung. ';
        var topKrit = KRITERIEN.slice().sort(function(a,b){return (beste.bewertung[b.key]||3)-(beste.bewertung[a.key]||3);}).slice(0,3);
        html += 'Besonders stark bei: '+topKrit.map(function(k){return k.label;}).join(', ')+'.';
        html += '</p></div>';
    }
    
    return html;
}

// ============================================
// TAB: VERLAUF
// ============================================
function renderVerlauf() {
    var html = '';
    
    // Volk-Auswahl
    html += '<div class="card">';
    html += '<h3 style="margin-bottom:.75rem">πü™à Bewertungsverlauf</h3>';
    html += '<select class="input" onchange="selectedVerlaufVolk=this.value;render()" id="verlaufVolk">';
    html += '<option value="">-- Volk wΟΛhlen --</option>';
    voelker.forEach(function(v){
        var s = standorte.find(function(x){return x.id===v.standortId;});

// HELPERS
// ============================================
function durchschnitt(b) {
    var sum = 0;
    KRITERIEN.forEach(function(k){ sum += (b[k.key] || 3); });
    return sum / KRITERIEN.length;
}

function getBadge(schnitt) {
    if (schnitt >= 4) return '<span class="badge badge-green">Sehr gut</span>';
    if (schnitt >= 3) return '<span class="badge badge-yellow">Gut</span>';
    return '<span class="badge badge-red">Schwach</span>';
}

function renderMiniStars(schnitt) {
    var full = Math.round(schnitt);
    var html = '';
    for (var i = 1; i <= 5; i++) {
        html += '<span style="color:'+(i<=full?'#F5A623':'#E8DFD4')+';font-size:.85rem">β‰Ö</span>';
    }
    return html;
}

async function saveBewertung() {
    var volkId = document.getElementById('bewVolk').value;
    var datum = document.getElementById('bewDatum').value;
    var notizen = document.getElementById('bewNotizen').value.trim();
    
    if (!volkId || !datum) {
        alert('Bitte Volk und Datum auswΟΛhlen!');
        return;
    }
    
    var v = voelker.find(function(x){return x.id===volkId;});
    var volkName = v ? v.name : '';
    var s = v ? standorte.find(function(x){return x.id===v.standortId;}) : null;
    var standortName = s ? s.name : '';
    
    var data = {
        volk_id: volkId,
        volk_name: volkName,
        standort_name: standortName,
        datum: datum,
        sanftmut: bewertungWerte.sanftmut,
        wabensitz: bewertungWerte.wabensitz,
        schwarmtrieb: bewertungWerte.schwarmtrieb,
        volksstaerke: bewertungWerte.volksstaerke,
        winterfestigkeit: bewertungWerte.winterfestigkeit,
        hygiene: bewertungWerte.hygiene,
        wabenbau: bewertungWerte.wabenbau,
        honigfleiss: bewertungWerte.honigfleiss,
        notizen: notizen
    };
    
    if (editId) {
        var res = await sb.from('bewertungen').update(data).eq('id', editId);
        if (res.error) { alert('Fehler: '+res.error.message); return; }
        
        var idx = bewertungen.findIndex(function(x){return x.id===editId;});
        if (idx > -1) {
            bewertungen[idx] = Object.assign({id:editId, created:bewertungen[idx].created}, {volkId:volkId, volkName:volkName, standortName:standortName, datum:datum, notizen:notizen}, bewertungWerte);
        }
        toast('β€Ö Bewertung aktualisiert');
    } else {
        var id = crypto.randomUUID();
        data.id = id;
        data.user_id = currentUser.id;
        var res = await sb.from('bewertungen').insert(data);
        if (res.error) { alert('Fehler: '+res.error.message); return; }
        
        bewertungen.unshift(Object.assign({id:id, created:new Date().toISOString()}, {volkId:volkId, volkName:volkName, standortName:standortName, datum:datum, notizen:notizen}, bewertungWerte));
        toast('β€Ö Bewertung gespeichert');
    }
    
    closeModal();
    render();
}

async function deleteBewertung(id) {
    if (!confirm('Bewertung wirklich lΟΕschen?')) return;
    await sb.from('bewertungen').delete().eq('id', id);
    bewertungen = bewertungen.filter(function(b){return b.id!==id;});
    toast('πü½ëοΗè Bewertung gelΟΕscht');
    render();
}

function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(function(){ el.style.display = 'none'; }, 2500);
}

function toggleStandort(id) {
    var idx = collapsedStandorte.indexOf(id);
    if (idx > -1) {
        collapsedStandorte.splice(idx, 1);
    } else {
        collapsedStandorte.push(id);

    // In Supabase speichern

var speechActive = false;
var recognition = null;
var currentSprachVolk = null;
var sprachBewertungen = {}; // {volkId: {werte:{...}, notizen:'', changed:[]}}
var sprachLogEntries = [];

// Keyword-Zuordnung fΟΦr Kriterien
var KRITERIEN_KEYWORDS = {
    sanftmut: ['sanftmut', 'sanftmΟΦtig', 'sanft'],
    wabensitz: ['wabensitz', 'waben sitz'],
    schwarmtrieb: ['schwarmtrieb', 'schwarm'],
    volksstaerke: ['volksstΟΛrke', 'volks stΟΛrke', 'stΟΛrke'],
    winterfestigkeit: ['winterfest', 'winterfestigkeit'],
    hygiene: ['hygiene', 'hygieneverhalten'],
    wabenbau: ['wabenbau', 'waben bau'],
    honigfleiss: ['honigfleiΟü', 'honigfleiss', 'honig fleiΟü', 'honig fleiss']
};

// Wort βÜ£ Zahl
var WORT_BEWERTUNG = [
    ['sehr schlecht', 1], ['miserabel', 1], ['katastrophal', 1],
    ['schlecht', 2], ['schwach', 2], ['mangelhaft', 2], ['mΟΛΟüig', 2],
    ['mittel', 3], ['okay', 3], ['durchschnittlich', 3], ['geht so', 3], ['mittelmΟΛΟüig', 3],
    ['gut', 4], ['ordentlich', 4], ['solide', 4], ['passt', 4],
    ['sehr gut', 5], ['super', 5], ['top', 5], ['hervorragend', 5], ['perfekt', 5], ['ausgezeichnet', 5], ['exzellent', 5], ['spitze', 5]
];
// Sortiert nach LΟΛnge (lΟΛngere zuerst matchen)
WORT_BEWERTUNG.sort(function(a, b) { return b[0].length - a[0].length; });

// Spezial-Phrasen
var SPECIAL_PHRASES = [
    ['kein schwarmtrieb', 'schwarmtrieb', 5],
    ['nicht schwarmlustig', 'schwarmtrieb', 5],
    ['kaum schwarmtrieb', 'schwarmtrieb', 4],
    ['schwarmlustig', 'schwarmtrieb', 2],
    ['sehr schwarmlustig', 'schwarmtrieb', 1],
    ['starker schwarmtrieb', 'schwarmtrieb', 1],
    ['sticht nicht', 'sanftmut', 5],
    ['sehr sanft', 'sanftmut', 5],
    ['total sanft', 'sanftmut', 5],
    ['etwas stechlustig', 'sanftmut', 2],
    ['stechlustig', 'sanftmut', 1],
    ['aggressiv', 'sanftmut', 1],
    ['sehr aggressiv', 'sanftmut', 1]
];
SPECIAL_PHRASES.sort(function(a, b) { return b[0].length - a[0].length; });

// ZahlwΟΕrter
var ZAHLWOERTER = {eins:1,zwei:2,drei:3,vier:4,fΟΦnf:5,sechs:6,sieben:7,acht:8,neun:9,zehn:10,
    ein:1,erste:1,zweite:2,dritte:3,vierte:4,fΟΦnfte:5};

function toggleSpeech() {
    if (speechActive) {
        stopSpeech();
    } else {
        startSpeech();
    }
}

function startSpeech() {
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert('Spracheingabe wird von deinem Browser nicht unterstΟΦtzt. Bitte Chrome oder Edge verwenden.');
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'de-DE';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    recognition.onresult = function(event) {
        var interim = '';
        for (var i = event.resultIndex; i < event.results.length; i++) {
            var text = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
                processSpeechResult(text);
            } else {
                interim = text;
            }
        }
        // Live-Anzeige
        var el = document.getElementById('spTranscript');
        if (interim) {
            el.innerHTML = '<span class="interim">πüéΛ ' + interim + '</span>';
        }
    };

    recognition.onerror = function(event) {
        if (event.error === 'no-speech') return; // Normal, ignorieren
        if (event.error === 'aborted') return;
        addSprachLog('βö†οΗè Fehler: ' + event.error);
    };

    recognition.onend = function() {
        // Automatisch neustarten wenn noch aktiv (Mobile bricht oft ab)
        if (speechActive) {
            try { recognition.start(); } catch(e) {}
        }
    };

    try {
        recognition.start();
    } catch(e) {
        alert('Mikrofon konnte nicht gestartet werden: ' + e.message);
        return;
    }

    speechActive = true;
    currentSprachVolk = null;
    sprachBewertungen = {};
    sprachLogEntries = [];
    document.getElementById('speechFab').classList.add('active');
    document.getElementById('speechPanel').classList.add('active');
    updateSpeechPanel();
    addSprachLog('πüéΛ Sprachmodus gestartet');
}

function stopSpeech() {
    speechActive = false;
    if (recognition) {
        try { recognition.stop(); } catch(e) {}
        recognition = null;
    }
    document.getElementById('speechFab').classList.remove('active');
    document.getElementById('speechPanel').classList.remove('active');
    // Letzte Bewertung speichern falls vorhanden
    if (currentSprachVolk) {
        autoSaveSprachBewertung();
    }
    render();
}

function processSpeechResult(text) {
    var lower = text.toLowerCase().trim();
    if (!lower) return;

    // Transcript anzeigen
    document.getElementById('spTranscript').innerHTML = 'πü£§ <em>"' + text.trim() + '"</em>';

    // Voice-Commands
    if (lower.match(/^(stopp|stop|fertig|beenden)$/)) {
        addSprachLog('βèΙ Sprachmodus beendet');
        stopSpeech();
        return;
    }
    if (lower.match(/speichern/)) {
        saveCurrentSprachBewertung();
        return;
    }

    // Ableger erkennen
    if (lower.match(/ableger/)) {
        handleSprachAbleger(lower);
        return;
    }

    // Notiz erkennen
    var notizMatch = lower.match(/notiz[:\s]+(.+)/);
    if (notizMatch && currentSprachVolk && sprachBewertungen[currentSprachVolk.id]) {
        var n = sprachBewertungen[currentSprachVolk.id].notizen;
        sprachBewertungen[currentSprachVolk.id].notizen = n ? n + '. ' + notizMatch[1].trim() : notizMatch[1].trim();
        addSprachLog('πü™ù Notiz hinzugefΟΦgt');
        updateSpeechPanel();
        return;
    }

    // Volk erkennen
    var volkMatch = detectSprachVolk(lower);
    if (volkMatch && (!currentSprachVolk || currentSprachVolk.id !== volkMatch.id)) {
        // Vorheriges Volk automatisch speichern
        if (currentSprachVolk && sprachBewertungen[currentSprachVolk.id]) {
            autoSaveSprachBewertung();
        }
        currentSprachVolk = volkMatch;
        if (!sprachBewertungen[volkMatch.id]) {
            initSprachBewertung(volkMatch.id);
        }
        var st = standorte.find(function(s) { return s.id === volkMatch.standortId; });
        addSprachLog('πüêù ' + volkMatch.name + (st ? ' (πü™ç ' + st.name + ')' : ''));
    }

    // Kriterien + Bewertungen extrahieren
    if (currentSprachVolk) {
        extractSprachRatings(lower);
    } else if (!volkMatch) {
        addSprachLog('βö†οΗè Sage zuerst ein Volk, z.B. "Volk 1"');
    }

    updateSpeechPanel();
}

function detectSprachVolk(text) {
    // "Volk [Name/Nummer]" erkennen
    var patterns = [
        /(?:volk|folk|wo?lk)\s+(.+?)(?:\s+(?:sanftmut|wabensitz|schwarm|stΟΛrke|winter|hygiene|wabenbau|honig|ist|hat|notiz)|[,.]|$)/i
    ];

    for (var p = 0; p < patterns.length; p++) {
        var match = text.match(patterns[p]);
        if (match) {
            var found = findSprachVolk(match[1].trim());
            if (found) return found;
        }
    }

    // Auch ohne "Volk"-Prefix: direkt Volknamen matchen
    for (var i = 0; i < voelker.length; i++) {
        var vName = voelker[i].name.toLowerCase();
        // Exakter Match am Anfang des Textes
        if (text.startsWith(vName + ' ') || text === vName) {
            return voelker[i];
        }
    }

    return null;
}

function findSprachVolk(spokenName) {
    var normalized = spokenName.toLowerCase().trim();

    // ZahlwΟΕrter ersetzen
    Object.keys(ZAHLWOERTER).forEach(function(wort) {
        normalized = normalized.replace(new RegExp('\\b' + wort + '\\b', 'g'), String(ZAHLWOERTER[wort]));
    });

    // Exakter Match
    var found = voelker.find(function(v) { return v.name.toLowerCase() === normalized; });
    if (found) return found;

    // Match mit "Volk " Prefix
    found = voelker.find(function(v) { return v.name.toLowerCase() === 'volk ' + normalized; });
    if (found) return found;

    // Partial Match (enthΟΛlt den gesprochenen Namen)
    found = voelker.find(function(v) {
        return v.name.toLowerCase().includes(normalized) || normalized.includes(v.name.toLowerCase());
    });
    if (found) return found;

    // Nummer-Match (z.B. "1" βÜ£ "Volk 1")
    if (/^\d+$/.test(normalized)) {
        found = voelker.find(function(v) {
            return v.name.match(new RegExp('\\b' + normalized + '\\b'));
        });
        if (found) return found;
    }

    return null;
}

function initSprachBewertung(volkId) {
    var werte = {};
    KRITERIEN.forEach(function(k) { werte[k.key] = 3; });
    sprachBewertungen[volkId] = { werte: werte, notizen: '', changed: [] };
}

function extractSprachRatings(text) {
    if (!currentSprachVolk) return;
    var data = sprachBewertungen[currentSprachVolk.id];
    if (!data) return;

    // 1. Spezial-Phrasen zuerst
    SPECIAL_PHRASES.forEach(function(sp) {
        if (text.includes(sp[0])) {
            data.werte[sp[1]] = sp[2];
            if (data.changed.indexOf(sp[1]) === -1) data.changed.push(sp[1]);
            addSprachLog('β€Ö ' + getLabelForKey(sp[1]) + ' βÜ£ ' + sp[2] + '/5');
            text = text.replace(sp[0], ' ');
        }
    });

    // 2. Kriterium + Bewertung Muster erkennen
    KRITERIEN.forEach(function(k) {
        var keywords = KRITERIEN_KEYWORDS[k.key];
        for (var ki = 0; ki < keywords.length; ki++) {
            var idx = text.indexOf(keywords[ki]);
            if (idx === -1) continue;

            var after = text.substring(idx + keywords[ki].length).trim();
            // "ist" oder ":" ΟΦberspringen
            after = after.replace(/^(ist|hat|war|wird|:|,)\s*/, '');

            var rating = parseSprachRating(after);
            if (rating) {
                data.werte[k.key] = rating;
                if (data.changed.indexOf(k.key) === -1) data.changed.push(k.key);
                addSprachLog('β€Ö ' + k.label + ' βÜ£ ' + rating + '/5');
            }
            break; // Nur ersten Treffer pro Kriterium
        }
    });
}

function parseSprachRating(text) {
    text = text.trim().toLowerCase();

    // Zahl am Anfang: "4", "5"
    var numMatch = text.match(/^(\d)/);
    if (numMatch) {
        var n = parseInt(numMatch[1]);
        if (n >= 1 && n <= 5) return n;
    }

    // Zahlwort am Anfang: "vier", "fΟΦnf"
    for (var wort in ZAHLWOERTER) {
        if (text.startsWith(wort)) {
            var val = ZAHLWOERTER[wort];
            if (val >= 1 && val <= 5) return val;
        }
    }

    // Wort-Bewertungen: "sehr gut", "gut", etc.
    for (var i = 0; i < WORT_BEWERTUNG.length; i++) {
        if (text.startsWith(WORT_BEWERTUNG[i][0])) {
            return WORT_BEWERTUNG[i][1];
        }
    }

    return null;
}

function getLabelForKey(key) {
    var k = KRITERIEN.find(function(x) { return x.key === key; });
    return k ? k.label : key;
}

// Ableger per Sprache
async function handleSprachAbleger(text) {
    var fromVolk = currentSprachVolk;

    // "Ableger von Volk 1"
    var vonMatch = text.match(/ableger\s+(?:von|vom|aus)\s+(.+?)(?:[,.]|$)/i);
    if (vonMatch) {
        var found = findSprachVolk(vonMatch[1].trim());
        if (found) fromVolk = found;
    }

    if (!fromVolk) {
        addSprachLog('βö†οΗè Kein Volk fΟΦr Ableger erkannt. Sage z.B. "Ableger von Volk 1"');
        updateSpeechPanel();
        return;
    }

    var standortId = fromVolk.standortId;
    var ablegerName = 'Ableger v. ' + fromVolk.name;

    // PrΟΦfen ob schon ein Ableger mit dem Namen existiert
    var existing = voelker.filter(function(v) { return v.name.startsWith('Ableger v. ' + fromVolk.name); });
    if (existing.length > 0) {
        ablegerName = 'Ableger v. ' + fromVolk.name + ' (' + (existing.length + 1) + ')';
    }

    var id = crypto.randomUUID();
    var res = await sb.from('voelker').insert({
        id: id,
        name: ablegerName,
        standort_id: standortId,
        user_id: currentUser.id,
        status: 'aktiv'
    });

    if (res.error) {
        addSprachLog('βù¨ Fehler: ' + res.error.message);
    } else {
        voelker.push({id: id, standortId: standortId, name: ablegerName, status: 'aktiv'});
        addSprachLog('πüêù ' + ablegerName + ' erstellt!');
        toast('πüêù ' + ablegerName + ' erstellt!');
    }
    updateSpeechPanel();
}

// Speichern
async function saveCurrentSprachBewertung() {
    if (!currentSprachVolk) {
        addSprachLog('βö†οΗè Kein Volk ausgewΟΛhlt');
        return;
    }
    await autoSaveSprachBewertung();
    // Reset fΟΦr nΟΛchstes Volk
    currentSprachVolk = null;
    updateSpeechPanel();
}

async function autoSaveSprachBewertung() {
    if (!currentSprachVolk) return;
    var data = sprachBewertungen[currentSprachVolk.id];
    if (!data) return;

    // Nur speichern wenn mindestens ein Wert geΟΛndert wurde
    if (data.changed.length === 0 && !data.notizen) {
        addSprachLog('β³ΙοΗè Nichts zu speichern fΟΦr ' + currentSprachVolk.name);
        return;
    }

    var v = currentSprachVolk;
    var s = standorte.find(function(x) { return x.id === v.standortId; });
    var today = new Date().toISOString().slice(0, 10);

    var dbData = {
        id: crypto.randomUUID(),
        user_id: currentUser.id,
        volk_id: v.id,
        volk_name: v.name,
        standort_name: s ? s.name : '',
        datum: today,
        notizen: data.notizen || ''
    };
    KRITERIEN.forEach(function(k) { dbData[k.key] = data.werte[k.key]; });

    var res = await sb.from('bewertungen').insert(dbData);
    if (res.error) {
        addSprachLog('βù¨ Speichern fehlgeschlagen: ' + res.error.message);
    } else {
        var newBew = {
            id: dbData.id, created: new Date().toISOString(),
            volkId: v.id, volkName: v.name, standortName: dbData.standort_name,
            datum: today, notizen: data.notizen || ''
        };
        KRITERIEN.forEach(function(k) { newBew[k.key] = data.werte[k.key]; });
        bewertungen.unshift(newBew);
        addSprachLog('πü£Ψ ' + v.name + ' gespeichert (' + data.changed.length + ' Kriterien)');
        toast('πü£Ψ Bewertung fΟΦr ' + v.name + ' gespeichert');
        // Daten zurΟΦcksetzen fΟΦr dieses Volk
        delete sprachBewertungen[v.id];
    }
}

// UI Updates
function updateSpeechPanel() {
    // Volk-Box
    var volkBox = document.getElementById('spVolkBox');
    if (currentSprachVolk) {
        var st = standorte.find(function(s) { return s.id === currentSprachVolk.standortId; });
        volkBox.innerHTML = '<div class="sp-volk-name">πüêù ' + currentSprachVolk.name + '</div>' +
            (st ? '<div class="sp-volk-standort">πü™ç ' + st.name + '</div>' : '');
    } else {
        volkBox.innerHTML = '<div class="sp-volk-placeholder">πüéΛ Sage ein Volk: <em>"Volk 1"</em></div>';
    }

    // Kriterien
    var kritEl = document.getElementById('spKriterien');
    if (currentSprachVolk && sprachBewertungen[currentSprachVolk.id]) {
        var data = sprachBewertungen[currentSprachVolk.id];
        var html = '';
        KRITERIEN.forEach(function(k) {
            var val = data.werte[k.key];
            var isChanged = data.changed.indexOf(k.key) > -1;
            html += '<div class="sp-krit-row' + (isChanged ? ' changed' : '') + '">';
            html += '<span>' + k.label + '</span>';
            html += '<span class="sp-krit-stars">';
            for (var i = 1; i <= 5; i++) {
                html += '<span' + (i > val ? ' class="off"' : '') + '>β‰Ö</span>';
            }
            html += ' <span style="font-size:.75rem;color:#7A6652">' + val + '/5</span>';
            html += '</span></div>';
        });
        if (data.notizen) {
            html += '<div style="padding:.5rem 0;font-size:.8rem;color:#7A6652;border-top:1px solid #f5f0eb;margin-top:.25rem">πü™ù ' + data.notizen + '</div>';
        }
        kritEl.innerHTML = html;
    } else {
        kritEl.innerHTML = '';
    }

    // Log
    var logEl = document.getElementById('spLog');
    logEl.innerHTML = sprachLogEntries.map(function(e) {
        return '<div class="sp-log-entry">' + e + '</div>';
    }).join('');
    logEl.scrollTop = logEl.scrollHeight;
}

function addSprachLog(msg) {
    var time = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    sprachLogEntries.push('<span style="color:#94a3b8">' + time + '</span> ' + msg);
    if (sprachLogEntries.length > 30) sprachLogEntries.shift();
}

init();
</script>
