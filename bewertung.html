<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📋 Stockkarte – Imkerei Tagesplaner</title>
    <meta name="theme-color" content="#F5A623">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="/fonts/fonts.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        /* === BEWERTUNG-SPECIFIC STYLES === */
        body{padding-left:220px;padding-bottom:2rem}
        /* === NAV === */
        .nav{position:fixed;left:0;top:0;bottom:0;width:220px;background:#FFFBF0;border-right:2px solid rgba(245,166,35,0.12);display:flex;flex-direction:column;padding:0;z-index:50;overflow-y:auto}
        .nav-brand{padding:1.25rem 1rem;border-bottom:2px solid rgba(245,166,35,0.12)}
        .nav-section{font-size:.65rem;font-weight:700;color:#A69580;text-transform:uppercase;letter-spacing:.08em;padding:.75rem 1rem .25rem}
        .nav-item{display:block;padding:.625rem 1rem;text-align:left;cursor:pointer;border:none;background:none;color:#7A6652;font-size:.85rem;border-left:4px solid transparent;transition:all .15s;width:100%;text-decoration:none;font-family:inherit}
        .nav-item:hover{background:rgba(245,166,35,0.06)}
        .nav-item.active{color:#92400E;font-weight:600;border-left-color:#F5A623;background:#FFF8EE}
        body.modal-open{overflow:hidden}
        
        .container{max-width:800px;margin:0 auto;padding:1rem}
        
        .stars{display:flex;gap:2px;cursor:pointer}
        .stars .star{font-size:1.4rem;color:#E8DFD4;transition:color .15s;user-select:none}
        .stars .star.active{color:#F5A623}
        .stars .star:hover{color:#f7bc5e}
        
        /* Toast kommt aus shared-styles.css */

        /* === TÄTIGKEITEN KACHELN === */
        .taetig-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:.5rem;margin:.75rem 0}
        .taetig-chip{
            padding:.6rem .5rem;border:2px solid #E8DFD4;border-radius:.625rem;background:#fff;
            cursor:pointer;transition:all .2s;text-align:center;font-size:.78rem;font-weight:500;
            display:flex;flex-direction:column;align-items:center;gap:.25rem;
        }
        .taetig-chip:hover{border-color:#F5A623;background:#FFF8EE;transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,166,35,.15)}
        .taetig-chip.selected{border-color:#F5A623;background:#F5A623;color:#1C1410;font-weight:600}
        .taetig-chip .tc-icon{font-size:1.4rem;line-height:1}
        
        .sub-options{margin-top:.5rem;padding:.75rem;background:#FFFBF0;border-radius:.5rem;border:1px solid rgba(245,166,35,0.15)}
        .sub-chip{display:inline-block;padding:.35rem .6rem;border:1.5px solid #E8DFD4;border-radius:999px;font-size:.72rem;margin:.2rem;cursor:pointer;background:#fff;transition:all .15s}
        .sub-chip:hover{border-color:#F5A623;background:#FFF8EE}
        .sub-chip.selected{border-color:#F5A623;background:#F5A623;color:#1C1410;font-weight:600}
        
        .menge-row{display:flex;align-items:center;gap:.5rem;margin-top:.5rem;padding:.5rem .75rem;background:#FFFBF0;border-radius:.5rem;border:1px solid rgba(245,166,35,0.15)}
        .menge-input{width:80px;padding:.4rem .6rem;border:2px solid #d1d5db;border-radius:.5rem;font-size:.9rem;font-family:inherit;outline:none;text-align:center}
        .menge-input:focus{border-color:#F5A623}
        .menge-label{font-size:.8rem;color:#7A6652}
        
        /* === KÖNIGIN === */
        .koenigin-section{background:#FFFBF0;border-radius:.75rem;padding:1rem;border:1px solid rgba(245,166,35,0.15);margin-bottom:1rem}
        .koenigin-section h4{font-size:.9rem;margin-bottom:.75rem;color:#92400E;display:flex;align-items:center;gap:.35rem}
        .color-pills{display:flex;gap:.5rem;flex-wrap:wrap}
        .color-pill{width:32px;height:32px;border-radius:50%;border:3px solid #E8DFD4;cursor:pointer;transition:all .15s}
        .color-pill:hover{transform:scale(1.15)}
        .color-pill.selected{border-color:#1C1410;box-shadow:0 0 0 2px #F5A623;transform:scale(1.15)}
        .color-pill.c-weiss{background:#fff;border-color:#ccc}
        .color-pill.c-gelb{background:#facc15}
        .color-pill.c-rot{background:#ef4444}
        .color-pill.c-gruen{background:#22c55e}
        .color-pill.c-blau{background:#3b82f6}
        
        /* === VARROA === */
        .varroa-calc{background:linear-gradient(135deg,#fef3c7,#fff);border:1px solid #f59e0b;border-radius:.75rem;padding:1rem;margin-bottom:1rem}
        .varroa-result{font-size:1.5rem;font-weight:700;text-align:center;margin:.75rem 0 .25rem}
        .varroa-result.low{color:#10b981}
        .varroa-result.medium{color:#f59e0b}
        .varroa-result.high{color:#ef4444}
        .varroa-result.critical{color:#991b1b}
        
        /* === HISTORIE === */
        .historie-entry{padding:.75rem;border-bottom:1px solid #f5f0eb;transition:background .15s}
        .historie-entry:last-child{border-bottom:none}
        .historie-entry:hover{background:#FFFBF0}
        .historie-tags{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.35rem}
        .historie-tag{font-size:.65rem;padding:.15rem .4rem;border-radius:.25rem;background:#f5f0eb;color:#7A6652}
        
        /* === SECTION DIVIDER === */
        .section-divider{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0 1rem;color:#A69580;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
        .section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:#E8DFD4}
        
        /* === VOLK DETAIL VIEW === */
        .volk-detail{background:#FFFBF0;border-radius:.5rem;padding:.75rem;margin-top:.5rem;border:1px solid rgba(245,166,35,0.2);animation:slideDown .2s ease}
        @keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:2000px}}
        .volk-row-clickable{cursor:pointer;border-radius:.5rem;padding:.75rem;margin:0 -.25rem;transition:background .15s}
        .volk-row-clickable:hover{background:rgba(245,166,35,0.06)}
        
        .btn-outline{background:transparent;border:2px solid #E8DFD4;color:#7A6652}
        .btn-outline:hover{border-color:#F5A623;background:#FFF8EE}

        /* === SUCHLEISTE === */
        .such-bar{position:relative;margin-bottom:.75rem}
        .such-bar input{width:100%;padding:.6rem 1rem .6rem 2.5rem;border:2px solid #E8DFD4;border-radius:.75rem;font-size:.9rem;font-family:inherit;outline:none;background:#fff;transition:border-color .2s}
        .such-bar input:focus{border-color:#F5A623}
        .such-bar .such-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);font-size:1rem;color:#A69580;pointer-events:none}
        .such-bar .such-clear{position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1.1rem;cursor:pointer;color:#A69580;padding:.2rem;line-height:1}
        .such-ergebnis{background:#fff;border:2px solid #F5A623;border-radius:.75rem;padding:1.25rem;margin-bottom:1rem;animation:slideDown .2s ease}

        /* === STANDORT GRID === */
        .standort-card{background:#fff;border:2px solid #E8DFD4;border-radius:.75rem;padding:1rem;cursor:pointer;transition:all .2s}
        .standort-card:hover{border-color:#F5A623;box-shadow:0 4px 12px rgba(245,166,35,0.12);transform:translateY(-2px)}
        .standort-card.selected{border-color:#F5A623;background:#FFFBF0;box-shadow:0 4px 12px rgba(245,166,35,0.15)}
        .volk-grid-card{background:#fff;border:2px solid #E8DFD4;border-radius:.75rem;padding:.75rem;transition:all .2s}
        .volk-grid-card:hover{border-color:#F5A623;background:#FFFBF0}

        /* === STAMMBAUM === */
        .stammbaum-tree{display:flex;flex-direction:column;align-items:center;gap:0;padding:1rem 0}
        .stammbaum-node-card{background:linear-gradient(135deg,#FFFBF0,#fff);border:2px solid #E8DFD4;border-radius:1rem;padding:1rem 1.25rem;min-width:200px;max-width:300px;text-align:center;position:relative;transition:all .3s;box-shadow:0 2px 8px rgba(28,20,16,0.06)}
        .stammbaum-node-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(245,166,35,0.15);border-color:#F5A623}
        .stammbaum-node-card.root{border-color:#F5A623;border-width:3px;background:linear-gradient(135deg,#FFF8EE,#FFFBF0);box-shadow:0 4px 16px rgba(245,166,35,0.2)}
        .stammbaum-node-card.mutter{border-left:4px solid #D4930D}
        .stammbaum-node-card.drohne{border-left:4px solid #3B82F6}
        .stammbaum-connector{display:flex;flex-direction:column;align-items:center}
        .stammbaum-vline{width:3px;height:24px;background:linear-gradient(to bottom,#E8DFD4,#D4930D);border-radius:2px}
        .stammbaum-vline.drohne{background:linear-gradient(to bottom,#E8DFD4,#3B82F6)}
        .stammbaum-hline{height:3px;background:#E8DFD4;border-radius:2px}
        .stammbaum-eltern{display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;position:relative}
        .stammbaum-eltern::before{content:'';position:absolute;top:-12px;left:25%;right:25%;height:3px;background:#E8DFD4;border-radius:2px}
        .stammbaum-zweig{display:flex;flex-direction:column;align-items:center;flex:1;min-width:220px;max-width:350px}
        .stammbaum-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:.25rem .75rem;border-radius:999px;margin-bottom:.35rem}
        .stammbaum-label.mutter{background:#FFF3CD;color:#92400E}
        .stammbaum-label.drohne{background:#DBEAFE;color:#1E40AF}
        .stammbaum-badge{display:inline-block;font-size:.65rem;padding:.15rem .4rem;border-radius:.25rem;font-weight:600}
        .stammbaum-gen{font-size:.6rem;color:#A69580;position:absolute;top:-.5rem;right:-.5rem;background:#f5f0eb;padding:.1rem .35rem;border-radius:.25rem}
        
        /* === ZUCHTWERTKARTE (BeeBreed) === */
        .zw-card{background:linear-gradient(135deg,#fff,#FFFBF0);border:1px solid rgba(245,166,35,0.2);border-radius:.75rem;padding:.75rem;margin-bottom:.75rem}
        .zw-card h4{font-size:.85rem;color:#92400E;margin-bottom:.5rem;display:flex;align-items:center;gap:.35rem}
        .zw-nr{font-family:monospace;font-size:.78rem;color:#3b82f6;font-weight:600;background:#dbeafe;padding:.15rem .5rem;border-radius:.25rem;display:inline-block;margin-bottom:.5rem}
        .zw-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem;font-size:.78rem}
        .zw-label{width:95px;color:#7A6652;flex-shrink:0}
        .zw-value{width:32px;text-align:right;font-weight:700;font-size:.8rem}
        .zw-bar-bg{flex:1;height:10px;background:#E8DFD4;border-radius:5px;position:relative;overflow:hidden}
        .zw-bar-fill{height:100%;border-radius:5px;transition:width .4s ease}
        .zw-bar-ref{position:absolute;left:50%;top:0;bottom:0;width:1.5px;background:#1C1410;opacity:.3}
        .zw-sicher{width:28px;text-align:right;font-size:.65rem;color:#94a3b8}
        
        /* === ACCORDION SEKTIONEN === */
        .acc-section{margin-bottom:.75rem;border:1px solid rgba(245,166,35,0.12);border-radius:.75rem;overflow:hidden;background:#fff}
        .acc-header{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;cursor:pointer;background:#FFFBF0;transition:background .15s;user-select:none}
        .acc-header:hover{background:#FFF8EE}
        .acc-header h4{font-size:.9rem;font-weight:600;color:#1C1410;margin:0;display:flex;align-items:center;gap:.4rem}
        .acc-header .acc-arrow{font-size:.7rem;color:#7A6652;transition:transform .2s;display:inline-block}
        .acc-header .acc-badge{font-size:.7rem;color:#7A6652;font-weight:400}
        .acc-body{padding:1rem;display:none}
        .acc-section.open .acc-body{display:block}
        .acc-section.open .acc-arrow{transform:rotate(90deg)}
        .acc-section.has-data .acc-header{border-left:3px solid #10b981}
        
        .modal-footer-sticky{position:sticky;bottom:0;background:#fff;padding:1rem 1.5rem;border-top:2px solid rgba(245,166,35,0.12);box-shadow:0 -4px 12px rgba(28,20,16,0.06)}
        
        @media(max-width:768px){
            body{padding-left:0;padding-bottom:68px}
            .nav{display:none}
            .mobile-nav{display:flex}
            .taetig-grid{grid-template-columns:repeat(3,1fr);gap:.4rem}
            .taetig-chip{font-size:.72rem;padding:.5rem .35rem}
        }

        /* === SPRACHEINGABE === */
        #speechFab{position:fixed;bottom:2rem;right:2rem;width:60px;height:60px;border-radius:50%;border:none;background:linear-gradient(135deg,#F5A623,#E8960C);color:#fff;font-size:1.6rem;cursor:pointer;box-shadow:0 4px 16px rgba(245,166,35,0.4);z-index:100;transition:all .2s;display:flex;align-items:center;justify-content:center}
        #speechFab:hover{transform:scale(1.08)}
        #speechFab.active{background:linear-gradient(135deg,#ef4444,#dc2626);animation:fabPulse 1.5s infinite}
        @keyframes fabPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 14px rgba(239,68,68,0)}}
        #speechPanel{position:fixed;top:0;right:0;bottom:0;width:420px;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,0.15);z-index:200;display:none;flex-direction:column;animation:spSlideIn .3s ease}
        #speechPanel.active{display:flex}
        @keyframes spSlideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
        .sp-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:2px solid rgba(245,166,35,0.12);background:#FFFBF0}
        .sp-dot{width:10px;height:10px;background:#ef4444;border-radius:50%;display:inline-block;animation:spBlink 1s infinite}
        @keyframes spBlink{0%,100%{opacity:1}50%{opacity:.3}}
        .sp-body{flex:1;overflow-y:auto;padding:1rem 1.25rem}
        .sp-volk-box{padding:.75rem 1rem;background:linear-gradient(135deg,#FFFBF0,#fff);border:2px solid rgba(245,166,35,0.15);border-radius:.75rem;margin-bottom:1rem}
        .sp-volk-name{font-size:1.1rem;font-weight:700;color:#1C1410}
        .sp-volk-standort{font-size:.8rem;color:#7A6652}
        .sp-krit-row{display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px solid #f5f0eb;font-size:.82rem}
        .sp-krit-row.changed{background:#fefce8;margin:0 -.25rem;padding:.35rem .25rem;border-radius:.25rem}
        .sp-krit-stars{color:#F5A623;letter-spacing:1px}
        .sp-krit-stars .off{color:#E8DFD4}
        .sp-transcript{background:#f8f6f3;border-radius:.75rem;padding:.75rem 1rem;margin:1rem 0;min-height:60px;max-height:100px;overflow-y:auto;font-size:.85rem;color:#7A6652;line-height:1.5}
        .sp-transcript .interim{color:#94a3b8;font-style:italic}
        .sp-log{font-size:.78rem;max-height:140px;overflow-y:auto;margin-top:.75rem}
        .sp-log-entry{padding:.3rem 0;border-bottom:1px solid #f5f0eb;color:#7A6652}
        .sp-footer{display:flex;gap:.5rem;padding:1rem 1.25rem;border-top:2px solid rgba(245,166,35,0.12);background:#FFFBF0}
        .sp-footer .btn{flex:1}
        .sp-hint{font-size:.72rem;color:#94a3b8;text-align:center;margin-top:.5rem;line-height:1.4}
        .sp-dictate-area{width:100%;min-height:80px;border:2px dashed rgba(245,166,35,0.3);border-radius:.75rem;padding:.75rem;font-size:.95rem;font-family:inherit;resize:vertical;background:#FFFBF0;color:#1C1410;margin:.75rem 0}
        .sp-dictate-area:focus{border-color:#F5A623;outline:none}
        .sp-dictate-btn{width:100%;padding:.625rem;border:none;border-radius:.5rem;background:linear-gradient(135deg,#F5A623,#E8960C);color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;margin-bottom:.5rem}
        .sp-dictate-btn:active{transform:scale(.98)}
        @media(max-width:768px){
            #speechPanel{width:100%;top:0}
            #speechFab{bottom:5rem;right:1rem}
        }
    </style>
</head>
<body>

<nav class="nav" id="mainNav"></nav>
<div class="mobile-nav" id="mobileNavBar"></div>
<div class="mobile-menu-overlay" id="mobileMenuOverlay" onclick="if(event.target===this)mobileMenuClose()"></div>
<script src="nav.js"></script>

<div id="loadingOverlay" style="display:flex;justify-content:center;align-items:center;min-height:50vh">
    <div style="text-align:center;color:#7A6652">
        <div style="font-size:3rem;margin-bottom:1rem">📋</div>
        <div>Lade Stockkarte...</div>
    </div>
</div>

<div id="app" style="display:none"></div>
<div id="toast" class="toast"></div>

<!-- Spracheingabe FAB + Panel -->
<button id="speechFab" onclick="toggleSpeech()" title="Sprachmodus starten">🎤</button>
<div id="speechPanel">
    <div class="sp-header">
        <div style="display:flex;align-items:center;gap:.5rem">
            <span class="sp-dot"></span>
            <strong>Sprachmodus</strong>
        </div>
        <button class="close-btn" onclick="toggleSpeech()">✕</button>
    </div>
    <div class="sp-body">
        <div id="spVolkBox" class="sp-volk-box">
            <div style="color:#94a3b8;font-size:.9rem">🎤 Sage ein Volk: <em>"Volk 1"</em></div>
        </div>
        <div id="spKriterien"></div>
        <div id="spInputArea"></div>
        <div class="sp-hint">
            💡 "Volk 1, Sanftmut 4, Wabensitz gut, kein Schwarmtrieb..."<br>
            "Ableger von Volk 1" · "Notiz: sehr ruhig heute"
        </div>
        <div id="spLog" class="sp-log"></div>
    </div>
    <div class="sp-footer">
        <button class="btn btn-primary" onclick="saveCurrentSprachBewertung()">💾 Speichern</button>
        <button class="btn" style="background:#ef4444;color:#fff" onclick="toggleSpeech()">⏹ Stopp</button>
    </div>
</div>

<!-- Durchsicht Modal (Accordion-Sektionen, kein Wizard) -->
<div id="durchsichtModal" class="modal">
    <div class="modal-content" style="display:flex;flex-direction:column">
        <div class="modal-header">
            <h2 id="modalTitle">📋 Neue Durchsicht</h2>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modalBody" style="flex:1;overflow-y:auto"></div>
        <div class="modal-footer-sticky">
            <button class="btn btn-success" style="width:100%" onclick="saveDurchsicht()">💾 Speichern</button>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="plan.js"></script>
<script src="presence.js" defer></script>
<script>
// ============================================
// STOCKKARTE / DURCHSICHTPROTOKOLL MODULE
// ============================================

// Bestehende Kriterien (abwärtskompatibel)
var KRITERIEN_ALT = [
    {key:'sanftmut', label:'🤲 Sanftmut', desc:'Stechverhalten, Aggressivität'},
    {key:'wabensitz', label:'🪵 Wabensitz', desc:'Bleiben die Bienen auf der Wabe?'},
    {key:'schwarmtrieb', label:'🐝 Schwarmtrieb', desc:'5 = kein Schwarmtrieb'},
    {key:'volksstaerke', label:'💪 Volksstärke', desc:'Bienenmasse, Brutnest'},
    {key:'winterfestigkeit', label:'❄️ Winterfestigkeit', desc:'Überwinterungserfolg, Futterverbrauch'},
    {key:'hygiene', label:'🧹 Hygieneverhalten', desc:'Kalkbrut, Varroatoleranz'},
    {key:'wabenbau', label:'🏗️ Wabenbau', desc:'Sauberer, gleichmäßiger Bau'},
    {key:'honigfleiss', label:'🍯 Honigfleiß', desc:'Sammeleifer, Ertrag'}
];

// Neue Kriterien
var KRITERIEN_NEU = [
    {key:'raumreserve', label:'📦 Raumreserve', desc:'Platz im Volk, Erweiterungsbedarf'},
    {key:'weiselrichtigkeit', label:'👑 Weiselrichtigkeit', desc:'Königin vorhanden, Stifte sichtbar'},
    {key:'futterversorgung', label:'🍬 Futterversorgung', desc:'Futtervorrat, Nachschub nötig?'},
    {key:'gesundheit', label:'🏥 Gesundheit', desc:'Allgemeinzustand, Krankheitsanzeichen'},
    {key:'varroa_beurteilung', label:'🔬 Varroa-Beurteilung', desc:'Geschätzte Varroabelastung'}
];

var KRITERIEN = KRITERIEN_ALT.concat(KRITERIEN_NEU);

// Tätigkeiten-Definitionen
var TAETIGKEITEN = [
    {key:'honigernte', label:'Honigernte', icon:'🍯', subs:[]},
    {key:'varroa_bio', label:'Varroa Biotechnik', icon:'🐝', subs:['Drohnenbrut schneiden','Bannwabe','Brutentnahme','Fangwabe']},
    {key:'raummanagement', label:'Raum-Management', icon:'📦', subs:['Honigraum erweitert','Zarge aufgesetzt','Zarge entnommen','Absperrgitter','Flugling erstellt']},
    {key:'varroa_medikamente', label:'Varroa Medikamente', icon:'💊', subs:['Oxalsäure','Ameisensäure','Thymol','Bayvarol','Apistan'], menge:true, mengeUnit:'ml'},
    {key:'futtergabe', label:'Futtergabe', icon:'🍬', subs:['Zuckersirup','Futterteig','Honig'], menge:true, mengeUnit:'kg'},
    {key:'umweiselung', label:'Umweiselung', icon:'👑', subs:[]},
    {key:'varroa_diagnose', label:'Varroa-Diagnose', icon:'🔍', subs:[]},
    {key:'sonstiges', label:'Sonstiges', icon:'📝', subs:[]}
];

// ============================================
// STATE
// ============================================
var standorte = [];
var voelker = [];
var bewertungen = []; // Legacy-Bewertungen (alte Tabelle)
var durchsichten = []; // Neue Durchsichten
var koeniginnen = {}; // Königinnen-Info pro volkId
var activeTab = 'standorte';
var openVolkDetail = null;
var modalStep = 0;
var editDurchsicht = null;
var formData = {};
var selectedVerlaufVolk = '';
var collapsedStandorte = [];
var suchBegriff = '';
var selectedStandortFilter = '';

// ============================================
// INIT
// ============================================
async function init() {
    var { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'app.html'; return; }
    currentUser = session.user;
    await planManager.load();
    if (!planManager.can('bewertung')) {
        planManager.showUpgradeHint('bewertung');
        return;
    }
    
    var results = await Promise.all([
        sb.from('standorte').select('*').eq('user_id', currentUser.id),
        sb.from('voelker').select('*').eq('user_id', currentUser.id),
        sb.from('bewertungen').select('*').eq('user_id', currentUser.id).order('datum', {ascending: false}),
        sb.from('profiles').select('bewertung_collapsed').eq('id', currentUser.id).single(),
        sb.from('durchsichten').select('*').eq('user_id', currentUser.id).order('datum', {ascending: false})
    ]);
    
    standorte = (results[0].data || []).map(function(r){
        return {id:r.id, name:r.name};
    }).sort(function(a,b){ return a.name.localeCompare(b.name); });
    voelker = (results[1].data || []).map(function(r){
        return {id:r.id, standortId:r.standort_id, name:r.name, status:r.status, typ:r.typ||'volk'};
    }).sort(function(a,b){ return a.name.localeCompare(b.name); });
    
    // Legacy-Bewertungen laden
    bewertungen = (results[2].data || []).map(function(r){
        return {
            id:r.id, volkId:r.volk_id, volkName:r.volk_name, standortName:r.standort_name, datum:r.datum,
            sanftmut:r.sanftmut||3, wabensitz:r.wabensitz||3, schwarmtrieb:r.schwarmtrieb||3,
            volksstaerke:r.volksstaerke||3, winterfestigkeit:r.winterfestigkeit||3, hygiene:r.hygiene||3,
            wabenbau:r.wabenbau||3, honigfleiss:r.honigfleiss||3, notizen:r.notizen||'', created:r.created_at
        };
    });
    
    if (results[3].data && results[3].data.bewertung_collapsed) {
        collapsedStandorte = results[3].data.bewertung_collapsed;
    }
    
    // Neue Durchsichten laden
    durchsichten = (results[4].data || []).map(function(r){
        return {
            id: r.id,
            volkId: r.volk_id,
            datum: r.datum,
            taetigkeiten: r.taetigkeiten || [],
            kriterien: r.kriterien || {},
            varroa: r.varroa || null,
            notizen: r.notizen || '',
            created: r.created_at
        };
    });
    
    // Königinnen-Info aus Völkern laden (aus voelker-Tabelle oder eigene Tabelle)
    // Versuche koeniginnen-Daten zu laden
    var kResult = await sb.from('voelker').select('id, koenigin_info').eq('user_id', currentUser.id);
    if (kResult.data) {
        kResult.data.forEach(function(r){
            if (r.koenigin_info) koeniginnen[r.id] = r.koenigin_info;
        });
    }
    
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    // URL-Parameter: direkt zum Volk springen und Stockkarte aufklappen
    var urlParams = new URLSearchParams(window.location.search);
    var volkParam = urlParams.get('volk');
    if (volkParam) {
        var gefunden = voelker.find(function(v){ return v.id === volkParam; });
        if (gefunden) {
            activeTab = 'standorte';
            openVolkDetail = volkParam;
            // Standort aufklappen falls eingeklappt
            var stId = gefunden.standortId;
            if (collapsedStandorte.indexOf(stId) > -1) {
                collapsedStandorte.splice(collapsedStandorte.indexOf(stId), 1);
            }
            // Nach Render zum Volk scrollen
            setTimeout(function() {
                var el = document.querySelector('.volk-detail');
                if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
            }, 300);
        }
    }

    render();
}

// ============================================
// RENDER
// ============================================
function render() {
    var html = '<div class="container">';

    // === SUCHLEISTE (immer sichtbar) ===
    html += '<div class="such-bar">';
    html += '<span class="such-icon">🔍</span>';
    html += '<input type="text" id="suchFeld" placeholder="Volk suchen..." value="' + suchBegriff.replace(/"/g,'&quot;') + '" oninput="suchBegriff=this.value;render();setTimeout(function(){var f=document.getElementById(\'suchFeld\');if(f){f.focus();f.setSelectionRange(f.value.length,f.value.length)}},10)">';
    if (suchBegriff) html += '<button class="such-clear" onclick="suchBegriff=\'\';render()">✕</button>';
    html += '</div>';

    // Wenn Suche aktiv → Suchergebnisse anzeigen statt Tabs
    if (suchBegriff.trim().length >= 2) {
        html += renderSuchergebnisse();
        html += '</div>';
        document.getElementById('app').innerHTML = html;
        // QR-Code generieren
        setTimeout(function(){
            voelker.forEach(function(v){
                var qrEl = document.getElementById('qrcode-' + v.id);
                if (qrEl && !qrEl.firstChild) {
                    new QRCode(qrEl, { text: 'https://www.bienenplan.de/bewertung.html?volk=' + v.id, width: 128, height: 128, colorDark: '#1C1410', colorLight: '#ffffff' });
                }
            });
        }, 100);
        return;
    }

    html += '<div class="tab-bar" style="flex-wrap:wrap">';
    html += '<button class="tab-btn '+(activeTab==='standorte'?'active':'')+'" onclick="switchTab(\'standorte\')">🐝 Völker</button>';
    html += '<button class="tab-btn '+(activeTab==='durchsicht'?'active':'')+'" onclick="switchTab(\'durchsicht\')">📋 Durchsicht</button>';
    html += '<button class="tab-btn '+(activeTab==='ranking'?'active':'')+'" onclick="switchTab(\'ranking\')">🏆 Ranking</button>';
    html += '<button class="tab-btn '+(activeTab==='historie'?'active':'')+'" onclick="switchTab(\'historie\')">📜 Historie</button>';
    html += '<button class="tab-btn '+(activeTab==='stammbaum'?'active':'')+'" onclick="switchTab(\'stammbaum\')">🌳 Stammbaum</button>';
    html += '</div>';

    if (activeTab === 'standorte') html += renderStandorteTab();
    else if (activeTab === 'durchsicht') html += renderDurchsicht();
    else if (activeTab === 'ranking') html += renderRanking();
    else if (activeTab === 'historie') html += renderHistorie();
    else if (activeTab === 'stammbaum') html += renderStammbaum();

    html += '</div>';
    document.getElementById('app').innerHTML = html;
}

function switchTab(tab) {
    activeTab = tab;
    render();
}

// ============================================
// TAB: STANDORTE (Übersicht)
// ============================================
function renderStandorteTab() {
    var html = '';

    if (!standorte.length) {
        html += '<div class="card" style="text-align:center;padding:3rem;color:#7A6652">';
        html += '<div style="font-size:3rem;margin-bottom:1rem">📍</div>';
        html += '<h3>Keine Standorte vorhanden</h3>';
        html += '<p style="margin-top:.5rem">Lege zuerst Standorte und Völker unter <a href="standorte.html" style="color:#F5A623;font-weight:600">Standorte</a> an.</p>';
        html += '</div>';
        return html;
    }

    // Standort-Kacheln
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;margin-bottom:1rem">';
    html += '<div class="standort-card' + (!selectedStandortFilter?' selected':'') + '" onclick="selectedStandortFilter=\'\';render()">';
    html += '<div style="font-size:1.5rem;margin-bottom:.25rem">🐝</div>';
    html += '<div style="font-weight:600;font-size:.85rem">Alle Völker</div>';
    html += '<div style="font-size:.75rem;color:#7A6652">' + voelker.length + ' Völker</div>';
    html += '</div>';
    standorte.forEach(function(s) {
        var cnt = voelker.filter(function(v){return v.standortId===s.id;}).length;
        if (!cnt) return;
        html += '<div class="standort-card' + (selectedStandortFilter===s.id?' selected':'') + '" onclick="selectedStandortFilter=\'' + s.id + '\';render()">';
        html += '<div style="font-size:1.5rem;margin-bottom:.25rem">📍</div>';
        html += '<div style="font-weight:600;font-size:.85rem">' + s.name + '</div>';
        html += '<div style="font-size:.75rem;color:#7A6652">' + cnt + ' V\u00f6lker</div>';
        html += '<button onclick="event.stopPropagation();druckeAlleQR(\'' + s.id + '\')" style="background:none;border:1px solid #E8DFD4;border-radius:.5rem;padding:.25rem .5rem;cursor:pointer;font-size:.75rem;color:#7A6652;margin-top:.35rem" title="Alle QR-Codes drucken">\ud83c\udff7\ufe0f QR-Etiketten</button>';
        html += '</div>';
    });
    html += '</div>';

    // Völker-Grid des gewählten Standorts
    var filteredVoelker = sortVoelkerNumerisch(selectedStandortFilter
        ? voelker.filter(function(v){return v.standortId===selectedStandortFilter;})
        : voelker);

    if (!filteredVoelker.length) {
        html += '<div class="card" style="text-align:center;padding:2rem;color:#7A6652">Keine Völker an diesem Standort.</div>';
        return html;
    }

    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.75rem">';
    filteredVoelker.forEach(function(v) {
        html += renderVolkKarte(v);
    });
    html += '</div>';

    return html;
}

function renderVolkKarte(v) {
    var s = standorte.find(function(x){return x.id===v.standortId;});
    var kInfo = koeniginnen[v.id] || {};
    var volkDs = getDurchsichtenFuerVolk(v.id);
    var letzte = volkDs.length ? volkDs[0] : null;

    var html = '<div class="volk-grid-card" onclick="goToVolk(\'' + v.id + '\')" style="cursor:pointer">';

    // Header
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem">';
    html += '<div>';
    if (v.typ === 'ableger') html += '<span style="font-size:.65rem;background:#D1FAE5;color:#065F46;padding:.1rem .4rem;border-radius:.25rem;font-weight:600;display:inline-block;margin-bottom:.2rem">\ud83c\udf31 Ableger</span>';
    html += '<div style="font-weight:700;font-size:1rem">🐝 ' + v.name + '</div>';
    if (s) html += '<div style="font-size:.72rem;color:#7A6652">📍 ' + s.name + '</div>';
    html += '</div>';
    if (kInfo.jahrgang) {
        var farbDot = kInfo.markiert ? getColorDot(kInfo.farbe) : '';
        html += '<span style="font-size:.75rem;background:#FFF8EE;padding:.15rem .5rem;border-radius:.25rem;color:#92400E;white-space:nowrap">👑 ' + kInfo.jahrgang + ' ' + farbDot + '</span>';
    }
    html += '</div>';

    // Königin-Info kompakt
    if (kInfo.begattung) {
        html += '<div style="font-size:.75rem;color:#7A6652;margin-bottom:.35rem">';
        var details = [];
        if (kInfo.begattung) details.push(kInfo.begattung);
        if (kInfo.zuchtbuchNr) details.push('Nr: ' + kInfo.zuchtbuchNr);
        html += details.join(' · ');
        html += '</div>';
    }

    // Abstammung
    if (kInfo.muttervolk_id || kInfo.drohnenvolk_id) {
        html += '<div style="font-size:.72rem;color:#92400E;background:#FFFBF0;padding:.3rem .5rem;border-radius:.35rem;margin-bottom:.35rem">';
        if (kInfo.muttervolk_id) {
            var mv = voelker.find(function(x){return x.id===kInfo.muttervolk_id;});
            if (mv) html += '👑 ' + mv.name + ' ';
        }
        if (kInfo.drohnenvolk_id) {
            var dv = voelker.find(function(x){return x.id===kInfo.drohnenvolk_id;});
            if (dv) html += '🐝♂ ' + dv.name;
        }
        html += '</div>';
    }

    // Letzte Durchsicht
    if (letzte) {
        var schnitt = durchschnittKriterien(letzte.kriterien);
        var tage = Math.floor((Date.now() - new Date(letzte.datum).getTime()) / 86400000);
        var tageLabel = tage === 0 ? 'Heute' : tage === 1 ? 'Gestern' : 'vor ' + tage + ' Tagen';
        var tageColor = tage > 14 ? '#ef4444' : tage > 7 ? '#f59e0b' : '#10b981';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:.75rem;padding-top:.35rem;border-top:1px solid #f5f0eb">';
        html += '<span>' + renderMiniStars(schnitt) + '</span>';
        html += '<span style="color:' + tageColor + ';font-weight:500">' + tageLabel + '</span>';
        html += '</div>';
    } else {
        html += '<div style="font-size:.75rem;color:#A69580;padding-top:.35rem;border-top:1px solid #f5f0eb">Noch keine Durchsicht</div>';
    }

    html += '<div style="margin-top:.5rem;text-align:right"><button onclick="event.stopPropagation();druckeStockkarte(\'' + v.id + '\')" style="background:none;border:none;cursor:pointer;font-size:.85rem;color:#7A6652" title="Stockkarte drucken">\ud83d\udda8\ufe0f</button></div>';

    html += '</div>';
    return html;
}

// ============================================
// SUCHFUNKTION
// ============================================
function renderSuchergebnisse() {
    var html = '';
    var q = suchBegriff.trim().toLowerCase();

    // Völker filtern
    var treffer = voelker.filter(function(v) {
        if (v.name.toLowerCase().indexOf(q) > -1) return true;
        var s = standorte.find(function(x){return x.id===v.standortId;});
        if (s && s.name.toLowerCase().indexOf(q) > -1) return true;
        var kInfo = koeniginnen[v.id];
        if (kInfo) {
            if (kInfo.zuchtbuchNr && kInfo.zuchtbuchNr.toLowerCase().indexOf(q) > -1) return true;
            if (kInfo.begattung && kInfo.begattung.toLowerCase().indexOf(q) > -1) return true;
        }
        return false;
    });

    if (!treffer.length) {
        html += '<div class="card" style="text-align:center;padding:2rem;color:#7A6652">';
        html += '<div style="font-size:2rem;margin-bottom:.5rem">🔍</div>';
        html += '<p>Kein Volk gefunden für "<strong>' + suchBegriff + '</strong>"</p>';
        html += '</div>';
        return html;
    }

    html += '<div style="font-size:.8rem;color:#7A6652;margin-bottom:.5rem">' + treffer.length + ' Ergebnis' + (treffer.length>1?'se':'') + ' für "<strong>' + suchBegriff + '</strong>"</div>';

    // Bei genau 1 Treffer: Volk-Profil direkt anzeigen
    if (treffer.length === 1) {
        html += renderVolkProfil(treffer[0]);
        return html;
    }

    // Mehrere Treffer: Karten-Grid
    treffer = sortVoelkerNumerisch(treffer);
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.75rem">';
    treffer.forEach(function(v) {
        html += renderVolkKarte(v);
    });
    html += '</div>';

    return html;
}

function renderVolkProfil(v) {
    var html = '';
    var s = standorte.find(function(x){return x.id===v.standortId;});
    var kInfo = koeniginnen[v.id] || {};
    var volkDs = getDurchsichtenFuerVolk(v.id);

    // Header-Card
    html += '<div class="such-ergebnis">';
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">';
    html += '<div>';
    html += '<h2 style="margin:0;font-size:1.2rem">🐝 ' + v.name + '</h2>';
    if (s) html += '<div style="font-size:.85rem;color:#7A6652">📍 ' + s.name + '</div>';
    html += '</div>';
    html += '<div style="display:flex;gap:.5rem">';
    html += '<button class="btn btn-sm" onclick="selectedVerlaufVolk=\'' + v.id + '\';suchBegriff=\'\';switchTab(\'historie\')" style="padding:.3rem .6rem;background:#F5A623;color:#fff;border:none;border-radius:.5rem;font-size:.75rem;cursor:pointer">📜 Historie</button>';
    html += '<button class="btn btn-sm" onclick="selectedStammbaumVolk=\'' + v.id + '\';suchBegriff=\'\';switchTab(\'stammbaum\')" style="padding:.3rem .6rem;background:#F5A623;color:#fff;border:none;border-radius:.5rem;font-size:.75rem;cursor:pointer">🌳 Stammbaum</button>';
    html += '</div>';
    html += '</div>';

    // Königin-Info
    if (kInfo.begattung || kInfo.jahrgang || kInfo.zuchtbuchNr) {
        html += '<div class="koenigin-section" style="margin-bottom:.75rem">';
        html += '<h4>👑 Königinnen-Info</h4>';
        html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem;font-size:.85rem">';
        if (kInfo.jahrgang) html += '<div><span style="color:#7A6652">Jahrgang:</span> <strong>' + kInfo.jahrgang + '</strong> ' + (kInfo.markiert?getColorDot(kInfo.farbe):'') + '</div>';
        if (kInfo.begattung) html += '<div><span style="color:#7A6652">Begattung:</span> <strong>' + kInfo.begattung + '</strong></div>';
        if (kInfo.herkunft) html += '<div><span style="color:#7A6652">Herkunft:</span> <strong>' + formatHerkunft(kInfo.herkunft) + '</strong></div>';
        if (kInfo.zuchtbuchNr) html += '<div><span style="color:#7A6652">Zuchtbuch:</span> <strong>' + kInfo.zuchtbuchNr + '</strong></div>';
        if (kInfo.belegstelle) html += '<div style="grid-column:1/-1"><span style="color:#7A6652">Belegstelle:</span> <strong>' + kInfo.belegstelle + '</strong></div>';
        // Abstammung
        if (kInfo.muttervolk_id) {
            var mv = voelker.find(function(x){return x.id===kInfo.muttervolk_id;});
            if (mv) html += '<div><span style="color:#7A6652">Muttervolk:</span> <strong>' + mv.name + '</strong></div>';
        }
        if (kInfo.drohnenvolk_id) {
            var dv = voelker.find(function(x){return x.id===kInfo.drohnenvolk_id;});
            if (dv) html += '<div><span style="color:#7A6652">Drohnenvolk:</span> <strong>' + dv.name + '</strong></div>';
        }
        html += '</div>';

        // Zuchtwerte
        if (kInfo.zuchtwerte && Object.keys(kInfo.zuchtwerte).some(function(k){return kInfo.zuchtwerte[k];})) {
            html += '<div style="margin-top:.5rem;padding-top:.5rem;border-top:1px solid rgba(245,166,35,0.15)">';
            html += '<div style="font-size:.78rem;font-weight:600;color:#92400E;margin-bottom:.3rem">📊 Zuchtwerte</div>';
            html += '<div style="display:flex;flex-wrap:wrap;gap:.4rem">';
            [{key:'honig',icon:'🍯'},{key:'sanftmut',icon:'🤲'},{key:'wabensitz',icon:'🪵'},{key:'schwarm',icon:'🐝'},{key:'varroa',icon:'🔬'},{key:'gesamt',icon:'⭐'}].forEach(function(zw) {
                if (kInfo.zuchtwerte[zw.key]) {
                    var val = kInfo.zuchtwerte[zw.key];
                    var c = val >= 110 ? '#10b981' : val >= 90 ? '#7A6652' : '#ef4444';
                    html += '<span style="font-size:.72rem;padding:.15rem .4rem;border-radius:.25rem;background:#f5f0eb;color:' + c + '">' + zw.icon + ' ' + val + '</span>';
                }
            });
            html += '</div></div>';
        }
        html += '</div>';
    }

    // Letzte Bewertung
    if (volkDs.length) {
        var letzte = volkDs[0];
        var schnitt = durchschnittKriterien(letzte.kriterien);
        html += '<div style="margin-bottom:.75rem">';
        html += '<div style="font-size:.82rem;font-weight:600;margin-bottom:.35rem">Letzte Durchsicht: ' + fmtDate(letzte.datum) + '</div>';
        html += '<div style="display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.35rem">';
        KRITERIEN.forEach(function(k) {
            var val = letzte.kriterien[k.key] || 3;
            var c = val >= 4 ? '#10b981' : val <= 2 ? '#ef4444' : '#f59e0b';
            html += '<span style="font-size:.7rem;padding:.2rem .4rem;border-radius:.25rem;background:#f5f0eb"><span style="color:' + c + '">●</span> ' + k.label.split(' ').pop() + ' ' + val + '/5</span>';
        });
        html += '</div>';

        // Tätigkeiten
        var tags = (letzte.taetigkeiten||[]).map(function(t) {
            var def = TAETIGKEITEN.find(function(x){return x.key===t.key;});
            return def ? def.icon + ' ' + def.label : t.key;
        });
        if (tags.length) {
            html += '<div style="display:flex;flex-wrap:wrap;gap:.25rem">';
            tags.forEach(function(t) { html += '<span class="historie-tag">' + t + '</span>'; });
            html += '</div>';
        }
        if (letzte.notizen) html += '<div style="font-size:.78rem;color:#7A6652;margin-top:.3rem;font-style:italic">"' + letzte.notizen + '"</div>';
        html += '</div>';
    }

    // Durchsicht-Historie kompakt
    if (volkDs.length > 1) {
        html += '<div style="border-top:1px solid #E8DFD4;padding-top:.5rem">';
        html += '<div style="font-size:.82rem;font-weight:600;margin-bottom:.35rem">📜 Alle Durchsichten (' + volkDs.length + ')</div>';
        volkDs.slice(0, 10).forEach(function(d, i) {
            if (i === 0) return; // erste schon oben gezeigt
            var tags = (d.taetigkeiten||[]).map(function(t){
                var def = TAETIGKEITEN.find(function(x){return x.key===t.key;});
                return def ? def.icon : '';
            }).join(' ');
            html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;font-size:.8rem;border-bottom:1px solid #f5f0eb">';
            html += '<span>' + fmtDate(d.datum) + ' ' + tags + '</span>';
            html += '<span>' + renderMiniStars(durchschnittKriterien(d.kriterien)) + '</span>';
            html += '</div>';
        });
        if (volkDs.length > 10) html += '<div style="font-size:.75rem;color:#A69580;margin-top:.25rem">... und ' + (volkDs.length - 10) + ' weitere</div>';
        html += '</div>';
    }

    // QR-Code Bereich
    html += '<div style="margin-top:1rem;padding:1rem;background:#f5f0eb;border-radius:.75rem;text-align:center">';
    html += '<div style="font-size:.85rem;font-weight:600;color:#3D2E1F;margin-bottom:.5rem">\ud83d\udcf1 QR-Code f\u00fcr dieses Volk</div>';
    html += '<div id="qrcode-' + v.id + '" style="display:inline-block;background:#fff;padding:.75rem;border-radius:.5rem"></div>';
    html += '<div style="margin-top:.75rem;display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap">';
    html += '<button class="btn btn-sm btn-primary" onclick="druckeStockkarte(\'' + v.id + '\')">\ud83d\udda8\ufe0f Stockkarte drucken</button>';
    html += '</div>';
    html += '</div>';

    html += '</div>';

}

// ============================================
// TAB: DURCHSICHT
// ============================================
function sortVoelkerNumerisch(liste) {
    return liste.slice().sort(function(a, b) {
        var na = parseInt((a.name.match(/\d+/) || ['999999'])[0]);
        var nb = parseInt((b.name.match(/\d+/) || ['999999'])[0]);
        if (na !== nb) return na - nb;
        return a.name.localeCompare(b.name);
    });
}

function renderDurchsicht() {
    var html = '';

    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">';
    html += '<h2 style="margin:0;font-size:1.1rem">📋 Durchsichtprotokoll</h2>';
    html += '<button class="btn btn-primary btn-sm" onclick="openDurchsicht()">+ Neue Durchsicht</button>';
    html += '</div>';

    // Standort-Filter übernehmen
    var anzuzeigende = selectedStandortFilter
        ? standorte.filter(function(s){return s.id===selectedStandortFilter;})
        : standorte;

    if (selectedStandortFilter) {
        var sName = standorte.find(function(s){return s.id===selectedStandortFilter;});
        html += '<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;font-size:.85rem;color:#7A6652">';
        html += '<span>Filter: 📍 <strong>' + (sName?sName.name:'') + '</strong></span>';
        html += '<button onclick="selectedStandortFilter=\'\';render()" style="background:none;border:1px solid #E8DFD4;border-radius:.35rem;padding:.15rem .4rem;font-size:.72rem;cursor:pointer;color:#7A6652">✕ Alle zeigen</button>';
        html += '</div>';
    }

    anzuzeigende.forEach(function(s) {
        var sVoelker = sortVoelkerNumerisch(voelker.filter(function(v){return v.standortId===s.id;}));
        if (!sVoelker.length) return;

        html += '<div class="card">';
        html += '<h3 style="margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem">';
        html += '📍 ' + s.name + ' <span style="font-size:.75rem;color:#7A6652;font-weight:400">(' + sVoelker.length + ' Völker)</span>';
        html += '</h3>';

        sVoelker.forEach(function(v) {
            var volkDs = getDurchsichtenFuerVolk(v.id);
            var letzte = volkDs.length ? volkDs[0] : null;
            var kInfo = koeniginnen[v.id];
            var isOpen = openVolkDetail === v.id;
            
            html += '<div style="border-bottom:1px solid #f5f0eb">';
            html += '<div class="volk-row-clickable" onclick="toggleVolkDetail(\'' + v.id + '\')">';
            html += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
            html += '<div style="flex:1">';
            html += '<div style="font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:.35rem">🐝 ' + v.name;
            html += ' <span style="font-size:.7rem;color:#7A6652;transform:rotate(' + (isOpen?'90':'0') + 'deg);transition:transform .2s;display:inline-block">▶</span>';
            html += '</div>';
            
            if (kInfo) {
                var farbeIcon = kInfo.markiert ? getColorDot(kInfo.farbe) : '';
                html += '<div style="font-size:.72rem;color:#7A6652;margin-top:.15rem">';
                html += '👑 ' + (kInfo.jahrgang || '–') + ' · ' + (kInfo.begattung||'–');
                if (farbeIcon) html += ' · ' + farbeIcon;
                html += '</div>';
            }
            
            if (letzte) {
                var datum = fmtDate(letzte.datum);
                var schnitt = durchschnittKriterien(letzte.kriterien);
                var tags = (letzte.taetigkeiten||[]).map(function(t){
                    var def = TAETIGKEITEN.find(function(x){return x.key===t.key;});
                    return def ? def.icon : '📋';
                }).join(' ');
                html += '<div style="font-size:.75rem;color:#7A6652;margin-top:.2rem">';
                html += 'Letzte: ' + datum + ' · ' + renderMiniStars(schnitt) + ' ' + tags;
                if (letzte.varroa && letzte.varroa.milben) {
                    var mProTag = letzte.varroa.tage > 0 ? (letzte.varroa.milben / letzte.varroa.tage).toFixed(1) : '–';
                    html += ' · 🔬 ' + mProTag + ' M/Tag';
                }
                html += '</div>';
            } else {
                // Fallback: alte Bewertung anzeigen
                var alteBew = bewertungen.find(function(b){return b.volkId===v.id;});
                if (alteBew) {
                    html += '<div style="font-size:.75rem;color:#7A6652;margin-top:.2rem">Letzte Bewertung: ' + fmtDate(alteBew.datum) + '</div>';
                } else {
                    html += '<div style="font-size:.75rem;color:#94a3b8;margin-top:.2rem">Noch keine Durchsicht</div>';
                }
            }
            
            html += '</div>';
            html += '<div style="display:flex;gap:.25rem;flex-shrink:0;margin-left:.5rem" onclick="event.stopPropagation()">';
            html += '<button class="btn btn-primary btn-xs" onclick="openDurchsicht(null,\'' + v.id + '\')">📋</button>';
            if (letzte) html += '<button class="btn btn-blue btn-xs" onclick="openDurchsicht(\'' + letzte.id + '\')">✏️</button>';
            html += '</div>';
            html += '</div></div>';
            
            // Volk Detail View
            if (isOpen) {
                html += renderVolkDetail(v, volkDs, kInfo);
            }
            
            html += '</div>';
        });
        
        html += '</div>';
    });
    
    // Letzte Durchsichten
    if (durchsichten.length) {
        var sorted = durchsichten.slice().sort(function(a,b){return new Date(b.datum)-new Date(a.datum);});
        html += '<div class="card">';
        html += '<h3 style="margin-bottom:.75rem">📋 Letzte Durchsichten</h3>';
        sorted.slice(0,8).forEach(function(d) {
            var v = voelker.find(function(x){return x.id===d.volkId;});
            var tags = (d.taetigkeiten||[]).map(function(t){
                var def = TAETIGKEITEN.find(function(x){return x.key===t.key;});
                return '<span class="historie-tag">' + (def?def.icon+' '+def.label:'📋') + '</span>';
            }).join('');
            
            html += '<div class="historie-entry">';
            html += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
            html += '<div><div style="font-weight:500;font-size:.9rem">🐝 ' + (v?v.name:'–') + '</div>';
            html += '<div style="font-size:.72rem;color:#7A6652">' + fmtDate(d.datum) + '</div>';
            html += '<div class="historie-tags">' + tags + '</div>';
            if (d.notizen) html += '<div style="font-size:.75rem;color:#94a3b8;margin-top:.25rem">' + d.notizen + '</div>';
            html += '</div>';
            html += '<div style="display:flex;gap:.25rem">';
            html += '<button class="btn btn-blue btn-xs" onclick="openDurchsicht(\'' + d.id + '\')">✏️</button>';
            html += '<button class="btn btn-danger btn-xs" onclick="deleteDurchsicht(\'' + d.id + '\')">🗑️</button>';
            html += '</div></div></div>';
        });
        html += '</div>';
    }
    
    return html;
}

function toggleVolkDetail(volkId) {
    openVolkDetail = openVolkDetail === volkId ? null : volkId;
    render();
}

function renderVolkDetail(v, volkDs, kInfo) {
    var html = '<div class="volk-detail">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">';
    html += '<span style="font-size:.85rem;font-weight:600;color:#92400E">📖 Stockkarte: ' + v.name + '</span>';
    html += '<button onclick="event.stopPropagation();druckeStockkarte(\'' + v.id + '\')" class="btn btn-xs" style="background:#f5f0eb;color:#3D2E1F">🖨️ Drucken</button>';
    html += '</div>';
    
    // Königinnen-Info
    if (kInfo) {
        html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.35rem .75rem;font-size:.78rem;margin-bottom:.75rem;padding:.6rem;background:#fff;border-radius:.5rem">';
        html += '<div><span style="color:#7A6652">👑 Begattung:</span> <strong>' + (kInfo.begattung||'–') + '</strong></div>';
        html += '<div><span style="color:#7A6652">Herkunft:</span> <strong>' + formatHerkunft(kInfo.herkunft) + '</strong></div>';
        html += '<div><span style="color:#7A6652">Jahrgang:</span> <strong>' + (kInfo.jahrgang||'–') + '</strong></div>';
        html += '<div><span style="color:#7A6652">Markiert:</span> <strong>' + (kInfo.markiert?'Ja '+getColorDot(kInfo.farbe):'Nein') + '</strong></div>';
        if (kInfo.belegstelle) html += '<div style="grid-column:1/-1"><span style="color:#7A6652">Belegstelle:</span> <strong>' + kInfo.belegstelle + '</strong></div>';
        if (kInfo.nummer) html += '<div style="grid-column:1/-1"><span style="color:#7A6652">Nummer:</span> <strong>' + kInfo.nummer + '</strong></div>';
        html += '</div>';
        
        // BeeBreed Zuchtwertkarte
        if (kInfo.zuchtwerte && kInfo.zuchtbuchNr) {
            html += renderZuchtwertkarte(kInfo);
        }
    }
    
    // Mini-Verlaufschart
    var sorted = volkDs.slice().sort(function(a,b){return new Date(a.datum)-new Date(b.datum);});
    if (sorted.length > 1) {
        html += '<div style="margin-bottom:.75rem;padding:.6rem;background:#fff;border-radius:.5rem">';
        html += '<div style="font-size:.75rem;font-weight:600;color:#7A6652;margin-bottom:.35rem">📈 Verlauf</div>';
        var maxH = 60;
        html += '<div style="display:flex;align-items:end;gap:4px;height:' + maxH + 'px">';
        sorted.forEach(function(d) {
            var schnitt = durchschnittKriterien(d.kriterien);
            var h = Math.max(4, (schnitt/5)*maxH);
            var c = schnitt>=4?'#10b981':(schnitt>=3?'#F5A623':'#ef4444');
            html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">';
            html += '<div style="font-size:.55rem;font-weight:600;color:#1C1410">' + schnitt.toFixed(1) + '</div>';
            html += '<div style="width:100%;height:' + h + 'px;background:' + c + ';border-radius:3px 3px 0 0"></div>';
            html += '<div style="font-size:.5rem;color:#7A6652">' + fmtDateShort(d.datum) + '</div>';
            html += '</div>';
        });
        html += '</div></div>';
    }
    
    // Alle Durchsichten
    var absteigend = volkDs.slice().sort(function(a,b){return new Date(b.datum)-new Date(a.datum);});
    if (!absteigend.length) {
        html += '<div style="text-align:center;padding:.75rem;color:#94a3b8;font-size:.85rem">Noch keine Durchsichten vorhanden.</div>';
    } else {
        html += '<div style="font-size:.75rem;font-weight:600;color:#7A6652;margin-bottom:.35rem">📋 Durchsichten (' + absteigend.length + ')</div>';
        absteigend.forEach(function(d) {
            var schnitt = durchschnittKriterien(d.kriterien);
            var tags = (d.taetigkeiten||[]).map(function(t) {
                var def = TAETIGKEITEN.find(function(x){return x.key===t.key;});
                var label = def ? def.icon + ' ' + def.label : t.key;
                if (t.subs && t.subs.length) label += ' (' + t.subs.join(', ') + ')';
                if (t.menge) label += ' ' + t.menge + (def&&def.mengeUnit?' '+def.mengeUnit:'');
                return '<span class="historie-tag">' + label + '</span>';
            }).join('');
            
            html += '<div style="padding:.5rem;background:#fff;border-radius:.5rem;margin-bottom:.35rem">';
            html += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
            html += '<div style="flex:1">';
            html += '<div style="font-weight:600;font-size:.82rem">' + fmtDate(d.datum) + ' ' + renderMiniStars(schnitt) + ' <span style="color:#7A6652;font-size:.75rem">(' + schnitt.toFixed(1) + ')</span></div>';
            html += '<div class="historie-tags" style="margin-top:.2rem">' + tags + '</div>';
            if (d.varroa && d.varroa.milben) {
                var mProTag = d.varroa.tage > 0 ? (d.varroa.milben / d.varroa.tage).toFixed(1) : '–';
                var vClass = mProTag <= 3 ? 'badge-green' : (mProTag <= 10 ? 'badge-yellow' : 'badge-red');
                html += '<div style="margin-top:.2rem"><span class="badge ' + vClass + '" style="font-size:.6rem">🔬 ' + mProTag + ' M/Tag (' + d.varroa.methode + ')</span></div>';
            }
            if (d.notizen) html += '<div style="font-size:.72rem;color:#94a3b8;margin-top:.2rem">' + d.notizen + '</div>';
            html += '</div>';
            html += '<div style="display:flex;gap:.2rem;flex-shrink:0;margin-left:.35rem" onclick="event.stopPropagation()">';
            html += '<button class="btn btn-blue btn-xs" style="padding:.3rem .5rem;font-size:.7rem" onclick="openDurchsicht(\'' + d.id + '\')">✏️</button>';
            html += '<button class="btn btn-danger btn-xs" style="padding:.3rem .5rem;font-size:.7rem" onclick="deleteDurchsicht(\'' + d.id + '\')">🗑️</button>';
            html += '</div></div></div>';
        });
    }
    
    html += '<button class="btn btn-primary btn-sm" style="width:100%;margin-top:.5rem" onclick="event.stopPropagation();openDurchsicht(null,\'' + v.id + '\')">+ Neue Durchsicht</button>';
    html += '</div>';
    return html;
}

// ============================================
// TAB: RANKING
// ============================================
function renderRanking() {
    var volkRanking = [];
    voelker.forEach(function(v) {
        var volkDs = getDurchsichtenFuerVolk(v.id);
        if (!volkDs.length) return;
        var letzte = volkDs[0];
        var schnitt = durchschnittKriterien(letzte.kriterien);
        var s = standorte.find(function(x){return x.id===v.standortId;});
        volkRanking.push({volk:v, durchsicht:letzte, schnitt:schnitt, standortName:s?s.name:''});
    });
    volkRanking.sort(function(a,b){return b.schnitt-a.schnitt;});
    
    var html = '<div class="card">';
    html += '<h3 style="margin-bottom:1rem;text-align:center">🏆 Zucht-Ranking</h3>';
    
    if (!volkRanking.length) {
        html += '<div style="text-align:center;padding:2rem;color:#7A6652"><div style="font-size:3rem;margin-bottom:.5rem">🏆</div>';
        html += '<p>Noch keine Durchsichten vorhanden.</p>';
        html += '<button class="btn btn-primary" style="margin-top:1rem" onclick="switchTab(\'durchsicht\')">Erste Durchsicht erstellen</button></div>';
        html += '</div>';
        return html;
    }
    
    volkRanking.forEach(function(item, i) {
        var medal = i===0?'🥇':(i===1?'🥈':(i===2?'🥉':(i+1)+'.'));
        var barColor = item.schnitt>=4?'#10b981':(item.schnitt>=3?'#F5A623':'#ef4444');
        
        html += '<div style="padding:.75rem 0;border-bottom:1px solid #f5f0eb">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.375rem">';
        html += '<div style="display:flex;align-items:center;gap:.5rem">';
        html += '<span style="font-size:1.25rem;width:2rem;text-align:center">' + medal + '</span>';
        html += '<div><div style="font-weight:600;cursor:pointer;border-bottom:1px dashed #E8DFD4;display:inline-block" onclick="goToVolk(\'' + item.volk.id + '\')">' + item.volk.name + '</div>';
        html += '<div style="font-size:.75rem;color:#7A6652">📍 ' + item.standortName + '</div></div>';
        html += '</div>';
        html += '<div style="font-size:1.25rem;font-weight:bold;color:' + barColor + '">' + item.schnitt.toFixed(1) + '</div>';
        html += '</div>';
        
        html += '<div style="display:flex;gap:3px;margin-left:2.5rem">';
        KRITERIEN.forEach(function(k) {
            var val = (item.durchsicht.kriterien[k.key]) || 3;
            var w = (val/5*100);
            var c = val>=4?'#10b981':(val>=3?'#F5A623':'#ef4444');
            html += '<div style="flex:1;height:6px;background:#E8DFD4;border-radius:3px" title="' + k.label + ': ' + val + '/5"><div style="height:100%;border-radius:3px;background:' + c + ';width:' + w + '%"></div></div>';
        });
        html += '</div>';
        
        var staerken = KRITERIEN.filter(function(k){return (item.durchsicht.kriterien[k.key]||3)>=4;}).map(function(k){return k.label.split(' ')[0];});
        var schwaechen = KRITERIEN.filter(function(k){return (item.durchsicht.kriterien[k.key]||3)<=2;}).map(function(k){return k.label.split(' ')[0];});
        if (staerken.length || schwaechen.length) {
            html += '<div style="margin-left:2.5rem;margin-top:.25rem;font-size:.7rem">';
            if (staerken.length) html += '<span style="color:#10b981">▲ ' + staerken.join(' ') + '</span> ';
            if (schwaechen.length) html += '<span style="color:#ef4444">▼ ' + schwaechen.join(' ') + '</span>';
            html += '</div>';
        }
        html += '</div>';
    });
    html += '</div>';
    
    if (volkRanking.length >= 2) {
        var beste = volkRanking[0];
        html += '<div class="card" style="background:linear-gradient(135deg,#f0fdf4,#fff);border-left:4px solid #10b981">';
        html += '<h3 style="margin-bottom:.5rem">👑 Zuchtempfehlung</h3>';
        html += '<p style="font-size:.9rem;color:#7A6652"><strong>' + beste.volk.name + '</strong> (📍 ' + beste.standortName + ') hat mit <strong>' + beste.schnitt.toFixed(1) + '/5.0</strong> die beste Gesamtbewertung.</p>';
        html += '</div>';
    }
    
    return html;
}
