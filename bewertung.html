<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Weiterleitung...</title>
    <script>
        // Redirect zu voelker.html (Stockkarte & Bewertung zusammengeführt)
        var params = new URLSearchParams(window.location.search);
        var target = 'voelker.html';
        var query = [];
        if (params.get('volk')) query.push('volk=' + params.get('volk'));
        if (query.length) target += '?' + query.join('&');
        window.location.replace(target);
    </script>
</head>
<body>
    <p>Weiterleitung zu <a href="voelker.html">Völker & Standorte</a>...</p>
</body>
</html>
