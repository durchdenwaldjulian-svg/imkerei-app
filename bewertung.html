            html += '<div><span style="color:#7A6652">Jahrgang:</span> <strong>' + (kInfo.jahrgang||'–') + '</strong></div>';
            html += '<div><span style="color:#7A6652">Markiert:</span> <strong>' + (kInfo.markiert?'Ja '+getColorDot(kInfo.farbe):'Nein') + '</strong></div>';
            if (kInfo.belegstelle) html += '<div style="grid-column:1/-1"><span style="color:#7A6652">Belegstelle:</span> <strong>' + kInfo.belegstelle + '</strong></div>';
            if (kInfo.nummer) html += '<div style="grid-column:1/-1"><span style="color:#7A6652">Nummer:</span> <strong>' + kInfo.nummer + '</strong></div>';
            if (kInfo.muttervolk_id) {
                var mv = voelker.find(function(x){return x.id===kInfo.muttervolk_id;});
                if (mv) html += '<div style="grid-column:1/-1"><span style="color:#7A6652">🌳 Muttervolk:</span> <strong>' + mv.name + '</strong></div>';
            }
            if (kInfo.drohnenvolk_id) {
                var dv = voelker.find(function(x){return x.id===kInfo.drohnenvolk_id;});
                if (dv) html += '<div style="grid-column:1/-1"><span style="color:#7A6652">🌳 Drohnenvolk:</span> <strong>' + dv.name + '</strong></div>';
            }
            html += '</div></div>';
            
            // BeeBreed Zuchtwertkarte
            if (kInfo.zuchtwerte && kInfo.zuchtbuchNr) {
                html += renderZuchtwertkarte(kInfo);
            }
        }
        
        // Verlaufsgrafik
        if (volkDs.length > 0) {
            var bews = volkDs.slice().reverse();
            html += '<div class="card">';
            html += '<h3 style="margin-bottom:.75rem">📈 Bewertungsverlauf</h3>';
            var maxH = 120;
            html += '<div style="display:flex;align-items:end;gap:8px;height:' + maxH + 'px;padding:0 .5rem">';
            bews.forEach(function(d) {
                var schnitt = durchschnittKriterien(d.kriterien);
                var h = Math.max(8, (schnitt/5)*maxH);
                var c = schnitt>=4?'#10b981':(schnitt>=3?'#F5A623':'#ef4444');
                html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">';
                html += '<div style="font-size:.65rem;font-weight:600;color:#1C1410">' + schnitt.toFixed(1) + '</div>';
                html += '<div style="width:100%;height:' + h + 'px;background:' + c + ';border-radius:4px 4px 0 0"></div>';
                html += '<div style="font-size:.6rem;color:#7A6652">' + fmtDateShort(d.datum) + '</div>';
                html += '</div>';
            });
            html += '</div></div>';
            
            // Kriterien-Übersicht
            html += '<div class="card">';
            html += '<h3 style="margin-bottom:.75rem">Nach Kriterium</h3>';
            var letzte = volkDs[0];
            var erste = volkDs[volkDs.length-1];
            KRITERIEN.forEach(function(k) {
                var val = letzte.kriterien[k.key] || 3;
                var altVal = erste.kriterien[k.key] || 3;
                var diff = val - altVal;
                var trend = volkDs.length > 1 ? (diff > 0 ? '<span style="color:#10b981">▲+'+diff+'</span>' : (diff < 0 ? '<span style="color:#ef4444">▼'+diff+'</span>' : '<span style="color:#94a3b8">→</span>')) : '';
                var barColor = val >= 4 ? '#10b981' : (val >= 3 ? '#F5A623' : '#ef4444');
                
                html += '<div style="margin-bottom:.75rem">';
                html += '<div style="display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.25rem">';
                html += '<span>' + k.label + '</span>';
                html += '<span><strong>' + val + '/5</strong> ' + trend + '</span>';
                html += '</div>';
                html += '<div style="background:#E8DFD4;height:.5rem;border-radius:.25rem"><div style="background:' + barColor + ';height:100%;border-radius:.25rem;width:' + (val/5*100) + '%;transition:width .3s"></div></div>';
                html += '</div>';
            });
            html += '</div>';
            
            // Alle Durchsichten
            html += '<div class="card">';
            html += '<h3 style="margin-bottom:.75rem">Alle Durchsichten</h3>';
            volkDs.forEach(function(d) {
                var schnitt = durchschnittKriterien(d.kriterien);
                var tags = (d.taetigkeiten||[]).map(function(t) {
                    var def = TAETIGKEITEN.find(function(x){return x.key===t.key;});
                    var label = def ? def.icon + ' ' + def.label : t.key;
                    if (t.subs && t.subs.length) label += ' (' + t.subs.join(', ') + ')';
                    if (t.menge) label += ' – ' + t.menge + (def&&def.mengeUnit?' '+def.mengeUnit:'');
                    return '<span class="historie-tag">' + label + '</span>';
                }).join('');
                
                html += '<div class="historie-entry">';
                html += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
                html += '<div style="flex:1">';
                html += '<div style="font-weight:600;font-size:.9rem">' + fmtDate(d.datum) + ' · ' + renderMiniStars(schnitt) + ' (' + schnitt.toFixed(1) + ')</div>';
                html += '<div class="historie-tags">' + tags + '</div>';
                if (d.varroa && d.varroa.milben) {
                    var mProTag = d.varroa.tage > 0 ? (d.varroa.milben / d.varroa.tage).toFixed(1) : '–';
                    var vClass = mProTag <= 3 ? 'badge-green' : (mProTag <= 10 ? 'badge-yellow' : 'badge-red');
                    html += '<div style="margin-top:.25rem"><span class="badge ' + vClass + '">🔬 ' + mProTag + ' Milben/Tag (' + d.varroa.methode + ')</span></div>';
                }
                if (d.notizen) html += '<div style="font-size:.75rem;color:#94a3b8;margin-top:.25rem">' + d.notizen + '</div>';
                html += '</div>';
                html += '<div style="display:flex;gap:.25rem">';
                html += '<button class="btn btn-blue btn-xs" onclick="openDurchsicht(\'' + d.id + '\')">✏️</button>';
                html += '<button class="btn btn-danger btn-xs" onclick="deleteDurchsicht(\'' + d.id + '\')">🗑️</button>';
                html += '</div></div></div>';
            });
            html += '</div>';
        }
    } else {
        html += '<div class="card" style="text-align:center;padding:1.5rem;color:#7A6652"><p>Wähle ein Volk um die Historie zu sehen.</p></div>';
    }
    
    return html;
}


// ============================================
// DURCHSICHT MODAL
// Klickbare Stepper-Punkte oben, Speichern jederzeit
// ============================================
var MODAL_STEPS = [
    {key:'volk', label:'Volk', icon:'🐝'},
    {key:'taetigkeit', label:'Tätigkeit', icon:'🔧'},
    {key:'bewertung', label:'Bewertung', icon:'⭐'},
    {key:'varroa', label:'Varroa', icon:'🔬'},
    {key:'koenigin', label:'Königin', icon:'👑'}
];

function openDurchsicht(id, volkId) {
    editDurchsicht = id || null;
    modalStep = 0;
    
    formData = {
        volkId: volkId || '',
        datum: new Date().toISOString().slice(0,10),
        taetigkeiten: [],
        kriterien: {},
        varroa: {milben:'', tage:'1', methode:'Puderzucker'},
        koenigin: {begattung:'', herkunft:'', belegstelle:'', nummer:'', markiert:false, farbe:'', jahrgang:new Date().getFullYear(), zuchtbuchNr:'', zuchtwerte:{}, muttervolk_id:'', drohnenvolk_id:''},
        notizen: ''
    };
    KRITERIEN.forEach(function(k){ formData.kriterien[k.key] = 3; });
    
    if (id) {
        var d = durchsichten.find(function(x){return x.id===id;});
        if (d) {
            formData.volkId = d.volkId;
            formData.datum = d.datum;
            formData.taetigkeiten = JSON.parse(JSON.stringify(d.taetigkeiten || []));
            formData.kriterien = Object.assign({}, d.kriterien);
            KRITERIEN.forEach(function(k){ if(!formData.kriterien[k.key]) formData.kriterien[k.key] = 3; });
            if (d.varroa) formData.varroa = Object.assign({}, d.varroa);
            formData.notizen = d.notizen || '';
        }
        document.getElementById('modalTitle').textContent = '✏️ Durchsicht bearbeiten';
    } else {
        document.getElementById('modalTitle').textContent = '📋 Neue Durchsicht';
    }
    
    var vId = formData.volkId || volkId;
    if (vId && koeniginnen[vId]) {
        formData.koenigin = Object.assign({}, koeniginnen[vId]);
    }
    
    renderModal();
    document.getElementById('durchsichtModal').classList.add('active');
    document.body.classList.add('modal-open');
}

function closeModal() {
    document.getElementById('durchsichtModal').classList.remove('active');
    document.body.classList.remove('modal-open');
}

function goToStep(idx) {
    if (idx > 0 && !formData.volkId) {
        toast('Bitte zuerst ein Volk wählen!');
        return;
    }
    modalStep = idx;
    renderModal();
    document.getElementById('modalBody').scrollTop = 0;
}

function stepHasData(key) {
    if (key === 'volk') return !!formData.volkId;
    if (key === 'taetigkeit') return formData.taetigkeiten.length > 0;
    if (key === 'bewertung') return Object.keys(formData.kriterien).some(function(k){return formData.kriterien[k] !== 3;});
    if (key === 'varroa') return parseInt(formData.varroa.milben) > 0;
    if (key === 'koenigin') return !!formData.koenigin.begattung || !!formData.koenigin.zuchtbuchNr;
    return false;
}

function renderModal() {
    var html = '';
    
    // === STEPPER PUNKTE (klickbar) ===
    html += '<div style="display:flex;gap:.15rem;margin-bottom:1.25rem;background:#f5f0eb;border-radius:.75rem;padding:.25rem">';
    MODAL_STEPS.forEach(function(s, i) {
        var active = i === modalStep;
        var hasData = stepHasData(s.key);
        var bg = active ? '#fff' : 'transparent';
        var color = active ? '#1C1410' : '#7A6652';
        var fw = active ? '600' : '400';
        var shadow = active ? 'box-shadow:0 1px 3px rgba(0,0,0,.1);' : '';
        var dot = hasData && !active ? '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#10b981;margin-left:3px;vertical-align:middle"></span>' : '';
        html += '<div onclick="goToStep(' + i + ')" style="flex:1;text-align:center;padding:.45rem .25rem;border-radius:.5rem;cursor:pointer;background:' + bg + ';color:' + color + ';font-weight:' + fw + ';font-size:.72rem;transition:all .15s;' + shadow + '">';
        html += s.icon + '<br>' + s.label + dot + '</div>';
    });
    html += '</div>';
    
    // === AKTIVE SEKTION ===
    var stepKey = MODAL_STEPS[modalStep].key;
    if (stepKey === 'volk') html += renderStepVolk();
    else if (stepKey === 'taetigkeit') html += renderStepTaetigkeit();
    else if (stepKey === 'bewertung') html += renderStepBewertung();
    else if (stepKey === 'varroa') html += renderStepVarroa();
    else if (stepKey === 'koenigin') html += renderStepKoenigin();
    
    // === NOTIZEN (immer sichtbar) ===
    html += '<div style="margin-top:1.25rem;padding-top:.75rem;border-top:1px solid #E8DFD4">';
    html += '<div class="form-group" style="margin-bottom:0">';
    html += '<label class="form-label" style="font-size:.85rem">📝 Notizen</label>';
    html += '<textarea class="input" rows="2" placeholder="Besonderheiten, Beobachtungen..." onchange="formData.notizen=this.value">' + (formData.notizen||'') + '</textarea>';
    html += '</div></div>';
    
    document.getElementById('modalBody').innerHTML = html;
}

// ============================================
// STEP: VOLK & DATUM
// ============================================
function renderStepVolk() {
    var html = '';
    html += '<div class="form-group">';
    html += '<label class="form-label">Volk</label>';
    html += '<select class="input" onchange="formData.volkId=this.value;if(koeniginnen[this.value])formData.koenigin=Object.assign({},koeniginnen[this.value]);else{formData.koenigin={begattung:\'\',herkunft:\'\',belegstelle:\'\',nummer:\'\',markiert:false,farbe:\'\',jahrgang:new Date().getFullYear(),zuchtbuchNr:\'\',zuchtwerte:{},muttervolk_id:\'\',drohnenvolk_id:\'\'}}">';
    html += '<option value="">-- Volk wählen --</option>';
    standorte.forEach(function(s) {
        var sV = voelker.filter(function(v){return v.standortId===s.id;});
        if (!sV.length) return;
        html += '<optgroup label="📍 ' + s.name + '">';
        sV.forEach(function(v) {
            html += '<option value="' + v.id + '"' + (formData.volkId===v.id?' selected':'') + '>' + v.name + '</option>';
        });
        html += '</optgroup>';
    });
    html += '</select></div>';
    
    html += '<div class="form-group">';
    html += '<label class="form-label">Datum</label>';
    html += '<input type="date" class="input" value="' + formData.datum + '" onchange="formData.datum=this.value">';
    html += '</div>';
    
    return html;
}

// ============================================
// STEP: TÄTIGKEITEN
// ============================================
function renderStepTaetigkeit() {
    var html = '';
    html += '<div class="taetig-grid">';
    TAETIGKEITEN.forEach(function(t) {
        var sel = formData.taetigkeiten.find(function(x){return x.key===t.key;});
        html += '<div class="taetig-chip ' + (sel?'selected':'') + '" onclick="toggleTaetigkeit(\'' + t.key + '\')">';
        html += '<span class="tc-icon">' + t.icon + '</span>' + t.label + '</div>';
    });
    html += '</div>';
    
    formData.taetigkeiten.forEach(function(sel) {
        var def = TAETIGKEITEN.find(function(x){return x.key===sel.key;});
        if (!def) return;
        if (def.subs && def.subs.length) {
            html += '<div class="sub-options">';
            html += '<div style="font-size:.8rem;font-weight:600;margin-bottom:.35rem">' + def.icon + ' ' + def.label + ':</div>';
            def.subs.forEach(function(sub) {
                var isSel = (sel.subs||[]).indexOf(sub) > -1;
                html += '<span class="sub-chip ' + (isSel?'selected':'') + '" onclick="toggleSub(\'' + sel.key + '\',\'' + sub + '\')">' + sub + '</span>';
            });
            html += '</div>';
        }
        if (def.menge) {
            html += '<div class="menge-row">';
            html += '<span class="menge-label">' + def.icon + ' Menge:</span>';
            html += '<input type="number" class="menge-input" value="' + (sel.menge||'') + '" placeholder="0" step="0.1" onchange="setMenge(\'' + sel.key + '\',this.value)">';
            html += '<span class="menge-label">' + def.mengeUnit + '</span></div>';
        }
    });
    
    return html;
}

// ============================================
// STEP: BEWERTUNG
// ============================================
function renderStepBewertung() {
    var html = '';
    html += '<div style="font-size:.75rem;color:#7A6652;margin-bottom:.75rem">Nur ausfüllen was sich geändert hat – Rest bleibt bei 3/5.</div>';
    
    html += '<div style="font-size:.7rem;font-weight:600;color:#A69580;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem">Zucht-Kriterien</div>';
    KRITERIEN_ALT.forEach(function(k){ html += renderKriteriumRow(k); });
    
    html += '<div style="font-size:.7rem;font-weight:600;color:#A69580;text-transform:uppercase;letter-spacing:.06em;margin:1rem 0 .5rem">Bestandsführung</div>';
    KRITERIEN_NEU.forEach(function(k){ html += renderKriteriumRow(k); });
    return html;
}

function renderKriteriumRow(k) {
    var val = formData.kriterien[k.key] || 3;
    var html = '<div style="margin-bottom:.75rem">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center">';
    html += '<label style="font-size:.88rem;font-weight:500;color:#3D2E1F">' + k.label + '</label>';
    html += '<span style="font-size:.75rem;color:#7A6652;font-weight:600">' + val + '/5</span></div>';
    html += '<div style="font-size:.68rem;color:#94a3b8;margin-bottom:.25rem">' + k.desc + '</div>';
    html += '<div class="stars">';
    for (var i = 1; i <= 5; i++) {
        html += '<span class="star ' + (i<=val?'active':'') + '" onclick="formData.kriterien[\'' + k.key + '\']=' + i + ';renderModal()">★</span>';
    }
    html += '</div></div>';
    return html;
}

// ============================================
// STEP: VARROA
// ============================================
function renderStepVarroa() {
    var html = '';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">';
    html += '<div class="form-group" style="margin:0"><label class="form-label" style="font-size:.82rem">Milben gezählt</label>';
    html += '<input type="number" class="input" value="' + (formData.varroa.milben||'') + '" placeholder="0" onchange="formData.varroa.milben=parseInt(this.value)||0;renderModal()"></div>';
    html += '<div class="form-group" style="margin:0"><label class="form-label" style="font-size:.82rem">Tage</label>';
    html += '<input type="number" class="input" value="' + (formData.varroa.tage||'1') + '" placeholder="1" min="1" onchange="formData.varroa.tage=parseInt(this.value)||1;renderModal()"></div>';
    html += '</div>';
    html += '<div class="form-group" style="margin-top:.75rem;margin-bottom:.5rem"><label class="form-label" style="font-size:.82rem">Methode</label>';
    html += '<select class="input" onchange="formData.varroa.methode=this.value">';
    ['Puderzucker','Windel','Alkoholwaschung','CO2','Sonstiges'].forEach(function(m) {
        html += '<option' + (formData.varroa.methode===m?' selected':'') + '>' + m + '</option>';
    });
    html += '</select></div>';
    
    var milben = parseInt(formData.varroa.milben) || 0;
    var tage = parseInt(formData.varroa.tage) || 1;
    if (milben > 0) {
        var mProTag = (milben / tage).toFixed(1);
        var cls = mProTag <= 3 ? 'low' : (mProTag <= 10 ? 'medium' : (mProTag <= 20 ? 'high' : 'critical'));
        var label = mProTag <= 3 ? '🟢 Gering' : (mProTag <= 10 ? '🟡 Mittel' : (mProTag <= 20 ? '🟠 Hoch – behandeln!' : '🔴 Kritisch!'));
        html += '<div class="varroa-result ' + cls + '">' + mProTag + ' Milben/Tag</div>';
        html += '<div style="text-align:center;font-size:.8rem;color:#7A6652">' + label + '</div>';
    }
    
    return html;
}

// ============================================
// STEP: KÖNIGIN
// ============================================
function renderStepKoenigin() {
    var html = '';
    html += '<div class="form-group" style="margin-bottom:.75rem"><label class="form-label" style="font-size:.82rem">Art der Begattung</label>';
    html += '<select class="input" onchange="formData.koenigin.begattung=this.value"><option value="">-- wählen --</option>';
    ['Standbegattung','Belegstelle','Besamung'].forEach(function(b) {
        html += '<option' + (formData.koenigin.begattung===b?' selected':'') + '>' + b + '</option>';
    });
    html += '</select></div>';
    
    html += '<div class="form-group" style="margin-bottom:.75rem"><label class="form-label" style="font-size:.82rem">Herkunft</label>';
    html += '<select class="input" onchange="formData.koenigin.herkunft=this.value;renderModal()"><option value="">-- wählen --</option>';
    [{v:'eigene_aktiv',l:'Eigene Königin (aktives Volk)'},{v:'eigene_aufgeloest',l:'Eigene Königin (aufgelöstes Volk)'},{v:'fremde',l:'Fremde Königin'}].forEach(function(o) {
        html += '<option value="' + o.v + '"' + (formData.koenigin.herkunft===o.v?' selected':'') + '>' + o.l + '</option>';
    });
    html += '</select></div>';
    
    if (formData.koenigin.herkunft === 'fremde') {
        html += '<div class="form-group" style="margin-bottom:.75rem"><label class="form-label" style="font-size:.82rem">Belegstelle / Quelle</label>';
        html += '<input type="text" class="input" value="' + (formData.koenigin.belegstelle||'') + '" placeholder="z.B. Gebirgs-Belegstelle..." onchange="formData.koenigin.belegstelle=this.value"></div>';
        html += '<div class="form-group" style="margin-bottom:.75rem"><label class="form-label" style="font-size:.82rem">Nummer</label>';
        html += '<input type="text" class="input" value="' + (formData.koenigin.nummer||'') + '" placeholder="z.B. K-2025-12" onchange="formData.koenigin.nummer=this.value"></div>';
    }
    
    // === Abstammung (Muttervolk & Drohnenvolk) ===
    html += '<div style="margin-top:.75rem;padding-top:.75rem;border-top:1px solid #E8DFD4">';
    html += '<h4 style="font-size:.88rem;color:#92400E;margin-bottom:.75rem;display:flex;align-items:center;gap:.35rem">🌳 Abstammung <span style="font-size:.65rem;color:#94a3b8;font-weight:400">für Stammbaum</span></h4>';

    html += '<div class="form-group" style="margin-bottom:.75rem"><label class="form-label" style="font-size:.82rem">Muttervolk (Königin stammt von)</label>';
    html += '<select class="input" onchange="formData.koenigin.muttervolk_id=this.value"><option value="">-- kein Muttervolk --</option>';
    voelker.forEach(function(v) {
        if (v.id === formData.volkId) return;
        var s = standorte.find(function(x){return x.id===v.standortId;});
        html += '<option value="' + v.id + '"' + (formData.koenigin.muttervolk_id===v.id?' selected':'') + '>' + v.name + (s?' ('+s.name+')':'') + '</option>';
    });
    html += '</select></div>';

    html += '<div class="form-group" style="margin-bottom:.75rem"><label class="form-label" style="font-size:.82rem">Drohnenvolk (Vater-Seite)</label>';
    html += '<select class="input" onchange="formData.koenigin.drohnenvolk_id=this.value"><option value="">-- kein Drohnenvolk --</option>';
    voelker.forEach(function(v) {
        if (v.id === formData.volkId) return;
        var s = standorte.find(function(x){return x.id===v.standortId;});
        html += '<option value="' + v.id + '"' + (formData.koenigin.drohnenvolk_id===v.id?' selected':'') + '>' + v.name + (s?' ('+s.name+')':'') + '</option>';
    });
    html += '</select></div>';
    html += '</div>';

    // Jahrgang (immer sichtbar – jede Königin hat einen Jahrgang)
    var currentYear = new Date().getFullYear();
    html += '<div class="form-group" style="margin-bottom:.75rem"><label class="form-label" style="font-size:.82rem">Jahrgang</label>';
    html += '<select class="input" onchange="formData.koenigin.jahrgang=parseInt(this.value);autoSetFarbe();renderModal()">';
    for (var y = currentYear; y >= currentYear - 8; y--) {
        html += '<option value="' + y + '"' + (formData.koenigin.jahrgang==y?' selected':'') + '>' + y + ' – ' + getFarbeLabel(y) + '</option>';
    }
    html += '</select></div>';
    
    // Markierung
    html += '<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem">';
    html += '<label style="font-size:.85rem;font-weight:500">Königin markiert?</label>';
    html += '<label style="display:flex;align-items:center;gap:.35rem;cursor:pointer"><input type="checkbox" ' + (formData.koenigin.markiert?'checked':'') + ' onchange="formData.koenigin.markiert=this.checked;if(this.checked)autoSetFarbe();renderModal()" style="width:20px;height:20px;accent-color:#F5A623"> <span style="font-size:.85rem">' + (formData.koenigin.markiert?'Ja':'Nein') + '</span></label>';

        html += '<label class="form-label" style="font-size:.82rem">Farbe <span style="font-size:.68rem;color:#94a3b8;font-weight:400">automatisch nach Jahrgang – klick zum Ändern</span></label>';
        html += '<div class="color-pills">';
        [{key:'weiss',label:'Weiß',endziffer:'1/6'},{key:'gelb',label:'Gelb',endziffer:'2/7'},{key:'rot',label:'Rot',endziffer:'3/8'},{key:'gruen',label:'Grün',endziffer:'4/9'},{key:'blau',label:'Blau',endziffer:'5/0'}].forEach(function(c) {
            html += '<div style="display:flex;flex-direction:column;align-items:center;gap:.2rem">';
            html += '<div class="color-pill c-' + c.key + ' ' + (formData.koenigin.farbe===c.key?'selected':'') + '" onclick="formData.koenigin.farbe=\'' + c.key + '\';renderModal()"></div>';
            html += '<span style="font-size:.55rem;color:#7A6652">' + c.endziffer + '</span></div>';

        {key:'gesamt', label:'Gesamtzuchtwert', icon:'⭐'}

        html += '</div>';
    });

    html += '<div style="font-size:.68rem;color:#94a3b8;margin-top:.25rem">100 = Populationsdurchschnitt. Werte aus BeeBreed-Zuchtbuchblatt übernehmen.</div>';

    return html;
}

function autoSetFarbe() {
    var j = formData.koenigin.jahrgang;
    if (!j) return;
    formData.koenigin.farbe = getFarbeFromJahr(j);
}

function getFarbeFromJahr(jahr) {
    if (!jahr) return '';
    var endziffer = jahr % 10;
    var map = {1:'weiss',6:'weiss',2:'gelb',7:'gelb',3:'rot',8:'rot',4:'gruen',9:'gruen',5:'blau',0:'blau'};
    return map[endziffer] || '';
}

function getFarbeLabel(jahr) {
    var farben = {weiss:'⬜ Weiß',gelb:'🟡 Gelb',rot:'🔴 Rot',gruen:'🟢 Grün',blau:'🔵 Blau'};
    return farben[getFarbeFromJahr(jahr)] || '';
}

var selectedStammbaumVolk = '';

function renderStammbaum() {
    var html = '';

    // Volk-Auswahl
    html += '<div class="card">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">';
    html += '<h3 style="margin:0">🌳 Stammbaum</h3>';
    if (selectedStammbaumVolk) {
        html += '<button onclick="exportStammbaumPDF()" style="padding:.4rem .8rem;background:#F5A623;color:#fff;border:none;border-radius:.5rem;font-size:.8rem;font-weight:600;cursor:pointer">📄 PDF Export</button>';
    }
    html += '</div>';
    html += '<select class="input" onchange="selectedStammbaumVolk=this.value;render()">';
    html += '<option value="">-- Volk wählen --</option>';
    standorte.forEach(function(s) {
        var sV = voelker.filter(function(v){return v.standortId===s.id;});
        if (!sV.length) return;
        html += '<optgroup label="📍 ' + s.name + '">';
        sV.forEach(function(v) {
            var kI = koeniginnen[v.id];
            var hatAbstammung = kI && (kI.muttervolk_id || kI.drohnenvolk_id);
            html += '<option value="' + v.id + '"' + (selectedStammbaumVolk===v.id?' selected':'') + '>' + v.name + (hatAbstammung?' 🌳':'') + '</option>';
        });
        html += '</optgroup>';
    });
    html += '</select></div>';

    if (!selectedStammbaumVolk) {
        // Übersicht: alle Völker mit Abstammung zeigen
        var mitAbstammung = voelker.filter(function(v) {
            var kI = koeniginnen[v.id];
            return kI && (kI.muttervolk_id || kI.drohnenvolk_id);
        });

        if (mitAbstammung.length) {
            html += '<div class="card"><h3 style="margin-bottom:.75rem">🌳 Völker mit Abstammung</h3>';
            html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:.75rem">';
            mitAbstammung.forEach(function(v) {
                var kI = koeniginnen[v.id] || {};
                var s = standorte.find(function(x){return x.id===v.standortId;});
                var mv = kI.muttervolk_id ? voelker.find(function(x){return x.id===kI.muttervolk_id;}) : null;
                var dv = kI.drohnenvolk_id ? voelker.find(function(x){return x.id===kI.drohnenvolk_id;}) : null;
                html += '<div class="volk-grid-card" onclick="selectedStammbaumVolk=\'' + v.id + '\';render()" style="cursor:pointer">';
                html += '<div style="font-weight:700">🐝 ' + v.name + '</div>';
                if (s) html += '<div style="font-size:.72rem;color:#7A6652">📍 ' + s.name + '</div>';
                html += '<div style="margin-top:.35rem;font-size:.78rem">';
                if (mv) html += '<div style="color:#D4930D">👑 Mutter: ' + mv.name + '</div>';
                if (dv) html += '<div style="color:#3B82F6">🐝♂ Drohne: ' + dv.name + '</div>';
                html += '</div></div>';
            });
            html += '</div></div>';
        } else {
            html += '<div class="card" style="text-align:center;padding:3rem;color:#7A6652">';
            html += '<div style="font-size:3rem;margin-bottom:1rem">🌳</div>';
            html += '<h3>Noch keine Abstammungsdaten</h3>';
            html += '<p style="margin-top:.5rem">Pflege Mutter- und Drohnenvolk über 📋 Durchsicht → 👑 Königin → 🌳 Abstammung</p>';
            html += '</div>';
        }
        return html;
    }

    // Stammbaum für gewähltes Volk
    html += '<div id="stammbaumContainer" class="card" style="overflow-x:auto">';
    html += '<div class="stammbaum-tree">';
    html += renderBaumKnoten(selectedStammbaumVolk, 0);
    html += '</div></div>';

    // Legende
    html += '<div class="card" style="display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;font-size:.8rem;color:#7A6652">';
    html += '<strong>Legende:</strong>';
    html += '<span class="stammbaum-label mutter" style="margin:0">👑 Muttervolk</span>';
    html += '<span class="stammbaum-label drohne" style="margin:0">🐝 Drohnenvolk</span>';
    html += '</div>';

    return html;

function renderBaumKnoten(volkId, tiefe) {
    if (!volkId || tiefe > 4) return '';
    var v = voelker.find(function(x){return x.id===volkId;});
    if (!v) return '<div style="padding:.5rem;color:#A69580;font-size:.8rem;font-style:italic;text-align:center">Volk nicht mehr vorhanden</div>';

    var kInfo = koeniginnen[volkId] || {};
    var s = standorte.find(function(x){return x.id===v.standortId;});

    var html = '<div class="stammbaum-connector">';

    // Knoten-Card
    var cls = 'stammbaum-node-card' + (tiefe===0?' root':'');
    html += '<div class="' + cls + '">';

    // Generation-Badge
    if (tiefe > 0) html += '<span class="stammbaum-gen">Gen ' + tiefe + '</span>';

    // Farbpunkt der Königin
    if (kInfo.markiert && kInfo.farbe) {
        var fMap = {weiss:'#E5E7EB',gelb:'#FDE047',rot:'#EF4444',gruen:'#22C55E',blau:'#3B82F6'};
        html += '<div style="width:12px;height:12px;border-radius:50%;background:' + (fMap[kInfo.farbe]||'#ccc') + ';border:2px solid rgba(0,0,0,0.15);position:absolute;top:.75rem;left:.75rem"></div>';
    }

    // Name & Standort
    html += '<div style="font-weight:700;font-size:' + (tiefe===0?'1.15rem':'1rem') + ';margin-bottom:.25rem">';
    if (tiefe===0) html += '👑 ';
    html += v.name + '</div>';
    if (s) html += '<div style="font-size:.72rem;color:#7A6652;margin-bottom:.35rem">📍 ' + s.name + '</div>';

    // Details: Jahrgang, Begattung, Zuchtwerte
    var chips = [];
    if (kInfo.jahrgang) chips.push('<span class="stammbaum-badge" style="background:#FFF8EE;color:#92400E">' + kInfo.jahrgang + '</span>');
    if (kInfo.begattung) chips.push('<span class="stammbaum-badge" style="background:#f5f0eb;color:#7A6652">' + kInfo.begattung + '</span>');
    if (kInfo.zuchtbuchNr) chips.push('<span class="stammbaum-badge" style="background:#EEF2FF;color:#5B21B6;font-family:monospace">' + kInfo.zuchtbuchNr + '</span>');
    if (chips.length) html += '<div style="display:flex;flex-wrap:wrap;gap:.25rem;justify-content:center;margin-bottom:.25rem">' + chips.join('') + '</div>';

    // Zuchtwerte als Mini-Balken
    if (kInfo.zuchtwerte && kInfo.zuchtwerte.gesamt) {
        var val = kInfo.zuchtwerte.gesamt;
        var barColor = val >= 110 ? '#10b981' : val >= 100 ? '#F5A623' : val >= 90 ? '#f59e0b' : '#ef4444';
        var barW = Math.min(Math.max((val - 70) * 100 / 60, 5), 100);
        html += '<div style="margin-top:.25rem">';
        html += '<div style="font-size:.65rem;color:#7A6652;margin-bottom:.15rem">⭐ Zuchtwert: <strong>' + val + '</strong></div>';
        html += '<div style="height:6px;background:#f5f0eb;border-radius:3px;overflow:hidden"><div style="height:100%;width:' + barW + '%;background:' + barColor + ';border-radius:3px;transition:width .5s"></div></div>';
        html += '</div>';
    }

    html += '</div>'; // node-card close

    // Eltern
    var hatMutter = kInfo.muttervolk_id && voelker.find(function(x){return x.id===kInfo.muttervolk_id;});
    var hatDrohne = kInfo.drohnenvolk_id && voelker.find(function(x){return x.id===kInfo.drohnenvolk_id;});

    if (hatMutter || hatDrohne) {
        // Vertikale Linie nach unten
        html += '<div class="stammbaum-vline"></div>';

        // Eltern-Container
        html += '<div class="stammbaum-eltern">';

        if (hatMutter) {
            html += '<div class="stammbaum-zweig">';
            html += '<span class="stammbaum-label mutter">👑 Muttervolk</span>';
            html += '<div class="stammbaum-vline"></div>';
            html += renderBaumKnoten(kInfo.muttervolk_id, tiefe + 1);
            html += '</div>';
        }

        if (hatDrohne) {
            html += '<div class="stammbaum-zweig">';
            html += '<span class="stammbaum-label drohne">🐝 Drohnenvolk</span>';
            html += '<div class="stammbaum-vline drohne"></div>';
            html += renderBaumKnoten(kInfo.drohnenvolk_id, tiefe + 1);
            html += '</div>';
        }

        html += '</div>'; // eltern close
    } else if (tiefe === 0) {
        html += '<div style="margin-top:1rem;padding:.75rem;color:#A69580;font-size:.85rem;background:#FFFBF0;border-radius:.5rem;text-align:center;max-width:400px">';
        html += '💡 Pflege Mutter- und Drohnenvolk über 📋 Durchsicht → 👑 Königin → 🌳 Abstammung';
        html += '</div>';
    }

    html += '</div>'; // connector close
    return html;
}

function toggleTaetigkeit(key) {
    var idx = formData.taetigkeiten.findIndex(function(x){return x.key===key;});
    if (idx > -1) formData.taetigkeiten.splice(idx, 1);
    else formData.taetigkeiten.push({key:key, subs:[], menge:null});
    renderModal();
}

function toggleSub(tKey, sub) {
    var t = formData.taetigkeiten.find(function(x){return x.key===tKey;});
    if (!t) return;
    if (!t.subs) t.subs = [];
    var idx = t.subs.indexOf(sub);
    if (idx > -1) t.subs.splice(idx,1);
    else t.subs.push(sub);
    renderModal();
}

function setMenge(tKey, val) {
    var t = formData.taetigkeiten.find(function(x){return x.key===tKey;});
    if (t) t.menge = parseFloat(val) || null;
}

// CRUD

async function saveDurchsicht() {
    var v = voelker.find(function(x){return x.id===formData.volkId;});
    var s = v ? standorte.find(function(x){return x.id===v.standortId;}) : null;
    
    var dbData = {
        volk_id: formData.volkId,
        volk_name: v ? v.name : '',
        standort_name: s ? s.name : '',
        datum: formData.datum,
        taetigkeiten: formData.taetigkeiten,
        kriterien: formData.kriterien,
        varroa: (parseInt(formData.varroa.milben) > 0) ? formData.varroa : null,
        notizen: formData.notizen
    };
    
    if (editDurchsicht) {
        var res = await sb.from('durchsichten').update(dbData).eq('id', editDurchsicht);
        if (res.error) { alert('Fehler: ' + res.error.message); return; }
        
        var idx = durchsichten.findIndex(function(x){return x.id===editDurchsicht;});
        if (idx > -1) {
            durchsichten[idx] = Object.assign({id:editDurchsicht, created:durchsichten[idx].created}, {
                volkId: formData.volkId, datum: formData.datum,
                taetigkeiten: JSON.parse(JSON.stringify(formData.taetigkeiten)),
                kriterien: Object.assign({}, formData.kriterien),
                varroa: dbData.varroa ? Object.assign({}, formData.varroa) : null,
                notizen: formData.notizen
            });
        }
        toast('✅ Durchsicht aktualisiert');
    } else {
        var id = crypto.randomUUID();
        dbData.id = id;
        dbData.user_id = currentUser.id;
        var res = await sb.from('durchsichten').insert(dbData);
        if (res.error) { alert('Fehler: ' + res.error.message); return; }
        
        durchsichten.unshift({
            id:id, volkId:formData.volkId, datum:formData.datum,
            taetigkeiten: JSON.parse(JSON.stringify(formData.taetigkeiten)),
            kriterien: Object.assign({}, formData.kriterien),
            varroa: dbData.varroa ? Object.assign({}, formData.varroa) : null,
            notizen: formData.notizen, created: new Date().toISOString()
        });
        toast('✅ Durchsicht gespeichert');
    }
    
    // Königin-Info speichern (in voelker-Tabelle als JSON)
    if (formData.koenigin.begattung) {
        koeniginnen[formData.volkId] = Object.assign({}, formData.koenigin);
        await sb.from('voelker').update({koenigin_info: formData.koenigin}).eq('id', formData.volkId);
    }
    
    closeModal();
    render();
}

async function deleteDurchsicht(id) {
    if (!confirm('Durchsicht wirklich löschen?')) return;
    await sb.from('durchsichten').delete().eq('id', id);
    durchsichten = durchsichten.filter(function(d){return d.id!==id;});
    toast('🗑️ Gelöscht');
    render();
}

async function deleteLegacyBewertung(id) {
    if (!confirm('Alte Bewertung wirklich löschen?')) return;
    await sb.from('bewertungen').delete().eq('id', id);
    bewertungen = bewertungen.filter(function(b){return b.id!==id;});
    toast('🗑️ Gelöscht');
    render();
}

function renderZuchtwertkarte(kInfo) {
    var zw = kInfo.zuchtwerte;
    if (!zw) return '';
    var html = '<div class="zw-card">';
    html += '<h4>📊 BeeBreed Zuchtwerte</h4>';
    if (kInfo.zuchtbuchNr) html += '<div class="zw-nr">' + kInfo.zuchtbuchNr + '</div>';
    
    var felder = [
        {key:'gesamt', label:'Gesamt', icon:'⭐'},
        {key:'honig', label:'Honig', icon:'🍯'},
        {key:'sanftmut', label:'Sanftmut', icon:'🤲'},
        {key:'wabensitz', label:'Wabensitz', icon:'🪵'},
        {key:'schwarm', label:'Schwarm', icon:'🐝'},
        {key:'varroa', label:'Varroa', icon:'🔬'}
    ];
    
    felder.forEach(function(f) {
        var val = zw[f.key];
        if (!val && val !== 0) return;
        var pct = Math.max(0, Math.min(100, ((val - 70) / 60) * 100)); // 70-130 range -> 0-100%
        var color = val >= 110 ? '#10b981' : (val >= 100 ? '#F5A623' : (val >= 90 ? '#f59e0b' : '#ef4444'));
        var isGesamt = f.key === 'gesamt';
        
        html += '<div class="zw-row" style="' + (isGesamt?'font-weight:700;margin-top:.25rem;padding-top:.35rem;border-top:1px solid #E8DFD4':'') + '">';
        html += '<span class="zw-label">' + f.icon + ' ' + f.label + '</span>';
        html += '<span class="zw-value" style="color:' + color + '">' + val + '</span>';
        html += '<div class="zw-bar-bg"><div class="zw-bar-ref"></div><div class="zw-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
        html += '</div>';
    });
    
    html += '</div>';
    return html;
}

function durchschnittKriterien(krit) {
    if (!krit) return 0;
    var sum = 0, count = 0;
    KRITERIEN.forEach(function(k) {
        if (krit[k.key] !== undefined) { sum += krit[k.key]; count++; }
    });
    return count > 0 ? sum / count : 0;
}

function durchschnittAlt(b) {
    var sum = 0;
    KRITERIEN_ALT.forEach(function(k){ sum += (b[k.key] || 3); });
    return sum / KRITERIEN_ALT.length;
}

function renderMiniStars(schnitt) {
    var full = Math.round(schnitt);
    var html = '';
    for (var i = 1; i <= 5; i++) {
        html += '<span style="color:' + (i<=full?'#F5A623':'#E8DFD4') + ';font-size:.8rem">★</span>';
    }
    return html;
}

function getBadgeFromSchnitt(schnitt) {
    if (schnitt === null) return '<span class="badge badge-gray">–</span>';
    if (schnitt >= 4) return '<span class="badge badge-green">Sehr gut</span>';
    if (schnitt >= 3) return '<span class="badge badge-yellow">Gut</span>';
    return '<span class="badge badge-red">Schwach</span>';
}

function getColorDot(farbe) {
    var colors = {weiss:'#fff',gelb:'#facc15',rot:'#ef4444',gruen:'#22c55e',blau:'#3b82f6'};
    if (!farbe || !colors[farbe]) return '';
    var border = farbe==='weiss' ? '#ccc' : colors[farbe];
    return '<span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:' + colors[farbe] + ';border:2px solid ' + border + ';vertical-align:middle"></span>';
}

function formatHerkunft(h) {
    var map = {eigene_aktiv:'Eigene (aktiv)',eigene_aufgeloest:'Eigene (aufgelöst)',fremde:'Fremde Königin'};
    return map[h] || h || '–';
}

function fmtDate(d) {
    return new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'});
}

function fmtDateShort(d) {
    return new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'short'});
}

function toast(msg, typ) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast' + (typ ? ' ' + typ : '') + ' show';
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

    ['genug futter','futterversorgung',5],['futter reicht','futterversorgung',4],['futter knapp','futterversorgung',2],['kein futter','futterversorgung',1],
    ['gesund','gesundheit',5],['kerngesund','gesundheit',5],['krank','gesundheit',1],['auffällig','gesundheit',2],
    ['kaum milben','varroa_beurteilung',5],['wenig milben','varroa_beurteilung',4],['milbenbefall','varroa_beurteilung',2],['hoher milbenbefall','varroa_beurteilung',1],['viele milben','varroa_beurteilung',1],
    ['eng','raumreserve',1],['zu eng','raumreserve',1],['platz reicht','raumreserve',4],['genug platz','raumreserve',5],['braucht erweiterung','raumreserve',2]
];
SPECIAL_PHRASES.sort(function(a,b){return b[0].length-a[0].length});

var ZAHLWOERTER = {eins:1,eine:1,ein:1,zwei:2,zwo:2,drei:3,vier:4,fünf:5,fuenf:5,sechs:6,sieben:7,acht:8,neun:9,zehn:10};

function normalizeText(t){return t.toLowerCase().replace(/[.,;:!?]+/g,' ').replace(/\s+/g,' ').trim();}

function isSafari(){var u=navigator.userAgent;return /Safari/.test(u)&&!/Chrome/.test(u)&&!/Chromium/.test(u)&&!/CriOS/.test(u)&&!/Edg/.test(u);}

function toggleSpeech(){speechActive?stopSpeech():startSpeech();}

function startSpeech(){
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    useFallback=!SR||isSafari();
    speechActive=true;currentSprachVolk=null;sprachBewertungen={};sprachLogEntries=[];
    document.getElementById('speechFab').classList.add('active');
    document.getElementById('speechPanel').classList.add('active');
    if(useFallback){
        document.getElementById('spInputArea').innerHTML=
            '<div style="background:#FFF8EE;border:2px solid rgba(245,166,35,0.2);border-radius:.75rem;padding:.75rem;margin-bottom:.75rem">'+
            '<div style="font-weight:600;font-size:.9rem;margin-bottom:.5rem">📱 So geht\'s:</div>'+
            '<div style="font-size:.8rem;color:#7A6652;line-height:1.5">'+
            '1. Tippe ins Textfeld unten<br>2. Drücke die <strong>🎤 Taste</strong> auf deiner Tastatur<br>3. Sprich deine Bewertung<br>4. Drücke <strong>"✨ Auswerten"</strong></div></div>'+
            '<textarea id="spDictateBox" class="sp-dictate-area" placeholder="Beispiel: Volk 1, Sanftmut 4, Wabensitz gut, kein Schwarmtrieb, Futter reicht, weiselrichtig" rows="4"></textarea>'+
            '<button class="sp-dictate-btn" onclick="parseDictation()">✨ Auswerten</button>';
        addSprachLog('📱 Diktier-Modus: Nutze die 🎤 Taste auf deiner Tastatur');
        setTimeout(function(){var b=document.getElementById('spDictateBox');if(b)b.focus();},400);
    } else {
        document.getElementById('spInputArea').innerHTML='<div id="spTranscript" class="sp-transcript"><span style="color:#94a3b8">🎤 Warte auf Sprache...</span></div>';
        recognition=new SR();
        recognition.lang='de-DE';recognition.continuous=true;recognition.interimResults=true;recognition.maxAlternatives=1;
        recognition.onresult=function(ev){
            var interim='';
            for(var i=ev.resultIndex;i<ev.results.length;i++){
                var t=ev.results[i][0].transcript;
                if(ev.results[i].isFinal){processSpeechResult(t);}else{interim=t;}
            }
            var el=document.getElementById('spTranscript');
            if(el&&interim) el.innerHTML='<span class="interim">🎤 '+interim+'</span>';
        };
        recognition.onerror=function(ev){if(ev.error==='no-speech'||ev.error==='aborted')return;addSprachLog('⚠️ Fehler: '+ev.error);};
        recognition.onend=function(){if(speechActive){try{recognition.start();}catch(e){}}};
        try{recognition.start();}catch(e){alert('Mikrofon konnte nicht gestartet werden.');speechActive=false;return;}
        addSprachLog('🎤 Sprachmodus gestartet — sprich jetzt');
    }
    updateSpeechPanel();
}

function stopSpeech(){
    speechActive=false;
    if(recognition){try{recognition.stop();}catch(e){}recognition=null;}
    document.getElementById('speechFab').classList.remove('active');
    document.getElementById('speechPanel').classList.remove('active');
    if(currentSprachVolk)autoSaveSprachBewertung();
    render();
}

function parseDictation(){
    var box=document.getElementById('spDictateBox');
    if(!box||!box.value.trim()){addSprachLog('⚠️ Kein Text');updateSpeechPanel();return;}
    var segs=box.value.trim().split(/[.,;\n]+/);
    segs.forEach(function(s){s=s.trim();if(s)processSpeechResult(s);});
    box.value='';box.placeholder='Weiterdiktieren oder nächstes Volk...';box.focus();
    updateSpeechPanel();
}

function processSpeechResult(text){
    var raw=text.trim();if(!raw)return;
    var lower=normalizeText(raw);
    var spTr=document.getElementById('spTranscript');
    if(spTr)spTr.innerHTML='💬 <em>"'+raw+'"</em>';
    // Commands
    if(/^(stopp|stop|fertig|beenden|ende)$/.test(lower)){stopSpeech();return;}
    if(/\bspeichern\b/.test(lower)){saveCurrentSprachBewertung();return;}
    if(/\bableger\b/.test(lower)){handleSprachAbleger(lower);return;}
    // Notiz
    var notizM=lower.match(/\bnotiz\s+(.+)/);
    if(notizM&&currentSprachVolk&&sprachBewertungen[currentSprachVolk.id]){
        var n=sprachBewertungen[currentSprachVolk.id].notizen;
        sprachBewertungen[currentSprachVolk.id].notizen=n?n+'. '+notizM[1]:notizM[1];
        addSprachLog('📝 Notiz: '+notizM[1]);updateSpeechPanel();return;
    }
    // Volk erkennen
    var vm=detectSprachVolk(lower);
    if(vm&&(!currentSprachVolk||currentSprachVolk.id!==vm.id)){
        if(currentSprachVolk&&sprachBewertungen[currentSprachVolk.id])autoSaveSprachBewertung();
        currentSprachVolk=vm;
        if(!sprachBewertungen[vm.id])initSprachBew(vm.id);
        var st=standorte.find(function(s){return s.id===vm.standortId;});
        addSprachLog('🐝 '+vm.name+(st?' (📍 '+st.name+')':''));
    }
    // Bewertungen extrahieren
    if(currentSprachVolk){
        var n=extractSprachRatings(lower);
        if(n===0&&!vm&&!notizM){
            // Nicht erkannt → als Notiz
            var d=sprachBewertungen[currentSprachVolk.id];
            if(d){d.notizen=d.notizen?d.notizen+'. '+raw:raw;addSprachLog('📝 Als Notiz: "'+raw+'"');}
        }
    } else if(!vm){addSprachLog('⚠️ Sage zuerst ein Volk, z.B. "Volk 1"');}
    updateSpeechPanel();
}

function detectSprachVolk(text){
    // Volk-Pattern
    var m=text.match(/(?:volk|folk)\s+(\S+)/i);
    if(m){var f=findSprachVolk(m[1].trim());if(f)return f;}
    // Direkt Volknamen matchen
    var sorted=voelker.slice().sort(function(a,b){return b.name.length-a.name.length;});
    for(var i=0;i<sorted.length;i++){if(text.includes(sorted[i].name.toLowerCase()))return sorted[i];}
    return null;
}

function findSprachVolk(spoken){
    var n=spoken.toLowerCase().trim();
    Object.keys(ZAHLWOERTER).forEach(function(w){n=n.replace(new RegExp('\\b'+w+'\\b','g'),String(ZAHLWOERTER[w]));});
    var f=voelker.find(function(v){return v.name.toLowerCase()===n;});if(f)return f;
    f=voelker.find(function(v){return v.name.toLowerCase()==='volk '+n;});if(f)return f;
    f=voelker.find(function(v){return v.name.toLowerCase().includes(n)||n.includes(v.name.toLowerCase());});if(f)return f;
    if(/^\d+$/.test(n)){f=voelker.find(function(v){return v.name.match(new RegExp('\\b'+n+'\\b'));});if(f)return f;}
    return null;
}

function initSprachBew(volkId){
    var w={};KRITERIEN.forEach(function(k){w[k.key]=3;});
    sprachBewertungen[volkId]={werte:w,notizen:'',changed:[]};
}

function extractSprachRatings(text){
    if(!currentSprachVolk)return 0;
    var data=sprachBewertungen[currentSprachVolk.id];if(!data)return 0;
    var gefunden=0;
    // 1. Spezial-Phrasen
    SPECIAL_PHRASES.forEach(function(sp){
        if(text.includes(sp[0])){
            data.werte[sp[1]]=sp[2];
            if(data.changed.indexOf(sp[1])===-1)data.changed.push(sp[1]);
            addSprachLog('✅ '+getLabelForKey(sp[1])+' → '+sp[2]+'/5');
            text=text.replace(sp[0],' ');gefunden++;
        }
    });
    // 2. Kriterium + Bewertung
    KRITERIEN.forEach(function(k){
        var kws=SPRACH_KEYWORDS[k.key];if(!kws)return;
        for(var i=0;i<kws.length;i++){
            var idx=text.indexOf(kws[i]);if(idx===-1)continue;
            var after=text.substring(idx+kws[i].length).trim().replace(/^(ist|hat|war|wird|auf)\s+/,'');
            var r=parseSprachRating(after);
            if(r){data.werte[k.key]=r;if(data.changed.indexOf(k.key)===-1)data.changed.push(k.key);addSprachLog('✅ '+k.label+' → '+r+'/5');gefunden++;}
            break;
        }
    });
    return gefunden;
}

function parseSprachRating(text){
    text=text.trim().toLowerCase();if(!text)return null;
    var nm=text.match(/^(\d)/);if(nm){var n=parseInt(nm[1]);if(n>=1&&n<=5)return n;}
    var zk=Object.keys(ZAHLWOERTER).sort(function(a,b){return b.length-a.length;});
    for(var z=0;z<zk.length;z++){if(text.startsWith(zk[z])){var v=ZAHLWOERTER[zk[z]];if(v>=1&&v<=5)return v;}}
    var prefixes=['','so ','ganz ','total ','echt ','richtig ','recht ','ziemlich '];
    for(var i=0;i<WORT_BEWERTUNG.length;i++){
        for(var p=0;p<prefixes.length;p++){
            if(text.startsWith(prefixes[p]+WORT_BEWERTUNG[i][0]))return WORT_BEWERTUNG[i][1];
        }
    }
    return null;
}

function getLabelForKey(key){var k=KRITERIEN.find(function(x){return x.key===key;});return k?k.label:key;}

// Ableger per Sprache erstellen
async function handleSprachAbleger(text){
    var from=currentSprachVolk;
    var vm=text.match(/ableger\s+(?:von|vom|aus)\s+(.+?)(?:[,.]|$)/i);
    if(vm){var f=findSprachVolk(vm[1].trim());if(f)from=f;}
    if(!from){addSprachLog('⚠️ Kein Volk für Ableger erkannt');updateSpeechPanel();return;}
    var ablName='Ableger v. '+from.name;
    var existing=voelker.filter(function(v){return v.name.startsWith('Ableger v. '+from.name);});
    if(existing.length>0)ablName+=' ('+(existing.length+1)+')';
    var id=crypto.randomUUID();
    var res=await sb.from('voelker').insert({id:id,name:ablName,standort_id:from.standortId,user_id:currentUser.id,status:'aktiv',typ:'ableger'});
    if(res.error){addSprachLog('❌ '+res.error.message);}
    else{voelker.push({id:id,standortId:from.standortId,name:ablName,status:'aktiv',typ:'ableger',beutensystem:'Dadant',notizen:'',honigertrag:0});addSprachLog('🐝 '+ablName+' erstellt!');toast(ablName+' erstellt!');}
    updateSpeechPanel();
}

// Bewertung speichern (als Durchsicht)
async function saveCurrentSprachBewertung(){
    if(!currentSprachVolk){addSprachLog('⚠️ Kein Volk ausgewählt');return;}
    await autoSaveSprachBewertung();
    currentSprachVolk=null;updateSpeechPanel();
}

async function autoSaveSprachBewertung(){
    if(!currentSprachVolk)return;
    var data=sprachBewertungen[currentSprachVolk.id];if(!data)return;
    if(data.changed.length===0&&!data.notizen){addSprachLog('ℹ️ Nichts zu speichern für '+currentSprachVolk.name);return;}
    var v=currentSprachVolk;
    var s=standorte.find(function(x){return x.id===v.standortId;});
    var today=new Date().toISOString().slice(0,10);
    var dbData={
        id:crypto.randomUUID(),user_id:currentUser.id,volk_id:v.id,
        volk_name:v.name,standort_name:s?s.name:'',datum:today,
        taetigkeiten:[],kriterien:data.werte,varroa:{},notizen:data.notizen||''
    };
    var res=await sb.from('durchsichten').insert(dbData);
    if(res.error){addSprachLog('❌ Speichern fehlgeschlagen: '+res.error.message);}
    else{
        durchsichten.unshift({id:dbData.id,volkId:v.id,volkName:v.name,standortName:dbData.standort_name,datum:today,taetigkeiten:[],kriterien:data.werte,varroa:{},notizen:data.notizen||'',created:new Date().toISOString()});
        addSprachLog('💾 '+v.name+' gespeichert ('+data.changed.length+' Kriterien)');
        toast('💾 Bewertung für '+v.name+' gespeichert');
        delete sprachBewertungen[v.id];
    }
}

// UI Updates
function updateSpeechPanel(){
    var vb=document.getElementById('spVolkBox');
    if(currentSprachVolk){
        var st=standorte.find(function(s){return s.id===currentSprachVolk.standortId;});
        vb.innerHTML='<div class="sp-volk-name">🐝 '+currentSprachVolk.name+'</div>'+(st?'<div class="sp-volk-standort">📍 '+st.name+'</div>':'');
    }else{vb.innerHTML='<div style="color:#94a3b8;font-size:.9rem">🎤 Sage ein Volk: <em>"Volk 1"</em></div>';}
    var ke=document.getElementById('spKriterien');
    if(currentSprachVolk&&sprachBewertungen[currentSprachVolk.id]){
        var d=sprachBewertungen[currentSprachVolk.id];var h='';
        KRITERIEN.forEach(function(k){
            var val=d.werte[k.key];var ch=d.changed.indexOf(k.key)>-1;
            h+='<div class="sp-krit-row'+(ch?' changed':'')+'"><span>'+k.label+'</span><span class="sp-krit-stars">';
            for(var i=1;i<=5;i++)h+='<span'+(i>val?' class="off"':'')+'>★</span>';
            h+=' <span style="font-size:.72rem;color:#7A6652">'+val+'/5</span></span></div>';
        });
        if(d.notizen)h+='<div style="padding:.4rem 0;font-size:.78rem;color:#7A6652;border-top:1px solid #f5f0eb;margin-top:.25rem">📝 '+d.notizen+'</div>';
        ke.innerHTML=h;
    }else{ke.innerHTML='';}
    var le=document.getElementById('spLog');
    le.innerHTML=sprachLogEntries.map(function(e){return '<div class="sp-log-entry">'+e+'</div>';}).join('');
    le.scrollTop=le.scrollHeight;
}

function addSprachLog(msg){
    var t=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    sprachLogEntries.push('<span style="color:#94a3b8">'+t+'</span> '+msg);
    if(sprachLogEntries.length>30)sprachLogEntries.shift();
}

init();
</script>
