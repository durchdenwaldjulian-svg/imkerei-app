    <style>
        body{padding-left:220px;padding-bottom:2rem}
        /* === NAV === */
        .nav{position:fixed;left:0;top:0;bottom:0;width:220px;background:#FFFBF0;border-right:2px solid rgba(245,166,35,0.12);display:flex;flex-direction:column;padding:0;z-index:50;overflow-y:auto}
        .nav-brand{padding:1.25rem 1rem;border-bottom:2px solid rgba(245,166,35,0.12)}
        .nav-section{font-size:.65rem;font-weight:700;color:#A69580;text-transform:uppercase;letter-spacing:.08em;padding:.75rem 1rem .25rem}
        .nav-item{display:block;padding:.625rem 1rem;text-align:left;cursor:pointer;border:none;background:none;color:#7A6652;font-size:.85rem;border-left:4px solid transparent;transition:all .15s;width:100%;text-decoration:none;font-family:inherit}
        .nav-item:hover{background:rgba(245,166,35,0.06)}
        .nav-item.active{color:#92400E;font-weight:600;border-left-color:#F5A623;background:#FFF8EE}
        .container{max-width:900px;margin:0 auto;padding:1rem}

        /* TRACHT */
        .tracht-item{padding:.75rem;border-radius:.5rem;border-left:4px solid;margin-bottom:.5rem;background:#fff;border:2px solid #E8DFD4}

        /* TRACHTKALENDER TIMELINE */
        .timeline-container{background:#fff;border:2px solid #E8DFD4;border-radius:.75rem;overflow:hidden;margin-bottom:2rem}
        .timeline-header-row{display:grid;grid-template-columns:200px 1fr;background:#FFF8EE;border-bottom:2px solid #E8DFD4;font-weight:600;font-size:.9rem}
        .timeline-label-col{padding:1rem;border-right:2px solid #E8DFD4;display:flex;align-items:center;justify-content:center}
        .timeline-months{display:grid;grid-template-columns:repeat(12,1fr);text-align:center}
        .timeline-month{padding:.75rem .25rem;border-right:1px solid #E8DFD4;font-size:.85rem;color:#7A6652}
        .timeline-month:last-child{border-right:none}
        .timeline-row{display:grid;grid-template-columns:200px 1fr;border-bottom:1px solid #FFFBF0;transition:all .2s}
        .timeline-row:hover{background:#FFF8EE;transform:scale(1.01)}
        .timeline-row:last-child{border-bottom:none}
        .timeline-row-label{padding:1rem;border-right:2px solid #E8DFD4;display:flex;align-items:center;gap:.5rem;font-weight:500}
        .timeline-row-bars{display:grid;grid-template-columns:repeat(12,1fr);position:relative;padding:.5rem 0}
        .timeline-bar{height:2.5rem;border-radius:.375rem;margin:0 .15rem;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 2px 4px rgba(28,20,16,0.08);transition:all .2s;position:relative;overflow:hidden}
        .timeline-bar::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(255,255,255,.3) 0%,rgba(255,255,255,0) 100%);pointer-events:none}
        .timeline-bar:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(28,20,16,0.15);z-index:10}
        .ausgeblendet-chip{display:inline-flex;align-items:center;gap:.5rem;padding:.5rem .875rem;border-radius:.5rem;border:2px solid;cursor:pointer;transition:all .2s;font-size:.85rem;font-weight:500;opacity:.6;color:#1C1410}

        /* BADGES */
        .badge{display:inline-block;padding:.15rem .5rem;border-radius:999px;font-size:.72rem;font-weight:600}
        .badge-green{background:#E8F5EC;color:#2D8A4E}
        .badge-blue{background:#EEF2FF;color:#3B82F6}

        /* Toast kommt aus shared-styles.css */

        .loading-screen{position:fixed;inset:0;background:#FFFBF0;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1rem}
        .spinner{width:40px;height:40px;border:4px solid #E8DFD4;border-top-color:#F5A623;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .info-box{font-size:.8rem;color:#7A6652;padding:.5rem;background:#FFF8EE;border-radius:.35rem;margin:.5rem 0}

        /* TRACHTKARTE FEATURE CARD */

        /* GTS Styles */
        .gts-card{background:#fff;border:2px solid #E8DFD4;border-radius:.75rem;padding:1rem;margin-bottom:1rem}
        .gts-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
        .gts-value{font-size:2rem;font-weight:700;font-family:'DM Serif Display',serif}
        .gts-bar-container{background:#E8DFD4;border-radius:999px;height:.75rem;overflow:hidden;margin-bottom:.5rem}
        .gts-bar{height:100%;border-radius:999px;transition:width .8s ease}
        .gts-milestones{display:flex;justify-content:space-between;font-size:.7rem;color:#A69580;margin-bottom:.75rem}
        .gts-next-tracht{background:#FFF8EE;border-radius:.5rem;padding:.625rem .75rem;font-size:.85rem;display:flex;align-items:center;gap:.5rem}
        .gts-selector{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;padding:.75rem 1rem;background:#fff;border:2px solid #E8DFD4;border-radius:.75rem}
        .gts-selector label{font-weight:600;font-size:.85rem;color:#7A6652;white-space:nowrap}
        .gts-selector select{flex:1;padding:.4rem .6rem;border:1.5px solid #E8DFD4;border-radius:.5rem;background:#FFFBF0;font-family:'Outfit',sans-serif;font-size:.85rem;color:#1C1410}
        .tracht-ampel{display:inline-flex;align-items:center;gap:.25rem;font-size:.72rem;font-weight:600;padding:.15rem .5rem;border-radius:999px}
        .tracht-ampel.rot{background:#FEE2E2;color:#DC2626}
        .tracht-ampel.gelb{background:#FEF3C7;color:#D97706}
        .tracht-ampel.gruen{background:#D1FAE5;color:#059669}
        .timeline-gts-tag{font-size:.65rem;color:#A69580;background:#FFF8EE;padding:.1rem .35rem;border-radius:.25rem;border:1px solid #E8DFD4;white-space:nowrap;margin-left:.25rem}
        .tracht-gts-inline{display:flex;align-items:center;gap:.5rem;margin-top:.5rem;padding:.5rem .625rem;background:#FFFBF0;border-radius:.35rem;font-size:.8rem;border:1px solid #E8DFD4}

        .trachtkarte-card{
            background:linear-gradient(135deg,#1e40af 0%,#3b82f6 50%,#60a5fa 100%);
            border-radius:1rem;padding:1.25rem;margin-bottom:1.25rem;
            color:#fff;position:relative;overflow:hidden;cursor:pointer;
            transition:transform .2s,box-shadow .2s;
            text-decoration:none;display:block;
        }
        .trachtkarte-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(30,64,175,.35)}
        .trachtkarte-card::before{
            content:'';position:absolute;top:-40%;right:-20%;width:200px;height:200px;
            background:radial-gradient(circle,rgba(255,255,255,.12) 0%,transparent 70%);
            pointer-events:none;
        }
        .trachtkarte-card::after{
            content:'';position:absolute;bottom:-30%;left:-10%;width:150px;height:150px;
            background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%);
            pointer-events:none;
        }
        .trachtkarte-inner{position:relative;z-index:1}
        .trachtkarte-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem}
        .trachtkarte-icon{
            width:48px;height:48px;background:rgba(255,255,255,.2);
            border-radius:.75rem;display:flex;align-items:center;justify-content:center;
            font-size:1.5rem;flex-shrink:0;backdrop-filter:blur(4px);
        }
        .trachtkarte-title{font-family:'DM Serif Display',serif;font-size:1.25rem;line-height:1.2}
        .trachtkarte-subtitle{font-size:.85rem;opacity:.85;margin-bottom:.75rem;line-height:1.4}
        .trachtkarte-btn{
            display:inline-flex;align-items:center;gap:.5rem;
            background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);
            border-radius:.5rem;padding:.5rem 1rem;font-weight:600;font-size:.9rem;
            color:#fff;backdrop-filter:blur(4px);transition:all .2s;
        }
        .trachtkarte-card:hover .trachtkarte-btn{background:rgba(255,255,255,.3);border-color:rgba(255,255,255,.5)}
        .trachtkarte-tags{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.75rem}
        .trachtkarte-tag{
            background:rgba(255,255,255,.15);border-radius:999px;padding:.2rem .5rem;

        }
        .trachtkarte-info-toggle{
            position:absolute;top:.75rem;right:.75rem;z-index:2;
            width:28px;height:28px;border-radius:50%;
            background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);

            transition:all .2s;line-height:1;

            .timeline-bar{height:1.8rem;font-size:.9rem}
            .gts-selector{flex-direction:column;align-items:stretch;gap:.5rem}
            .gts-milestones{font-size:.6rem}
        }

</head>

function berechneGTS(temperaturen) {
    var summe = 0;
    temperaturen.forEach(function(t) {
        if (t.temp <= 0) return;
        var monat = parseInt(t.date.split('-')[1]);
        var faktor = monat === 1 ? 0.5 : (monat === 2 ? 0.75 : 1.0);
        summe += t.temp * faktor;
    });
    return Math.round(summe * 10) / 10;
}

async function ladeGTS(lat, lng) {
    var key = lat.toFixed(2) + '_' + lng.toFixed(2);
    var heute = new Date().toISOString().split('T')[0];
    var cacheKey = 'gts_' + key + '_' + heute;
    try {
        var cached = localStorage.getItem(cacheKey);
        if (cached) return JSON.parse(cached);
    } catch(e) {}
    var jahr = new Date().getFullYear();
    var startDate = jahr + '-01-01';
    var gestern = new Date(Date.now() - 86400000);
    var endDate = gestern.toISOString().split('T')[0];
    try {
        var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng +
            '&daily=temperature_2m_mean&start_date=' + startDate + '&end_date=' + endDate + '&timezone=Europe/Berlin';
        var resp = await fetch(url);
        if (!resp.ok) throw new Error('API Fehler');
        var data = await resp.json();
        if (!data.daily || !data.daily.time) throw new Error('Keine Daten');
        var temperaturen = data.daily.time.map(function(d, i) {
            return { date: d, temp: data.daily.temperature_2m_mean[i] };
        });
        var gts = berechneGTS(temperaturen);
        var result = { gts: gts, datum: heute, lat: lat, lng: lng };
        try { localStorage.setItem(cacheKey, JSON.stringify(result)); } catch(e) {}
        return result;
    } catch(e) {
        console.warn('GTS Laden fehlgeschlagen:', e);
        return null;
    }
}

function getGtsColor(gts) {
    if (gts < 100) return '#EF4444';
    if (gts < 200) return '#F59E0B';
    return '#10B981';
}

function getGtsStatus(gts) {
    if (gts < 100) return { text: 'Winter / Vorfrühling', emoji: '❄️' };
    if (gts < 200) return { text: 'Frühling beginnt', emoji: '🌱' };
    if (gts < 350) return { text: 'Vegetation aktiv', emoji: '🌿' };
    if (gts < 500) return { text: 'Vollfrühling/Sommer', emoji: '☀️' };
    return { text: 'Hochsommer', emoji: '🌻' };
}

function getNextTracht(gts) {
    var sorted = Object.entries(GTS_SCHWELLEN).sort(function(a,b){ return a[1]-b[1]; });
    for (var i = 0; i < sorted.length; i++) {
        if (sorted[i][1] > gts) return { name: sorted[i][0], gts: sorted[i][1], diff: Math.round(sorted[i][1] - gts) };
    }
    return null;
}

function getTrachtAmpel(trachtName, gts) {
    if (gts === null || gts === undefined) return null;
    var schwelle = GTS_SCHWELLEN[trachtName];
    if (!schwelle) return null;
    if (gts >= schwelle) return { klasse:'gruen', text:'🟢 Blüht', detail:'GTS '+Math.round(gts)+'°C ≥ '+schwelle+'°C' };
    if (gts >= schwelle * 0.85) return { klasse:'gelb', text:'🟡 Bald', detail:'Noch '+Math.round(schwelle-gts)+'°C bis '+schwelle+'°C' };
    return { klasse:'rot', text:'🔴 Noch nicht', detail:'Noch '+Math.round(schwelle-gts)+'°C bis '+schwelle+'°C' };
}

async function wechsleGtsStandort() {
    var sel = document.getElementById('gtsStandortSelect');
    if (!sel) return;
    var sid = sel.value;
    var s = standorte.find(function(x){ return x.id === sid; });
    if (s && s.lat && s.lng) {
        var gtsEl = document.getElementById('gtsCardContainer');
        if (gtsEl) gtsEl.innerHTML = '<div style="text-align:center;padding:1rem;color:#7A6652">🌡️ GTS wird geladen...</div>';
        var result = await ladeGTS(s.lat, s.lng);
        aktuelleGTS = result ? result.gts : null;
    } else {
        aktuelleGTS = null;
    }
    renderGtsCard();
    renderKalenderGTS();
    renderTrachtenGTS();
}

function renderGtsCard() {
    var el = document.getElementById('gtsCardContainer');
    if (!el) return;
    if (aktuelleGTS === null) {
        el.innerHTML = '<div style="padding:.75rem;background:#FFF8EE;border-radius:.5rem;font-size:.85rem;color:#A69580;margin-bottom:1rem">🌡️ Kein Standort mit Koordinaten gewählt – GTS nicht verfügbar</div>';
        return;
    }
    var gts = aktuelleGTS;
    var color = getGtsColor(gts);
    var status = getGtsStatus(gts);
    var next = getNextTracht(gts);
    var pct = Math.min(100, (gts / 600) * 100);

    var html = '<div class="gts-card">' +
        '<div class="gts-header">' +
        '<div><div style="font-size:.8rem;color:#7A6652;margin-bottom:.25rem">Grünlandtemperatursumme ' + new Date().getFullYear() + '</div>' +
        '<div class="gts-value" style="color:' + color + '">' + Math.round(gts) + '°C</div></div>' +
        '<div style="text-align:right"><div style="font-size:1.5rem">' + status.emoji + '</div>' +
        '<div style="font-size:.8rem;color:#7A6652">' + status.text + '</div></div></div>' +
        '<div class="gts-bar-container"><div class="gts-bar" style="width:' + pct + '%;background:linear-gradient(90deg,#EF4444 0%,#F59E0B 33%,#10B981 60%,#059669 100%)"></div></div>' +
        '<div class="gts-milestones"><span>0°C</span><span>100°C</span><span style="font-weight:600;color:#059669">200°C Veg.beginn</span><span>400°C</span><span>600°C</span></div>';
    if (next) {
        html += '<div class="gts-next-tracht">🌡️ <strong>Nächste Tracht:</strong> ' + next.name + ' – noch ~' + next.diff + '°C (ab ' + next.gts + '°C)</div>';
    } else {
        html += '<div class="gts-next-tracht" style="color:#059669">✅ Alle Haupttrachten erreicht</div>';
    }
    html += '</div>';
    el.innerHTML = html;
}

function renderKalenderGTS() {
    // Aktualisiert die Ampeln im Kalender
    document.querySelectorAll('[data-gts-tracht]').forEach(function(el) {
        var name = el.getAttribute('data-gts-tracht');
        if (aktuelleGTS !== null) {
            var ampel = getTrachtAmpel(name, aktuelleGTS);
            el.innerHTML = ampel ? '<span class="tracht-ampel '+ampel.klasse+'">'+ampel.text+'</span>' : '';
        } else {
            el.innerHTML = '';
        }
    });
}

function renderTrachtenGTS() {
    // Aktualisiert die GTS-Inline-Anzeige bei den Trachten
    document.querySelectorAll('[data-gts-tracht-item]').forEach(function(el) {
        var name = el.getAttribute('data-gts-tracht-item');
        if (aktuelleGTS !== null) {
            var ampel = getTrachtAmpel(name, aktuelleGTS);
            if (ampel) {
                el.innerHTML = '<span class="tracht-ampel '+ampel.klasse+'">'+ampel.text+'</span> <span style="color:#7A6652">'+ampel.detail+'</span>';
                el.style.display = 'flex';
            } else {
                el.style.display = 'none';
            }
        } else {
            el.style.display = 'none';
        }
    });
}

async function init() {
    var { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'app.html'; return; }
    currentUser = session.user;
    await planManager.load();

    var results = await Promise.all([
        sb.from('standorte').select('*').eq('user_id', currentUser.id),
        sb.from('voelker').select('*').eq('user_id', currentUser.id),
        sb.from('trachten').select('*').eq('user_id', currentUser.id),
        sb.from('trachten_ausgeblendet').select('*').eq('user_id', currentUser.id),
        sb.from('profiles').select('kalender_offen').eq('id', currentUser.id).single()
    ]);

    standorte = (results[0].data || []).map(function(r){ return { id:r.id, name:r.name, lat:r.lat, lng:r.lng }; });
    voelker = (results[1].data || []).map(function(r){ return { id:r.id, standortId:r.standort_id, name:r.name }; });
    trachten = (results[2].data || []).map(function(r){
        return { id:r.id, typ:r.typ, standort:r.standort, beginn:r.beginn, ende:r.ende, ertrag:parseFloat(r.ertrag)||0, notizen:r.notizen, lat:r.lat||null, lng:r.lng||null, shared:r.shared||false, created:r.created_at };
    });
    ausgeblendete = (results[3].data || []).map(function(r){ return r.tracht_name; });
    if (results[4].data) kalenderOffen = results[4].data.kalender_offen || false;

    document.getElementById('loadingScreen').style.display = 'none';
    render();
}

function fd(ts) { if (!ts) return '-'; return new Date(ts).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function toast(msg, typ) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast' + (typ ? ' ' + typ : '') + ' show';
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// ============================================
// TRACHTKALENDER
// ============================================
function renderKalender() {
    var sortiert = Object.entries(TRACHT_KALENDER).sort(function(a,b){return Math.min.apply(null,a[1].monate)-Math.min.apply(null,b[1].monate);});
    var sichtbar = sortiert.filter(function(e){return ausgeblendete.indexOf(e[0])===-1;});

    var timelineHtml = '';
    sichtbar.forEach(function(entry) {
        var name = entry[0]; var data = entry[1];
        var barsHtml = '';
        for (var i=1;i<=12;i++) {
            if (data.monate.indexOf(i) !== -1) {
                barsHtml += '<div class="timeline-bar" style="background:'+data.farbe+';grid-column:'+i+'">'+data.emoji+'</div>';
            }
        }
        timelineHtml += '<div class="timeline-row" style="cursor:pointer" onclick="event.stopPropagation();toggleTracht(\''+name.replace(/'/g,"\\\'")+'\')"><div class="timeline-row-label"><span style="font-size:1.3rem">'+data.emoji+'</span><span style="flex:1">'+name+'</span>'+(GTS_SCHWELLEN[name]?'<span class="timeline-gts-tag">'+GTS_SCHWELLEN[name]+'°C</span>':'')+'<span data-gts-tracht="'+name+'"></span></div><div class="timeline-row-bars">'+barsHtml+'</div></div>';
    });

    var ausgeblendetHtml = '';
    if (ausgeblendete.length > 0) {
        ausgeblendetHtml = '<div style="margin-top:1rem"><h3 style="font-size:.9rem;color:#7A6652;margin-bottom:.75rem">👁️‍🗨️ Ausgeblendete (klicken zum Einblenden)</h3><div style="display:flex;flex-wrap:wrap;gap:.5rem">';
        ausgeblendete.forEach(function(name) {
            var data = TRACHT_KALENDER[name];
            if (data) ausgeblendetHtml += '<div class="ausgeblendet-chip" onclick="event.stopPropagation();toggleTracht(\''+name.replace(/'/g,"\\\'")+'\')"><span>'+data.emoji+' '+name+'</span><span>✓</span></div>';
        });
        ausgeblendetHtml += '</div></div>';
    }

    return '<div style="max-width:900px;margin-top:2rem"><div style="background:#fff;border:2px solid #E8DFD4;border-radius:.75rem;padding:1rem">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none" onclick="toggleKalender()">'+
    '<div style="display:flex;align-items:center;gap:.5rem"><span style="font-size:.7rem;color:#F5A623">'+(kalenderOffen?'▼':'▶')+'</span>'+
    '<h2 style="margin:0;font-size:1.1rem">🌸 Trachtkalender <span style="font-size:.8rem;color:#7A6652;font-weight:normal">('+sichtbar.length+'/'+sortiert.length+' sichtbar)</span></h2></div>'+
    (ausgeblendete.length>0?'<button onclick="event.stopPropagation();alleEinblenden()" style="padding:.2rem .5rem;background:#3B82F6;color:#fff;border:none;border-radius:.35rem;font-size:.7rem;cursor:pointer;font-weight:600">👁️ Alle ('+ausgeblendete.length+')</button>':'')+
    '</div>'+
    '<div style="display:'+(kalenderOffen?'block':'none')+';margin-top:1rem">'+
    '<div class="info-box" style="margin-bottom:1rem">Klicke auf eine Tracht um sie auszublenden/einzublenden.</div>'+
    (sichtbar.length > 0 ?
    '<div class="timeline-container"><div class="timeline-header-row"><div class="timeline-label-col">Tracht</div><div class="timeline-months">'+
    '<div class="timeline-month">Jan</div><div class="timeline-month">Feb</div><div class="timeline-month">Mär</div><div class="timeline-month">Apr</div><div class="timeline-month">Mai</div><div class="timeline-month">Jun</div><div class="timeline-month">Jul</div><div class="timeline-month">Aug</div><div class="timeline-month">Sep</div><div class="timeline-month">Okt</div><div class="timeline-month">Nov</div><div class="timeline-month">Dez</div>'+
    '</div></div>'+timelineHtml+'</div>'
    : '<div style="text-align:center;padding:1.5rem;color:#7A6652">🌸 Keine Trachten sichtbar – blende unten ein!</div>'
    )+ausgeblendetHtml+'</div></div></div>';
}

function toggleKalender() {
    kalenderOffen = !kalenderOffen;
    if (currentUser) db.update('profiles', {kalender_offen: kalenderOffen}, currentUser.id);
    render();
}

function toggleTracht(name) {
    var idx = ausgeblendete.indexOf(name);
    if (idx > -1) {
        ausgeblendete.splice(idx, 1);
        if (currentUser) sb.from('trachten_ausgeblendet').delete().eq('user_id', currentUser.id).eq('tracht_name', name);
    } else {
        ausgeblendete.push(name);
        if (currentUser) sb.from('trachten_ausgeblendet').insert({user_id: currentUser.id, tracht_name: name});
    }
    kalenderOffen = true;
    render();
}

function alleEinblenden() {
    ausgeblendete = [];
    if (currentUser) sb.from('trachten_ausgeblendet').delete().eq('user_id', currentUser.id);
    kalenderOffen = true;
    render();
}

function openModal() {
    _editId = null;

    document.getElementById('trachtModalEnhanced').classList.add('active');

    document.getElementById('trachtStandortE').value = '';
    document.getElementById('trachtBeginnE').value = new Date().toISOString().split('T')[0];
    document.getElementById('trachtEndeE').value = '';
    document.getElementById('trachtErtragE').value = '';
    document.getElementById('trachtNotizenE').value = '';
    document.getElementById('trachtLatE').value = '';
    document.getElementById('trachtLngE').value = '';
    document.getElementById('koordinatenStatus').innerHTML = '';
    document.getElementById('trachtShareE').checked = false;
    var sel = document.getElementById('trachtStandortSelect');
    sel.innerHTML = '<option value="">-- Manuell eingeben --</option>';
    standorte.forEach(function(s){ sel.innerHTML += '<option value="'+s.id+'">📍 '+s.name+(s.lat?' (✓)':'')+'</option>'; });

}

function closeModal() { document.getElementById('trachtModalEnhanced').classList.remove('active'); }

function standortChanged() {
    var sid = document.getElementById('trachtStandortSelect').value;
    if (sid) {
        var s = standorte.find(function(x){return x.id===sid;});
        if (s) {
            document.getElementById('trachtStandortE').value = s.name;
            if (s.lat && s.lng) {
                document.getElementById('trachtLatE').value = s.lat;
                document.getElementById('trachtLngE').value = s.lng;
                document.getElementById('trachtShareE').checked = true;
                document.getElementById('koordinatenStatus').innerHTML = '<span style="color:#10b981">✅ Position von "'+s.name+'" übernommen</span>';
                setTimeout(function(){ initMapPicker(); }, 100);
            } else {
                document.getElementById('koordinatenStatus').innerHTML = '<span style="color:#f59e0b">⚠️ Standort hat keine Position. Klicke auf die Karte.</span>';
            }
        }
    }
}

function editTracht(id) {
    var t = trachten.find(function(x){return x.id===id;});
    if (!t) return;
    _editId = id;
    document.getElementById('trachtModalTitle').textContent = '✏️ Tracht bearbeiten';
    document.getElementById('trachtSaveBtn').textContent = 'Änderungen speichern';
    document.getElementById('trachtModalEnhanced').classList.add('active');
    document.getElementById('trachtTypE').value = t.typ;
    document.getElementById('trachtStandortE').value = t.standort;
    document.getElementById('trachtBeginnE').value = t.beginn ? new Date(t.beginn).toISOString().split('T')[0] : '';
    document.getElementById('trachtEndeE').value = t.ende ? new Date(t.ende).toISOString().split('T')[0] : '';
    document.getElementById('trachtErtragE').value = t.ertrag || '';
    document.getElementById('trachtNotizenE').value = t.notizen || '';
    document.getElementById('trachtLatE').value = t.lat || '';
    document.getElementById('trachtLngE').value = t.lng || '';
    document.getElementById('trachtShareE').checked = t.shared || false;
    if (t.lat && t.lng) {
        document.getElementById('koordinatenStatus').innerHTML = '<span style="color:#10b981">✅ Position: '+t.lat.toFixed(4)+', '+t.lng.toFixed(4)+'</span>';
    } else { document.getElementById('koordinatenStatus').innerHTML = ''; }
    var sel = document.getElementById('trachtStandortSelect');
    sel.innerHTML = '<option value="">-- Manuell eingeben --</option>';
    standorte.forEach(function(s){ sel.innerHTML += '<option value="'+s.id+'">📍 '+s.name+(s.lat?' (✓)':'')+'</option>'; });
    setTimeout(function(){ initMapPicker(); }, 300);
}

// ============================================
// MAP PICKER
// ============================================
function initMapPicker() {
    var container = document.getElementById('trachtMapPicker');
    if (!container) return;
    if (container._mapInstance) { container._mapInstance.remove(); container._mapInstance = null; }
    container.innerHTML = '';
    var startLat = parseFloat(document.getElementById('trachtLatE').value) || 49.0;
    var startLng = parseFloat(document.getElementById('trachtLngE').value) || 10.0;
    var startZoom = document.getElementById('trachtLatE').value ? 14 : 6;
    var map = L.map(container, {zoomControl:true}).setView([startLat, startLng], startZoom);
    container._mapInstance = map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OSM', maxZoom:19}).addTo(map);
    var marker = null;
    if (document.getElementById('trachtLatE').value) {
        marker = L.marker([startLat, startLng]).addTo(map);
    }
    map.on('click', function(e){
        document.getElementById('trachtLatE').value = e.latlng.lat;
        document.getElementById('trachtLngE').value = e.latlng.lng;
        document.getElementById('koordinatenStatus').innerHTML = '<span style="color:#10b981">✅ Position: '+e.latlng.lat.toFixed(4)+', '+e.latlng.lng.toFixed(4)+'</span>';
        if (marker) map.removeLayer(marker);
        marker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
    });
    setTimeout(function(){ map.invalidateSize(); }, 100);
    setTimeout(function(){ map.invalidateSize(); }, 500);
}

// ============================================
// SAVE
// ============================================
async function saveTracht() {
    var typ = document.getElementById('trachtTypE').value;
    var standort = document.getElementById('trachtStandortE').value.trim();
    if (!standort) {
        var selId = document.getElementById('trachtStandortSelect').value;
        if (selId) { var s = standorte.find(function(x){return x.id===selId;}); if (s) standort = s.name; }
    }
    var beginn = document.getElementById('trachtBeginnE').value;
    var ende = document.getElementById('trachtEndeE').value;
    var ertrag = parseFloat(document.getElementById('trachtErtragE').value) || 0;
    var notizen = document.getElementById('trachtNotizenE').value.trim();
    var lat = parseFloat(document.getElementById('trachtLatE').value) || null;
    var lng = parseFloat(document.getElementById('trachtLngE').value) || null;
    var share = document.getElementById('trachtShareE').checked;
    if (!standort && lat && lng) standort = 'Position '+lat.toFixed(4)+', '+lng.toFixed(4);
    if (!typ) { alert('Bitte Tracht-Typ wählen!'); return; }
    if (!standort) { alert('Bitte Standort eingeben!'); return; }

    var userName = 'Anonym';
    try { var p = await sb.from('profiles').select('name,email').eq('id',currentUser.id).single(); if(p.data) userName = p.data.name||p.data.email||'Anonym'; } catch(e){}

    if (_editId) {
        var t = trachten.find(function(x){return x.id===_editId;});
        if (t) {
            t.typ=typ; t.standort=standort; t.beginn=beginn?new Date(beginn).getTime():null; t.ende=ende?new Date(ende).getTime():null; t.ertrag=ertrag; t.notizen=notizen; t.lat=lat; t.lng=lng; t.shared=share;
            db.update('trachten',{typ:t.typ,standort:t.standort,beginn:t.beginn,ende:t.ende,ertrag:t.ertrag,notizen:t.notizen,lat:lat,lng:lng,shared:share},t.id);
            if (share && lat && lng) { 
                var shareRes = await sb.from('trachten_shared').upsert({id:t.id,user_id:currentUser.id,user_name:userName,typ:t.typ,standort:t.standort,lat:lat,lng:lng,beginn:t.beginn,ende:t.ende,ertrag:t.ertrag,notizen:t.notizen,jahr:new Date().getFullYear()}); 
                if (shareRes.error) { console.error('Teilen-Fehler:', shareRes.error); toast('⚠️ Tracht gespeichert, aber Teilen fehlgeschlagen: ' + shareRes.error.message, 'error'); }
            }
            else if (!share) { sb.from('trachten_shared').delete().eq('id',t.id); }
        }
        _editId = null;
        closeModal(); render(); toast('✓ Tracht aktualisiert!','success');
    } else {
        var t = {id:'tracht_'+Date.now(),typ:typ,standort:standort,beginn:beginn?new Date(beginn).getTime():null,ende:ende?new Date(ende).getTime():null,ertrag:ertrag,notizen:notizen,lat:lat,lng:lng,shared:share,created:Date.now()};
        var res = await db.insert('trachten',{id:t.id,user_id:currentUser.id,typ:t.typ,standort:t.standort,beginn:t.beginn,ende:t.ende,ertrag:t.ertrag,notizen:t.notizen,lat:lat,lng:lng,shared:share,created_at:t.created});
        if (res && res.error) { toast('❌ Fehler: '+res.error.message,'error'); return; }
        trachten.push(t);
        if (share && lat && lng) { 
            var shareRes = await sb.from('trachten_shared').upsert({id:t.id,user_id:currentUser.id,user_name:userName,typ:t.typ,standort:t.standort,lat:lat,lng:lng,beginn:t.beginn,ende:t.ende,ertrag:t.ertrag,notizen:t.notizen,jahr:new Date().getFullYear()}); 
            if (shareRes.error) { console.error('Teilen-Fehler:', shareRes.error); toast('⚠️ Tracht gespeichert, aber Teilen fehlgeschlagen: ' + shareRes.error.message, 'error'); }
        }
        closeModal(); render(); toast('✓ Tracht erfasst!','success');
    }
}

// ============================================
// DELETE / SHARE
// ============================================
function deleteTracht(id) {
    if (!confirm('Tracht wirklich löschen?')) return;
    trachten = trachten.filter(function(t){return t.id!==id;});
    db.del('trachten',id);
    sb.from('trachten_shared').delete().eq('id',id);
    render(); toast('🗑️ Tracht gelöscht','success');
}

async function shareTracht(id) {
    var t = trachten.find(function(x){return x.id===id;});
    if (!t) return;
    if (!t.lat || !t.lng) { toast('⚠️ Keine Koordinaten. Bearbeite die Tracht.','warning'); return; }
    var userName = 'Anonym';
    try { var p = await sb.from('profiles').select('name,email').eq('id',currentUser.id).single(); if(p.data) userName = p.data.name||p.data.email||'Anonym'; } catch(e){}
    var res = await sb.from('trachten_shared').upsert({id:t.id,user_id:currentUser.id,user_name:userName,typ:t.typ,standort:t.standort,lat:t.lat,lng:t.lng,beginn:t.beginn,ende:t.ende,ertrag:t.ertrag||0,notizen:t.notizen||'',jahr:new Date().getFullYear()});
    if (res.error) { toast('Fehler: '+res.error.message,'error'); return; }
    t.shared = true;
    db.update('trachten',{shared:true},t.id);
    render(); toast('🗺️ Auf Karte geteilt!','success');
}

async function unshareTracht(id) {
    if (!confirm('Von der Karte entfernen?')) return;
    var t = trachten.find(function(x){return x.id===id;});
    if (t) { t.shared = false; db.update('trachten',{shared:false},t.id); }
    await sb.from('trachten_shared').delete().eq('id',id);
    render(); toast('✓ Von Karte entfernt','info');
}

// ============================================
// TRACHTKARTE INFO TOGGLE
// ============================================
function toggleTrachtkarteInfo() {
    var el = document.getElementById('trachtkarteDetails');
    if (el) el.classList.toggle('open');
}

// ============================================
// START
// ============================================
init();
</script>
