<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🧬 Zuchtberater – bienenplan.de</title>
<meta name="theme-color" content="#F5A623">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="/fonts/fonts.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="shared-styles.css">
<style>
body{padding-left:220px;padding-bottom:2rem}

/* === NAV (gleiche Sidebar wie app.html) === */
.nav{position:fixed;left:0;top:0;bottom:0;width:220px;background:#FFFBF0;border-right:2px solid rgba(245,166,35,0.12);display:flex;flex-direction:column;padding:0;z-index:50;overflow-y:auto}
.nav-brand{padding:1.25rem 1rem;border-bottom:2px solid rgba(245,166,35,0.12)}
.nav-section{font-size:.65rem;font-weight:700;color:#A69580;text-transform:uppercase;letter-spacing:.08em;padding:.75rem 1rem .25rem}
.nav-item{display:block;padding:.625rem 1rem;text-align:left;cursor:pointer;border:none;background:none;color:#7A6652;font-size:.85rem;border-left:4px solid transparent;transition:all .15s;width:100%;text-decoration:none}
.nav-item:hover{background:rgba(245,166,35,0.06)}
.nav-item.active{color:#92400E;font-weight:600;border-left-color:#F5A623;background:#FFF8EE}

.container{max-width:860px;margin:0 auto;padding:1rem}

/* === HEADER === */
.zb-header{background:linear-gradient(135deg,#1C1410 0%,#2D1F15 50%,#1a2332 100%);border-radius:1rem;padding:2rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.zb-header::before{content:'';position:absolute;top:-40%;right:-5%;width:280px;height:280px;background:radial-gradient(circle,rgba(139,92,246,0.12) 0%,transparent 70%);border-radius:50%}
.zb-header::after{content:'';position:absolute;bottom:-30%;left:10%;width:200px;height:200px;background:radial-gradient(circle,rgba(245,166,35,0.1) 0%,transparent 70%);border-radius:50%}
.zb-header h1{color:#F5A623;font-family:'DM Serif Display',serif;font-size:1.75rem;margin-bottom:.35rem;position:relative}
.zb-header p{color:#C4A882;font-size:.88rem;position:relative;line-height:1.5}
.zb-badges{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem;position:relative}
.zb-badges span{font-size:.68rem;padding:.25rem .6rem;border-radius:999px;background:rgba(245,166,35,0.12);color:#F5A623;font-weight:600}

/* === METHODEN-KARTEN === */
.methoden-grid{display:grid;grid-template-columns:1fr;gap:.75rem;margin-bottom:1.5rem}
.methode-card{background:#fff;border:2px solid #E8DFD4;border-radius:1rem;padding:1.25rem;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.methode-card:hover{border-color:#F5A623;transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,166,35,0.12)}
.methode-card.selected{border-color:#F5A623;background:linear-gradient(135deg,#FFF8EE,#fff);box-shadow:0 0 0 3px rgba(245,166,35,0.15)}
.methode-card.selected::after{content:'✓';position:absolute;top:.75rem;right:.75rem;width:28px;height:28px;background:#F5A623;color:#1C1410;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem}
.methode-icon{font-size:1.8rem;margin-bottom:.5rem}
.methode-title{font-family:'DM Serif Display',serif;font-size:1.05rem;color:#1C1410;margin-bottom:.25rem}
.methode-desc{font-size:.8rem;color:#7A6652;line-height:1.45;margin-bottom:.5rem}
.methode-tags{display:flex;gap:.35rem;flex-wrap:wrap}
.methode-tag{font-size:.65rem;padding:.15rem .45rem;border-radius:.25rem;font-weight:600}
.methode-tag.green{background:#d1fae5;color:#065f46}
.methode-tag.yellow{background:#FFF3D6;color:#92400e}
.methode-tag.red{background:#fee2e2;color:#991b1b}
.methode-tag.blue{background:#dbeafe;color:#1e40af}

/* === WIZARD STEPS === */
.step-bar{display:flex;gap:.5rem;margin-bottom:1.5rem}
.step-dot{flex:1;height:5px;border-radius:3px;background:#E8DFD4;transition:all .3s;cursor:pointer}
.step-dot.done{background:#10b981}
.step-dot.current{background:#F5A623}
.step-dot:hover{opacity:.8}

.step-label{display:flex;justify-content:space-between;margin-bottom:1rem;font-size:.7rem;color:#7A6652}

/* === RESOURCE INPUTS === */
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.res-card{background:#fff;border:2px solid #E8DFD4;border-radius:.75rem;padding:1rem;text-align:center;transition:all .15s}
.res-card:focus-within{border-color:#F5A623}
.res-icon{font-size:1.5rem;margin-bottom:.35rem}
.res-label{font-size:.78rem;color:#7A6652;margin-bottom:.4rem;font-weight:500}
.res-input{width:100%;text-align:center;border:none;background:#f5f0eb;border-radius:.5rem;padding:.6rem;font-size:1.1rem;font-weight:700;font-family:inherit;color:#1C1410;outline:none}
.res-input:focus{background:#FFF8EE;box-shadow:0 0 0 2px rgba(245,166,35,0.2)}

/* === TOGGLE BUTTONS === */
.toggle-row{display:flex;gap:.5rem;margin-bottom:.75rem}
.toggle-btn{flex:1;padding:.75rem;border:2px solid #E8DFD4;border-radius:.75rem;background:#fff;cursor:pointer;text-align:center;font-size:.85rem;font-weight:500;transition:all .15s;font-family:inherit}
.toggle-btn:hover{border-color:#F5A623;background:#FFF8EE}
.toggle-btn.selected{border-color:#F5A623;background:#F5A623;color:#1C1410;font-weight:700}

/* === GENERATION TIMELINE === */
.gen-timeline{position:relative;padding-left:2rem;margin:1rem 0}
.gen-timeline::before{content:'';position:absolute;left:.85rem;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,#F5A623,#10b981)}
.gen-item{position:relative;padding:.75rem 0 .75rem 1.5rem;margin-bottom:.5rem}
.gen-item::before{content:'';position:absolute;left:-1.2rem;top:1rem;width:14px;height:14px;border-radius:50%;background:#F5A623;border:3px solid #fff;box-shadow:0 0 0 2px #F5A623;z-index:1}
.gen-item.done::before{background:#10b981;box-shadow:0 0 0 2px #10b981}
.gen-card{background:#fff;border:1px solid rgba(245,166,35,0.15);border-radius:.75rem;padding:1rem;box-shadow:0 2px 8px rgba(28,20,16,0.04)}
.gen-title{font-family:'DM Serif Display',serif;font-size:1rem;color:#1C1410;margin-bottom:.25rem}
.gen-sub{font-size:.8rem;color:#7A6652;line-height:1.5}
.gen-stats{display:flex;gap:.75rem;margin-top:.5rem;flex-wrap:wrap}
.gen-stat{font-size:.72rem;padding:.2rem .5rem;border-radius:.25rem;background:#f5f0eb;color:#7A6652;font-weight:500}

/* === ERGEBNIS === */
.result-hero{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border:2px solid #6ee7b7;border-radius:1rem;padding:1.5rem;text-align:center;margin-bottom:1rem}
.result-pct{font-family:'DM Serif Display',serif;font-size:3rem;color:#059669;margin:.5rem 0}
.result-label{font-size:.85rem;color:#065f46;font-weight:500}

.prob-bar{height:12px;background:#E8DFD4;border-radius:6px;overflow:hidden;margin:.75rem 0}
.prob-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#ef4444,#f59e0b,#10b981);transition:width .8s ease}

/* === AI LOADING === */
.ai-loading{text-align:center;padding:3rem 1rem}
.ai-pulse{display:inline-block;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#F5A623,#f7bc5e);animation:aiPulse 1.5s ease infinite}
@keyframes aiPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.7}}
.ai-dots{margin-top:1rem;font-size:.9rem;color:#7A6652}
.ai-dots::after{content:'';animation:dots 1.5s infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}

/* === CHAT === */
.chat-box{background:#fff;border:2px solid #E8DFD4;border-radius:1rem;margin-top:1rem;overflow:hidden}
.chat-msgs{max-height:400px;overflow-y:auto;padding:1rem}
.chat-msg{margin-bottom:1rem;max-width:90%}
.chat-msg.user{margin-left:auto;text-align:right}
.chat-msg.ai{margin-right:auto}
.chat-bubble{display:inline-block;padding:.75rem 1rem;border-radius:1rem;font-size:.88rem;line-height:1.5;text-align:left}
.chat-msg.user .chat-bubble{background:#F5A623;color:#1C1410;border-bottom-right-radius:.25rem}
.chat-msg.ai .chat-bubble{background:#f5f0eb;color:#1C1410;border-bottom-left-radius:.25rem}
.chat-input-row{display:flex;gap:.5rem;padding:.75rem;border-top:2px solid #E8DFD4}
.chat-input{flex:1;border:2px solid #E8DFD4;border-radius:.75rem;padding:.65rem .875rem;font-size:.9rem;font-family:inherit;outline:none;resize:none}
.chat-input:focus{border-color:#F5A623}
.chat-send{width:42px;height:42px;border:none;background:#F5A623;color:#1C1410;border-radius:.75rem;cursor:pointer;font-size:1.1rem;font-weight:700;transition:all .15s}
.chat-send:hover{background:#E09000;transform:scale(1.05)}

@media(max-width:768px){
    body{padding-left:0;padding-bottom:90px}
    .nav{display:none!important}
    .res-grid{grid-template-columns:1fr 1fr}
    .methoden-grid{grid-template-columns:1fr}
    .toggle-row{flex-wrap:wrap}
    .zb-header{padding:1.5rem 1rem}
    .zb-header h1{font-size:1.35rem}
/* === HILFE-TOOLTIP === */
.help-btn{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#E8DFD4;color:#7A6652;font-size:.7rem;font-weight:700;cursor:pointer;border:none;margin-left:.35rem;vertical-align:middle;transition:all .15s;font-family:inherit;line-height:1}
.help-btn:hover{background:#F5A623;color:#1C1410;transform:scale(1.1)}

.glossar-overlay{display:none;position:fixed;inset:0;background:rgba(28,20,16,0.5);z-index:500;align-items:center;justify-content:center}
.glossar-overlay.active{display:flex}
.glossar-box{background:#fff;border-radius:1rem;max-width:440px;width:92%;max-height:80vh;overflow-y:auto;padding:0;box-shadow:0 12px 40px rgba(28,20,16,0.25);animation:glossarIn .2s ease}
@keyframes glossarIn{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.glossar-header{padding:1.25rem;border-bottom:2px solid rgba(245,166,35,0.12);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;border-radius:1rem 1rem 0 0;z-index:1}
.glossar-header h3{margin:0;font-size:1.1rem;font-family:'DM Serif Display',serif}
.glossar-body{padding:1.25rem}
.glossar-item{margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #f5f0eb}
.glossar-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.glossar-term{font-weight:700;font-size:.92rem;color:#1C1410;margin-bottom:.2rem}
.glossar-def{font-size:.82rem;color:#7A6652;line-height:1.5}
}
</style>
</head>
<body>

<nav class="nav" id="mainNav"></nav>
<div class="mobile-nav" id="mobileNavBar"></div>
<div class="mobile-menu-overlay" id="mobileMenuOverlay" onclick="if(event.target===this)mobileMenuClose()"></div>
<script src="nav.js"></script>
<script src="config.js"></script>
<script src="plan.js"></script>
<script src="presence.js" defer></script>

<div id="toast" class="toast"></div>

<!-- GLOSSAR OVERLAY -->
<div class="glossar-overlay" id="glossarOverlay" onclick="if(event.target===this)closeGlossar()">
    <div class="glossar-box">
        <div class="glossar-header">
            <h3>📖 Glossar – Zuchtbegriffe</h3>
            <button style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:#7A6652" onclick="closeGlossar()">✕</button>
        </div>
        <div class="glossar-body" id="glossarBody"></div>
    </div>
</div>

<div class="container">
    <div class="zb-header">
        <h1>🧬 Zuchtberater</h1>
        <p>Instrumentelle Besamung, Selektion & Linienaufbau – KI-gestützte Strategieplanung für deine Bienenzucht.</p>
        <div class="zb-badges">
            <span>🔬 SDI & MDI</span>
            <span>📊 Erfolgswahrscheinlichkeit</span>
            <span>🧬 Generationsplanung</span>
            <span>👑 Linienaufbau</span>
        </div>
    </div>
    
    <div id="app"></div>
</div>

<script>
// ============================================
// ZUCHTBERATER – KI-GESTÜTZTE ZUCHTPLANUNG
// ============================================

var step = 0; // 0=Methode, 1=Ressourcen, 2=Analyse, 3=Ergebnis
var chatHistory = [];

// ============================================
// GLOSSAR – Fachbegriffe erklärt
// ============================================
var GLOSSAR = {
    'SDI': {term:'SDI – Single Drone Insemination', def:'Besamung einer Königin mit dem Sperma eines einzigen Drohns. Ergibt genetisch einheitliche Arbeiterinnen (Supersisters). Höchste genetische Kontrolle, aber reduzierte genetische Vielfalt im Volk.'},
    'MDI': {term:'MDI – Multi Drone Insemination', def:'Besamung mit Sperma mehrerer Drohnen (üblich 8-12). Natürlicher als SDI, aber weniger genetische Kontrolle. Standard bei instrumenteller Besamung.'},
    'F0': {term:'F0 – Stammkönigin / Parentalgeneration', def:'Die Ausgangskönigin, von der die Zuchtlinie abstammt. Wird aufgrund herausragender Eigenschaften als Zuchtmutter ausgewählt.'},
    'F1': {term:'F1 – Erste Filialgeneration', def:'Direkte Töchter der Stammkönigin (F0). Zeigen oft Heterosis (Kreuzungsvitalität). Werden geprüft und selektiert.'},
    'F2': {term:'F2 – Zweite Filialgeneration', def:'Töchter der F1-Königinnen. Hier spalten die Eigenschaften auf (Mendelsche Regeln). Entscheidende Generation für die Selektion.'},
    'COI': {term:'COI – Coefficient of Inbreeding', def:'Inzuchtkoeffizient. Gibt die Wahrscheinlichkeit an, dass zwei Allele identisch durch Abstammung sind. Unter 5% = gut, 5-12% = akzeptabel, über 12% = kritisch.'},
    'EWK': {term:'EWK – Einwabenkästchen', def:'Kleine Begattungseinheit mit nur einer Wabe. Wird für die kontrollierte Begattung von Jungköniginnen verwendet. Auch "Mini Plus" oder "Apidea" genannt.'},
    'Backcross': {term:'Backcross – Rückkreuzung', def:'Kreuzung einer Tochter mit Drohnen der mütterlichen Linie. Fixiert gewünschte Eigenschaften, erhöht aber den Inzuchtkoeffizienten.'},
    'Heterosis': {term:'Heterosis – Kreuzungsvitalität', def:'Nachkommen von genetisch verschiedenen Eltern zeigen oft bessere Leistung als beide Elternteile. Besonders stark in der F1-Generation.'},
    'VSH': {term:'VSH – Varroa Sensitive Hygiene', def:'Verhalten, bei dem Bienen Varroamilben in verdeckelten Brutzellen erkennen und die befallene Brut entfernen. Genetisch selektierbares Merkmal.'},
    'SMR': {term:'SMR – Suppressed Mite Reproduction', def:'Unterdrückte Milbenvermehrung. Die Varroamilben können sich in Brutzellen dieser Bienen nicht normal vermehren. Eng verwandt mit VSH.'},
    'Belegstelle': {term:'Belegstelle', def:'Isolierter Standort (meist auf Inseln oder in Gebirgstälern) mit kontrollierten Drohnenvölkern. Ermöglicht kontrollierte natürliche Paarung ohne instrumentelle Besamung.'},
    'Drohnenlinie': {term:'Drohnenlinie / Drohnenvolk', def:'Volk, dessen Königin gezielt Drohnen zur Begattung produziert. Die Drohnen tragen die Gene ihrer Mutter (haploid). Entscheidend für die genetische Qualität der Nachkommen.'},
    'Selektion': {term:'Selektion', def:'Gezielte Auswahl der besten Königinnen für die Weiterzucht. Basiert auf Leistungsprüfung (Honig, Sanftmut, Varroa-Toleranz, Schwarmträgheit). Selektionsintensität = wie streng ausgewählt wird.'},
    'Linienzucht': {term:'Linienzucht', def:'Zucht innerhalb einer definierten Abstammungslinie über mehrere Generationen. Ziel: Einheitliche, vorhersagbare Eigenschaften. Gegenteil: Kreuzungszucht.'},
    'Zuchtwert': {term:'Zuchtwert (BeeBreed)', def:'Statistisch geschätzter genetischer Wert einer Königin. 100 = Populationsdurchschnitt. Werte über 100 sind überdurchschnittlich. Berechnet aus eigener Leistung + Verwandtenleistung.'}
};

function helpBtn(key) {
    return '<button class="help-btn" onclick="event.stopPropagation();openGlossar(\'' + key + '\')" title="Was ist ' + key + '?">?</button>';
}

function openGlossar(focusKey) {
    var html = '';
    // Fokussierter Begriff zuerst
    if (focusKey && GLOSSAR[focusKey]) {
        var g = GLOSSAR[focusKey];
        html += '<div class="glossar-item" style="background:#FFF8EE;padding:1rem;border-radius:.5rem;margin-bottom:1rem">';
        html += '<div class="glossar-term">' + g.term + '</div>';
        html += '<div class="glossar-def">' + g.def + '</div>';
        html += '</div>';
    }
    // Alle anderen
    Object.keys(GLOSSAR).forEach(function(key) {
        if (key === focusKey) return;
        var g = GLOSSAR[key];
        html += '<div class="glossar-item">';
        html += '<div class="glossar-term">' + g.term + '</div>';
        html += '<div class="glossar-def">' + g.def + '</div>';
        html += '</div>';
    });
    document.getElementById('glossarBody').innerHTML = html;
    document.getElementById('glossarOverlay').classList.add('active');
}

function closeGlossar() {
    document.getElementById('glossarOverlay').classList.remove('active');
}

var METHODEN = [
    {
        id:'sdi',
        icon:'🔬',
        title:'Single Drone Insemination (SDI)',
        desc:'Maximale genetische Kontrolle durch Besamung mit einem einzelnen Drohn. Ideal für Forschung und präzisen Linienaufbau.',
        tags:[{t:'Höchste Kontrolle',c:'green'},{t:'Langsam',c:'yellow'},{t:'Besamungsgerät nötig',c:'blue'}],
        generations:'4–6',
        stability:'Sehr hoch',
        inbreeding:'Hoch – aktiv managen',
        speed:'Langsam (4–6 Jahre)'
    },
    {
        id:'backcross',
        icon:'🔄',
        title:'Rückkreuzung (Backcross)',
        desc:'Töchter werden mit Drohnen der Stammkönigin-Linie zurückgekreuzt. Fixiert gewünschte Eigenschaften schrittweise.',
        tags:[{t:'Eigenschafts-Fixierung',c:'green'},{t:'Mittleres Tempo',c:'yellow'},{t:'Inzucht beachten',c:'red'}],
        generations:'3–5',
        stability:'Hoch',
        inbreeding:'Mittel – steigt pro Generation',
        speed:'Mittel (3–5 Jahre)'
    },
    {
        id:'brueder',
        icon:'👨‍👩‍👦‍👦',
        title:'Brüderdrohnen-Besamung',
        desc:'Königinnen werden mit Drohnen von Schwestern der gleichen Linie besamt. Guter Kompromiss zwischen Kontrolle und Diversität.',
        tags:[{t:'Gute Balance',c:'green'},{t:'Mittlere Kontrolle',c:'yellow'},{t:'Praxistauglich',c:'blue'}],
        generations:'3–4',
        stability:'Mittel-Hoch',
        inbreeding:'Mittel',
        speed:'Mittel (3–4 Jahre)'
    },
    {
        id:'kombi',
        icon:'⚡',
        title:'SDI + Brüderdrohnen Kombi',
        desc:'Erst SDI zur Linienfindung (F1-F2), dann Brüderdrohnen zur Stabilisierung. Profi-Strategie für ernsthafte Züchter.',
        tags:[{t:'Profi-Strategie',c:'green'},{t:'Flexibel',c:'blue'},{t:'Erfahrung nötig',c:'yellow'}],
        generations:'4–5',
        stability:'Sehr hoch',
        inbreeding:'Kontrollierbar',
        speed:'Mittel-Schnell (3–5 Jahre)'
    },
    {
        id:'klassisch',
        icon:'🏔️',
        title:'Klassische Selektion (Belegstelle)',
        desc:'Kontrollierte Paarung auf Belegstelle. Keine Besamung nötig. Standard im Vereinswesen, langsamer aber bewährt.',
        tags:[{t:'Keine Besamung nötig',c:'green'},{t:'Langsamer',c:'yellow'},{t:'Bewährt',c:'blue'}],
        generations:'5–8',
        stability:'Mittel',
        inbreeding:'Gering',
        speed:'Langsam (5–8 Jahre)'
    }
];

var formData = {
    methode: '',
    voelker: 20,
    drohnenvoelker: 4,
    begattungseinheiten: 15,
    koeniginnen_pro_serie: 30,
    besamung: true,
    sdi: false,
    tempo: 'stabil',
    zeitziel: 3,
    generationen_pro_jahr: 1,
    startdatum: new Date().toISOString().slice(0,7),
    zuchtziel: ''
};

var zuchtplan = null; // KI-generiertes Ergebnis

// ============================================
// RENDER
// ============================================
function render() {
    var html = '';
    
    // Step Bar
    var labels = ['Strategie','Ressourcen','KI-Analyse','Zuchtplan'];
    html += '<div class="step-label">';
    labels.forEach(function(l,i){
        html += '<span style="' + (i===step?'color:#F5A623;font-weight:700':'') + '">' + l + '</span>';
    });
    html += '</div>';
    html += '<div class="step-bar">';
    for (var i = 0; i < 4; i++) {
        var cls = i < step ? 'done' : (i === step ? 'current' : '');
        html += '<div class="step-dot ' + cls + '" onclick="' + (i<step?'step='+i+';render()':'') + '"></div>';
    }
    html += '</div>';
    
    if (step === 0) html += renderStep0();
    else if (step === 1) html += renderStep1();
    else if (step === 2) html += renderStep2();
    else html += renderStep3();
    
    document.getElementById('app').innerHTML = html;
}

// ============================================
// STEP 0: STRATEGIE WÄHLEN
// ============================================
function renderStep0() {
    var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">';
    html += '<h2 style="font-size:1.15rem;margin:0">Zuchtstrategie wählen</h2>';
    html += '<button class="help-btn" style="width:28px;height:28px;font-size:.85rem" onclick="event.stopPropagation();openGlossar()" title="Alle Begriffe erklären">?</button>';
    html += '</div>';
    html += '<p style="font-size:.85rem;color:#7A6652;margin-bottom:1.25rem">Welche Methode passt zu deinem Zuchtprojekt? Wähle eine Strategie als Ausgangspunkt – der KI-Berater optimiert den Plan anhand deiner Ressourcen.</p>';

async function startAnalyse() {

    render();
    
    var m = METHODEN.find(function(x){return x.id===formData.methode;});
    
    var prompt = 'Du bist ein spezialisierter Berater für Bienenzucht mit Fokus auf instrumentelle Besamung, Selektion und Linienaufbau.\n\n';
    prompt += 'Der Imker hat folgende Ressourcen und Einstellungen:\n';
    prompt += '- Zuchtstrategie: ' + m.title + '\n';
    prompt += '- Wirtschaftsvölker: ' + formData.voelker + '\n';
    prompt += '- Drohnenvölker: ' + formData.drohnenvoelker + '\n';
    prompt += '- Begattungseinheiten: ' + formData.begattungseinheiten + '\n';
    prompt += '- Königinnen pro Serie: ' + formData.koeniginnen_pro_serie + '\n';
    prompt += '- Instrumentelle Besamung: ' + (formData.besamung ? 'Ja' : 'Nein') + '\n';
    prompt += '- SDI möglich: ' + (formData.sdi ? 'Ja' : 'Nein') + '\n';
    prompt += '- Tempo: ' + formData.tempo + '\n';
    prompt += '- Zeitziel: ' + (formData.zeitziel > 0 ? formData.zeitziel + ' Jahre' : 'kein Zeitlimit') + '\n';
    prompt += '- Startdatum: ' + (formData.startdatum || 'sofort') + '\n';
    prompt += '- Generationen pro Jahr: ' + formData.generationen_pro_jahr + '\n';
    if (formData.zuchtziel) prompt += '- Zuchtziel: ' + formData.zuchtziel + '\n';
    
    prompt += '\nErstelle einen konkreten, praxisnahen Zuchtplan. ';
    if (formData.zeitziel > 0) {
        prompt += 'WICHTIG: Der Imker will innerhalb von ' + formData.zeitziel + ' Jahr(en) eine stabile Linie! ';
        prompt += 'Erstelle einen KONKRETEN KALENDERPLAN mit echten Monaten und Jahren ab ' + (formData.startdatum || 'jetzt') + '. ';
        prompt += 'Bei den Generationen soll jeder Schritt ein konkretes Datum haben (z.B. "März 2026 – Sammelbrutableger", "Mai 2026 – Umlarven F1"). ';
        prompt += 'Sage ehrlich ob das Zeitziel realistisch ist. Wenn nicht, erkläre was realistisch wäre und was das Minimum ist. ';
    }
    prompt += 'Antworte NUR mit validem JSON (kein Markdown, keine Backticks) in diesem Format:\n';
    prompt += '{\n';
    prompt += '  "wahrscheinlichkeit": "65-80%",\n';
    prompt += '  "wahrscheinlichkeit_text": "für eine stabile Linie nach 4 Generationen",\n';
    prompt += '  "realistisch": true,\n';
    prompt += '  "realistisch_text": "Dein Zeitziel von X Jahren ist realistisch/ambitioniert/unrealistisch weil...",\n';
    prompt += '  "strategie": "Textbeschreibung der empfohlenen Strategie...",\n';
    prompt += '  "generationen": [\n';
    prompt += '    {"titel": "März 2026 – Stammkönigin auswählen (F0)", "beschreibung": "Text...", "stats": ["30 Königinnen", "4 Drohnenvölker"]},\n';
    prompt += '    {"titel": "Mai 2026 – F1 erzeugen", "beschreibung": "Text...", "stats": ["..."]}\n';
    prompt += '  ],\n';
    prompt += '  "risiken": "Text zu Risiken und Inzuchtmanagement...",\n';
    prompt += '  "zusammenfassung": "Kurze Zusammenfassung des Plans..."\n';
    prompt += '}\n';
    prompt += '\nWichtig: Antworte komplett auf Deutsch. Gib konkrete Zahlen, Monate und Jahre. Berücksichtige die Bienensaison (Zucht nur ca. April-August möglich). Sei praxisnah und ehrlich bei der Erfolgswahrscheinlichkeit.';
    
    try {
        var response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 2000,
                messages: [{role: 'user', content: prompt}]
            })
        });
        
        var data = await response.json();
        var text = data.content.map(function(c){return c.text||'';}).join('');
        
        // JSON parsen
        var clean = text.replace(/```json|```/g, '').trim();
        zuchtplan = JSON.parse(clean);
        step = 3;
    } catch(err) {
        console.error('KI-Analyse Fehler:', err);
        // Fallback
        zuchtplan = buildFallbackPlan();
        step = 3;
    }
    
    render();
    
    // Chat scrollen
    setTimeout(function(){
        var el = document.getElementById('chatMsgs');
        if (el) el.scrollTop = el.scrollHeight;
    }, 100);
}

// ============================================
// CHAT (Rückfragen)
// ============================================
async function sendChat() {
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text) return;
    
    chatHistory.push({role:'user', text:text});
    input.value = '';
    render();
    
    // System-Kontext
    var sysPrompt = 'Du bist ein Zuchtberater für Bienenzucht (instrumentelle Besamung, SDI, Linienaufbau). ';
    sysPrompt += 'Der Imker hat folgenden Plan: ' + JSON.stringify(zuchtplan).substring(0, 1500) + '. ';
    sysPrompt += 'Ressourcen: ' + formData.voelker + ' Völker, ' + formData.drohnenvoelker + ' Drohnenvölker, ' + formData.koeniginnen_pro_serie + ' Königinnen/Serie. ';
    sysPrompt += 'Antworte auf Deutsch, praxisnah und konkret. Maximal 3-4 Sätze.';
    
    var messages = [{role:'user', content: sysPrompt + '\n\nFrage: ' + text}];
    
    try {
        var response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 500,
                messages: messages
            })
        });
        
        var data = await response.json();
        var answer = data.content.map(function(c){return c.text||'';}).join('');
        chatHistory.push({role:'ai', text:answer});
    } catch(err) {
        chatHistory.push({role:'ai', text:'Entschuldigung, es gab einen Fehler. Bitte versuche es nochmal.'});
    }
    
    render();
    setTimeout(function(){
        var el = document.getElementById('chatMsgs');
        if (el) el.scrollTop = el.scrollHeight;
    }, 100);
}

// ============================================
// FALLBACK (wenn API nicht erreichbar)
// ============================================
function buildFallbackPlan() {
    var m = METHODEN.find(function(x){return x.id===formData.methode;});
    var kps = formData.koeniginnen_pro_serie;
    var sel = Math.max(3, Math.round(kps * 0.15));
    var zz = formData.zeitziel || 0;
    var gpj = formData.generationen_pro_jahr;
    var minGen = parseInt(m.generations);
    var startDate = new Date((formData.startdatum || new Date().toISOString().slice(0,7)) + '-01');
    
    // Kalender-Monate berechnen
    var monate = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    function addMonths(d, n) { var r = new Date(d); r.setMonth(r.getMonth()+n); return r; }
    function fmtMonat(d) { return monate[d.getMonth()] + ' ' + d.getFullYear(); }
    
    // Realismus-Check
    var noetigeJahre = Math.ceil(minGen / gpj);
    var realistisch = zz === 0 || zz >= noetigeJahre;
    var realistischText = '';
    if (zz > 0) {
        if (zz < noetigeJahre) {
            realistischText = 'Dein Zeitziel von ' + zz + ' Jahr(en) ist sehr ambitioniert. Für ' + m.title + ' braucht man mindestens ' + minGen + ' Generationen. Bei ' + gpj + ' Generation(en) pro Jahr wären das realistisch ca. ' + noetigeJahre + ' Jahre. Du kannst das beschleunigen durch: 2 Serien pro Jahr (Frühjahr + Spätsommer), mehr Königinnen pro Serie, härtere Selektion.';
        } else {
            realistischText = 'Dein Zeitziel von ' + zz + ' Jahren ist realistisch für ' + m.title + '. Mit ' + kps + ' Königinnen pro Serie und ' + gpj + ' Generation(en) pro Jahr passt der Zeitplan.';
        }
    }
    
    // Generationen mit echten Daten
    var gens = [];
    var d = new Date(startDate);
    
    // F0: Stammkönigin
    gens.push({
        titel: fmtMonat(d) + ' – Stammkönigin auswählen (F0)',
        beschreibung: 'Auswahl der besten Stammkönigin aus deinen ' + formData.voelker + ' Völkern. Kriterien: Honigleistung, Sanftmut, Varroa-Toleranz, Schwarmträgheit. BeeBreed-Zuchtwerte beachten.',
        stats: ['1 Stammkönigin', 'Leistungsprüfung über Saison']
    });
    
    // F1
    var f1Start = d.getMonth() < 3 ? new Date(d.getFullYear(), 3, 1) : addMonths(d, 1);
    var f1Umlarven = addMonths(f1Start, 1);
    var f1Besamung = addMonths(f1Umlarven, 1);
    gens.push({
        titel: fmtMonat(f1Start) + ' – F1 erzeugen (' + kps + ' Königinnen)',
        beschreibung: fmtMonat(f1Start) + ': Sammelbrutableger erstellen. ' + fmtMonat(f1Umlarven) + ': Umlarven von Stammkönigin. ' + fmtMonat(f1Besamung) + ': ' + (formData.besamung ? (formData.sdi ? 'SDI-Besamung' : 'MDI-Besamung') : 'Belegstellenbegattung') + ' mit ' + formData.drohnenvoelker + ' Drohnenvölkern. Sommer: Leistungsprüfung aller F1.',
        stats: [kps + ' Königinnen', formData.drohnenvoelker + ' Drohnenvölker', formData.begattungseinheiten + ' EWKs']
    });
    
    // F2
    var f2Start = gpj >= 2 ? addMonths(f1Besamung, 3) : new Date(f1Start.getFullYear()+1, 3, 1);
    gens.push({
        titel: fmtMonat(f2Start) + ' – Selektion & F2 (' + sel + ' Zuchtmütter)',
        beschreibung: 'Die besten ' + sel + ' F1-Königinnen als Zuchtmütter auswählen. Pro Linie ' + Math.round(kps/sel) + ' Töchter erzeugen. Volksentwicklung, Honigleistung und Krankheitsresistenz bewerten.',
        stats: [sel + ' Zuchtmütter', (sel * Math.round(kps/sel)) + ' F2-Königinnen', 'Selektion: Top ' + Math.round(sel/kps*100) + '%']
    });
    
    // F3
    var f3Start = gpj >= 2 ? addMonths(f2Start, 5) : new Date(f2Start.getFullYear()+1, 3, 1);
    gens.push({
        titel: fmtMonat(f3Start) + ' – Linienfixierung (F3)',
        beschreibung: 'Beste Linien durch ' + (formData.sdi ? 'kontrollierte SDI-Besamung' : 'gezielte Anpaarung') + ' stabilisieren. COI berechnen und überwachen (Ziel: unter 12.5%). Schwache Linien konsequent ausscheiden.',
        stats: ['2-3 stabile Linien', 'COI-Kontrolle', 'Harte Selektion']
    });
    
    // F4+
    var f4Start = gpj >= 2 ? addMonths(f3Start, 5) : new Date(f3Start.getFullYear()+1, 3, 1);
    gens.push({
        titel: fmtMonat(f4Start) + ' – Konsolidierung & Praxis (F4+)',
        beschreibung: 'Stabile Linie in Wirtschaftsvölker überführen. Leistungsprüfung unter Normalbedingungen. Bei Bedarf Fremdblut einkreuzen. Linie an Zuchtverband melden.',
        stats: ['1-2 Praxis-Linien', 'Laufende Selektion', 'Zuchtbuch-Eintragung']
    });
    
    return {
        wahrscheinlichkeit: (zz === 1 ? '30-45%' : (formData.tempo === 'schnell' ? '50-65%' : (kps >= 30 ? '65-80%' : '45-60%'))),
        wahrscheinlichkeit_text: 'für eine stabile Linie ' + (zz > 0 ? 'innerhalb von ' + zz + ' Jahr(en)' : 'mit ' + m.title),
        realistisch: realistisch,
        realistisch_text: realistischText,
        strategie: 'Basierend auf deinen ' + formData.voelker + ' Wirtschaftsvölkern und ' + formData.drohnenvoelker + ' Drohnenvölkern empfehle ich den Linienaufbau mit ' + m.title + '. Pro Generation werden ' + kps + ' Königinnen erzeugt und die besten ' + sel + ' selektiert. ' + (zz > 0 ? 'Zeitziel: ' + zz + ' Jahr(e). Start: ' + fmtMonat(startDate) + '.' : '') + ' Bei ' + gpj + ' Generation(en) pro Jahr dauert der Aufbau ca. ' + noetigeJahre + ' Jahre.',
        generationen: gens,
        risiken: 'Hauptrisiko: Inzuchtdepression ab F3. Mit ' + formData.drohnenvoelker + ' Drohnenvölkern ist die genetische Basis ' + (formData.drohnenvoelker >= 6 ? 'ausreichend' : 'knapp – mindestens 6 verschiedene Drohnenvölker empfohlen') + '. ' + (zz === 1 ? 'Bei nur 1 Jahr Zeitziel besteht hohes Risiko: Zu wenig Zeit für Leistungsprüfung, Selektion unter Zeitdruck, Wetterfaktoren können eine ganze Serie zunichte machen. Plan B einplanen!' : 'Jede Generation COI berechnen und dokumentieren.') + ' Bei SDI steigt der COI schneller – Fremdblut-Einkreuzung alle 3-4 Generationen einplanen.',
        zusammenfassung: 'Plan: ' + m.title + ' · ' + kps + ' Königinnen/Generation · ' + sel + ' Linien selektiert · ' + gens.length + ' Schritte von ' + fmtMonat(startDate) + ' bis ' + fmtMonat(f4Start) + '. ' + (realistisch ? '✅ Zeitziel realistisch.' : '⚠️ Zeitziel ambitioniert – Plan B empfohlen.')
    };
}

// ============================================
// HELPERS
// ============================================
function nextStep() {
    if (step === 0 && !formData.methode) return;
    step++;
    render();
}

function formatAIText(text) {
    if (!text) return '';
    return escHtml(text).replace(/\n/g, '<br>');
}

function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================
// INIT
// ============================================
async function init() {
    var user = await checkAuth();
    if (!user) return;
    await planManager.load();
    // Zuchtberater könnte auf Pro beschränkt sein:
    // if (!planManager.can('zuchtberater')) { planManager.showUpgradeHint('zuchtberater'); return; }
    render();
}

init();
</script>
